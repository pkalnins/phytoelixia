idney area); Gencydo 1%, 3% (between shoulder blades) — daily or weekly injections<br />\nOther remedies: Quercus 10% (AM); Veronica 10% (PM); Argentum nitricum D20 (dry asthma); Cuprum aceticum D3, D4 or Cuprum/ren (copper); carbonic acid baths; acid therapy (Gencydo, Prunus, formic acid, carbonic acid)<br />\nIn children: Phosphorus D5 or D6 (replaces Quercus, AM); Cuprum per melissam or Quartz D12-D20 (replaces Veronica, PM); Belladonna (related to copper); Formica D6, 10, 15, 30 or sulfur baths (by injection, to counter strong hardening processes)</p>"}], "id": "lung__c1"}, {"category": "COPD", "subtitle": "Chronic Obstructive Pulmonary Disease", "fields": [{"label": "Overview", "value": "<p>Progressive, largely irreversible airflow limitation — but the clinical phenotype (predominant emphysema vs. chronic bronchitis, \"pink puffer\" vs. \"blue bloater,\" stable vs. exacerbating) maps onto genuinely different underlying patterns rather than one COPD pattern.</p>"}, {"label": "Predominant Patterns", "value": "<ul>\n<li><a class=\"pattern-link\" data-id=\"lung__p9\">Yin Excess — Phlegm-Damp</a> — The \"blue bloater\" phenotype: chronic bronchitis with copious sputum, heaviness, chest oppression. Named directly in this pattern's correlates (\"Chronic Bronchitis (COPD 'blue bloater')\").</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p5\">Qi Deficiency</a> — The fatigued, breathless, low-reserve presentation. COPD is named directly in this pattern's correlates, alongside early CHF and post-viral recovery.</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p4\">Yang Deficiency — Internal · Lower Respiratory · Cold</a> — Stable COPD with mitochondrial/thyroid-axis decay — named directly (\"stable Chronic Obstructive Pulmonary Disease (COPD) with mitochondrial decay\").</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p2\">Yang Excess — Internal · Lower Respiratory · Heat/Fire</a> — Acute exacerbations (AECB): a Yin/Qi/Yang-deficient baseline can flare into this Yang Excess picture during infection — named directly (\"severe acute exacerbation of chronic bronchitis (AECB)\").</li>\n</ul>"}], "id": "lung__c2"}, {"category": "Pneumonia", "subtitle": "Acute bacterial / lobar", "fields": [{"label": "Overview", "value": "<p>Acute lower-respiratory infection with consolidation. The pattern lens is most useful here for staging — what phase of the febrile/inflammatory process a patient is in — and for reading the recovery trajectory afterward.</p>"}, {"label": "Predominant Patterns", "value": "<ul>\n<li><a class=\"pattern-link\" data-id=\"lung__p2\">Yang Excess — Internal · Lower Respiratory · Heat/Fire</a> — Primary, acute phase: lobar/lobular bacterial pneumonia and lung abscess are named directly in this pattern's correlates.</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p1\">Yang Excess — External · Upper Respiratory · Wind-Heat</a> — Early/mild presentation: early acute bacterial bronchitis and influenza, before consolidation sets in, map to the milder Wind-Heat picture.</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p5\">Qi Deficiency</a> — Recovery phase: \"recovering stages of acute viral bronchitis/pneumonia\" is named directly in this pattern's correlates — the post-infectious fatigue, weak voice, and weak cough that linger after the acute heat resolves.</li>\n</ul>"}, {"label": "Anthroposophic Therapeutics", "value": "<p>Pneumonia is read as a classic inflammatory febrile disease: watery/blood processes predominate and air is displaced as blood takes over (\"hepatization\" of lung tissue). Fever is understood as the sign of the ego attempting to grab hold of the physical body — an attempt to re-incarnate. Therapy aims to permeate the blood processes with formative activity:</p>\n<p>Iron — helps incarnate the lung process; Ferrum prep. D10 / Ferrum phosphoricum D6, 8, 10 (daily injection)<br />\nAconite — a variation of the iron process; enhances the organizing properties of the warmth body; early stages, while fever is still rising and until sweating begins<br />\nBryonia — root represents the nerve-sense realm; presses back metabolic processes<br />\nPhosphorus — leads the ego more into the body<br />\nAntimony (Tartarus stibiatus) — opposes protein forces<br />\nPneumodoron 1 &amp; 2 — combines several of the above into one<br />\nCardiodoron or Camphora D3 — balances heart rhythm, pushes metabolism back</p>\n<p>If empyema develops: Erysidoron 1 &amp; 2 (Belladonna D3, Apis D3, Sulfur D2, Carbo betul. 5%); Argentum prep. D30; Mercurius vivus naturalis D10-D30<br />\nIf inflammation needs stimulating: mustard plasters; Hepar sulfuris calc. D4; eucalyptus spray</p>\n<p>Pleuritis (usually from an inadequate tin process): Bryonia D3-6 (organizes water); horseradish compresses; Stannum prep. D8, D10 injections; Equisetum D10, D15 injections</p>\n<p>Excretion via the kidneys should be stimulated throughout both conditions, since excretion has been displaced from below upward.</p>"}], "id": "lung__c3"}, {"category": "Common Cold", "subtitle": "Acute upper respiratory infection", "fields": [{"label": "Overview", "value": "<p>A single everyday complaint that, in this framework, is really three or four different patterns depending on stage and presentation — a good teaching case for how one biomedical label can map to different clinical pictures.</p>"}, {"label": "Predominant Patterns", "value": "<ul>\n<li><a class=\"pattern-link\" data-id=\"lung__p3\">Yang Deficiency — External · Upper Respiratory · Wind-Cold</a> — Early incubation phase: named directly (\"the early incubation phase of the common cold\").</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p1\">Yang Excess — External · Upper Respiratory · Wind-Heat</a> — Established/progressed phase: once fever, sore throat, and yellow discharge dominate — this pattern's correlates name influenza and acute bacterial bronchitis at this stage.</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p7\">Yin Deficiency — External · Acute Dryness</a> — Dry, irritant-triggered variant: low-humidity or smoke-triggered acute tracheobronchitis, and \"early-stage viral pharyngitis/laryngitis before exudate forms,\" are named directly here.</li>\n</ul>"}], "id": "lung__c4"}, {"category": "Pulmonary Fibrosis", "subtitle": "Interstitial lung disease", "fields": [{"label": "Overview", "value": "<p>Chronic, progressive scarring and stiffening of lung tissue — in this framework, essentially the clinical endpoint of sustained Yin depletion.</p>"}, {"label": "Predominant Patterns", "value": "<ul>\n<li><a class=\"pattern-link\" data-id=\"lung__p8\">Yin Deficiency — Internal · Chronic Dryness</a> — Primary: Idiopathic Pulmonary Fibrosis is named directly in this pattern's correlates, alongside Sjögren's-associated interstitial lung disease and post-radiation pneumonitis.</li>\n</ul>\n<p>Cross-reference: the Lung Yin section of the Physiology preface describes pulmonary fibrosis as \"the body's memory of lost Yin\" — worth reading alongside this pattern rather than the pattern alone.</p>"}], "id": "lung__c5"}, {"category": "Tuberculosis", "subtitle": "Pulmonary TB", "fields": [{"label": "Overview", "value": "<p>Chronic mycobacterial infection with progressive Yin-consuming wasting — night sweats, low-grade afternoon fever, and dry or blood-streaked cough place it in the same deep, structural territory as Pulmonary Fibrosis, the other condition mapping to this pattern.</p>"}, {"label": "Predominant Patterns", "value": "<ul>\n<li><a class=\"pattern-link\" data-id=\"lung__p8\">Yin Deficiency — Internal · Chronic Dryness</a> — Primary: Pulmonary Tuberculosis is named directly in this pattern's correlates, alongside Idiopathic Pulmonary Fibrosis and Sjögren's-associated interstitial lung disease.</li>\n</ul>"}, {"label": "Anthroposophic Therapeutics", "value": "<p>Tuberculosis is read as the metabolic zone extending into the lung region because the nerve-sense forces are too weak to hold it back. Silica opposes this process — the right lung, lower in silica, is most affected; organs highest in silica (e.g. the pancreas) are the least affected. The adrenals are the next most affected organ: in the adrenals, catabolic nerve-sense forces are turned into anabolic ones, making them prone to succumbing to this metabolic disease; adrenal function is also tied to inner light metabolism, a disturbance of which lies at the core of TB. The metabolic tendency is countered by a strong \"head\" force — the lung strives too much to be \"head\" — and unhealthy nerve-sense activity here is associated with a person being cut off from cosmic forces (sun, space, cosmos).</p>\n<p>Iron (enhances incarnation) — Ferrum prep., Hematite, Ferrum phosphoricum, Ferrum sidereum, Ferrum rosatum (red rose leaves + meteoric iron)<br />\nGraphite — addresses the connection between lungs and the earth<br />\nQuartz — plant silicic acid (Equisetum); \"salt rubbings\" to work against inner hardening processes<br />\nPhosphorus — care needed during the inflammatory phase; consider giving as Apatite (Calc phos.)<br />\nMercury D6-D10 — orders the formation of the lungs<br />\nRelieve metabolism: detoxify liver and kidneys<br />\nStimulate the head system: train intensive thought activity (e.g. mathematics)</p>"}], "id": "lung__c6"}, {"category": "Allergic Rhinitis", "subtitle": "Allergic airway disease", "fields": [{"label": "Overview", "value": "<p>IgE-mediated hypersensitivity of the airway mucosa. Presentation splits along the Wei-Qi (defensive-barrier) vs. Qi-reactivity axis more than along a single \"allergy pattern.\"</p>"}, {"label": "Predominant Patterns", "value": "<ul>\n<li><a class=\"pattern-link\" data-id=\"lung__p5\">Qi Deficiency</a> — Primary: named directly in this pattern's correlates (\"allergic rhinitis\") — read as Wei Qi (defensive-barrier) insufficiency, prone to frequent triggering.</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p6\">Qi Excess — Constriction (Qi Stagnation)</a> — Reactive/hypervigilant variant: globus pharyngeus and stress-linked hyperreactivity overlapping with allergic symptoms.</li>\n<li><a class=\"pattern-link\" data-id=\"lung__p7\">Yin Deficiency — External · Acute Dryness</a> — When a dry, itchy, irritant-sensitive presentation predominates over the classic damp/congested picture.</li>\n</ul>"}], "id": "lung__c7"}], "conditionsIntro": "<p>As explored in the Foundations chapter, Yang, Qi, Blood, and Yin can be read not just as four parallel categories but as stations along a single depth progression — from superficial and reversible toward deep and structural — echoing both Steiner's polarity between metabolic (inflammatory) and sclerotic (degenerative) illness, and Reckeweg's six-phase homotoxicology table, where a \"biological division\" separates the humoral phases (still extracellular, still reversible) from the cellular phases (intracellular, progressively less reversible).</p>\n<p>Read this way, the conditions below aren't an arbitrary list — they trace one plausible path along that same progression, specifically as it plays out in the lung. And it turns out this isn't just an analogy this workbook is imposing from outside: Reckeweg's own teaching materials include a \"Respiratory Tract\" row in his six-phase table, naming a specific disease example at every phase —</p>\n<table>\n<thead>\n<tr>\n<th>Excretion</th>\n<th>Reaction/Inflammation</th>\n<th>Deposition</th>\n<th>Impregnation</th>\n<th>Degeneration</th>\n<th>Dedifferentiation</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>Cough, expectoration</td>\n<td>Bronchitis, acute</td>\n<td>Silicosis, smoker's lung</td>\n<td>Chronic (obstructive) bronchitis</td>\n<td>Bronchiectasis, emphysema</td>\n<td>Bronchial carcinoma</td>\n</tr>\n</tbody>\n</table>\n<p><em>(Source: International Academy of Homotoxicology, <a href=\"https://wholehealthathome.com/wp-content/uploads/Introduction-to-Homotoxicology.pdf\">Introduction to Homotoxicology</a>, IAH 2007.)</em> That row lines up with the progression below closely enough to treat as real corroboration, not coincidence — with two refinements worth naming explicitly.</p>\n<ul>\n<li><strong>Common Cold</strong> and the acute phase of <strong>Pneumonia</strong> sit in the two most superficial Yang-metabolic phases — Excretion and Reaction/Inflammation — matching Reckeweg's own \"Cough, expectoration\" and \"Bronchitis, acute\" almost verbatim. The organism is actively, forcefully clearing an acute insult; nothing here is fixed yet.</li>\n<li><strong>Asthma</strong> is better read as straddling <strong>Deposition and Impregnation</strong> rather than sitting cleanly in one or the other — and Reckeweg's own table supports that straddle rather than contradicting it. \"Silicosis, smoker's lung\" (Deposition) is a chronic irritant-driven change that's still substantially matrix/humoral; \"Chronic (obstructive) bronchitis\" (Impregnation) is the first clearly cellular entry, and it's also where Reckeweg's prose separately places asthma and hay fever together as classic Impregnation-phase diseases (long quiet latency, punctuated by a disproportionate reaction to a minor trigger). Clinically this fits too: bronchospasm alone is functional and reversible (Deposition-like), while the airway remodeling and smooth-muscle hypertrophy seen in chronic, severe asthma is structural and cellular (Impregnation-like) — asthma has both an ECM component and a genuinely cellular one, which is exactly why a single-phase placement undersold it.</li>\n<li><strong>COPD</strong> turns out to span three phases, not one, in Reckeweg's own table — and this is the richest single point of agreement with the model below. Its three named entries trace almost exactly the clinical course of the disease: \"Silicosis, smoker's lung\" (Deposition) as the early, still-humoral irritant load; \"Chronic (obstructive) bronchitis\" (Impregnation) as the disease crosses into the cell; \"Bronchiectasis, emphysema\" (Degeneration) as structural, largely irreversible tissue damage. So COPD isn't simply \"Blood\" — it's the segment of the progression that runs Qi → Blood → Yin, depending on stage and phenotype.</li>\n<li><strong>Pulmonary Fibrosis</strong> sits at the deepest, most \"Yin\" end of this progression. Reckeweg's table doesn't name pulmonary fibrosis specifically, but \"Bronchiectasis, emphysema\" at Degeneration is the same territory — progressive, largely irreversible structural damage — so the placement holds by strong analogy even without an exact-name match.</li>\n<li><strong>Lung Cancer</strong>, not yet its own entry in this reference, is this progression's furthest point — and here Reckeweg's table gives an exact match: \"Bronchial carcinoma\" at Dedifferentiation, where cells lose their differentiated identity altogether. Worth adding as a full condition once that pattern material exists.</li>\n</ul>\n<p>Where <strong>Allergic Rhinitis</strong> fits, per Reckeweg himself, is also answerable rather than open: the IAH's own teaching materials name hay fever explicitly as a classic example of the <strong>Impregnation phase</strong>, grouped there with asthma, migraine, and gastric ulcer — the same \"long quiet latency, disproportionate reaction\" pattern described above. Reckeweg's six-phase table also lists \"Allergy\" generally at Impregnation, under the Skin organ-system row. With Asthma now placed as straddling Deposition/Impregnation rather than sitting at Deposition alone, this is no longer a tension to flag — Allergic Rhinitis and the cellular half of Asthma's range now sit at the same phase, which is consistent with how closely the two conditions travel together clinically.</p>\n<p>Overall, the Yang → Qi → Blood → Yin reading holds up well against Reckeweg's own classifications — better, in fact, than a single-phase-per-condition model could show, once COPD and Asthma are read as spanning phases rather than occupying just one.</p>\n<p>One distinction is still worth naming, though: Reckeweg is classifying the <em>disease label</em> homotoxicologically, while this workbook's Predominant Patterns (below, per condition) classify the <em>clinical presentation</em> by TCM pattern — a single disease can present as more than one pattern, which is exactly why, for example, Asthma below maps to three different patterns rather than one. The two schemes describe different things and are meant to be read alongside each other, not collapsed into one.</p>", "patterns": [{"category": "Yang Excess", "subtitle": "External · Upper Respiratory · Wind-Heat", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Acute hyper-inflammatory vasodilation (Heat Excess, Upper focus).</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Acute exudative inflammation</li>\n<li>Rapid capillary vasodilation</li>\n<li>Cellular infiltration</li>\n<li>Pyrogenic cytokine cascades.</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>NF-κB activation, up-regulated IL−1β, IL−6, TNF−α, and iNOS (causing massive localized nitric oxide/vasodilation/redness).</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Acute, forceful cough with thick, yellow or slightly turbid sputum. Fever that outweighs any mild aversion to wind/cold, a prominent sore, swollen, red throat, nasal congestion with yellow, thick discharge, thirst, and a sweating response that does not resolve the fever.</p>"}, {"label": "Tongue", "value": "<p>Red tip or edges with a thin, dry, yellow coating.</p>"}, {"label": "Pulse", "value": "<p>Floating (Fu) and Rapid (Shuo), sitting superficially and beating quickly.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Rapid onset (hours), typically peaking within 1-3 days. Worse afternoon/evening as fever rises.<br />\n&gt; cooling, rest, fluids<br />\n&lt; wind exposure, overheating, exertion</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Sore, swollen throat with pain on swallowing; tender submandibular/cervical lymph nodes; frontal or occipital headache from fever; upper trapezius and cervical tension accompanying the febrile response.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Restlessness, mild mental confusion or cloudiness due to pyrexia (fever), and acute irritability driven by throat pain and systemic heat.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Acute exudative tonsillitis</li>\n<li>Streptococcal pharyngitis</li>\n<li>Early acute bacterial bronchitis</li>\n<li>Influenza</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>CBC with Differential: Leukocytosis with a neutrophil shift (neutrophilia) if a secondary bacterial infection is taking hold.</li>\n<li>Rapid Strep Test / Throat Culture: Positive for Group A Streptococcus or other bacterial pathogens.</li>\n<li>Inflammatory Biomarkers: Elevated highly-sensitive C-Reactive Protein (hs-CRP).</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Cooling diaphoretics</li>\n<li>Consider: demulcents, address Kidney Qi (Kidney \"drainage\"/diuresis)</li>\n</ul>\n<p><strong>Chinese herbs</strong>: </p>\n<ul>\n<li>Mulberry leaf (Sang ye)</li>\n<li>Chrysanthemum (Ju hua)</li>\n<li>Peppermint (Bo he)</li>\n<li>Platycodon (Jie geng)</li>\n<li>Arctium (Niu bang zi)</li>\n<li>Kudzu (Ge gen)</li>\n<li>Forsythia (Lian qiao)</li>\n<li>Honeysuckle (Jin yin hua)</li>\n<li>Fresh ginger (Sheng jiang)</li>\n</ul>\n<p><strong>Western herbs</strong>: </p>\n<ul>\n<li>Elderflower / Elderberry (<em>Sambucus nigra</em>)</li>\n<li>Yarrow (<em>Achillea millefolium</em>)</li>\n<li>Catnip (<em>Nepeta cataria</em>)</li>\n<li>Peppermint (<em>Mentha × piperita</em>)</li>\n<li>Lemon Balm (<em>Melissa officinalis</em>)</li>\n<li>Linden flower (<em>Tilia europaea</em>)</li>\n<li>Feverfew (<em>Tanacetum parthenium</em>)</li>\n<li>Boneset (<em>Eupatorium perfoliatum</em>)</li>\n<li>Andrographis (<em>Andrographis paniculata</em>)</li>\n</ul>\n<p>Homeopathic: Aconite, Belladonna, Gelsemium, Bryonia, Veratrum</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Sang Ju Tang</strong></p>\n<ul>\n<li>Mulberry leaf (Sang ye)</li>\n<li>Chrysanthemum (Ju hua)</li>\n<li>Forsythia (Lian qiao)</li>\n<li>Apricol kernel (Xing ren)</li>\n<li>Playtcodon root (Jie geng)</li>\n<li>Phragmitis/reed root (Lu gen)</li>\n<li>Field mint (Bo he)</li>\n<li>Licorice root (Gan cao)</li>\n</ul>\n<p><strong>Yin Qiao San</strong></p>\n<ul>\n<li>Honeysuckle flower (Jin yin hua)</li>\n<li>Forsythia fruit (Lian qiao)</li>\n<li>Field mint (Bo he)</li>\n<li>Burdock fruit (Niu bang zi)</li>\n<li>Schizonepeta/catnip (Jing jie)</li>\n<li>Fermented soybean (Dan dou chi)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LI 11, LI 4, SJ 5, DU 14, GB 20, UB 12</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C</li>\n<li>Minerals/Metals: Zn, Ag, Hg</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Elderberry<br />\n10 Yarrow<br />\n10 Linden flower<br />\n5 Feverfew<br />\n5 Boneset<br />\n5 Forsythia<br />\n5 Honeysuckle<br />\n5 Andrographis<br />\n5 Peppermint</p>\n<p>Oligo: Ag, Zn</p>"}], "id": "lung__p1"}, {"category": "Yang Excess", "subtitle": "Internal · Lower Respiratory · Heat/Fire", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Chronic/Decongested inflammatory cascade (Heat Excess, Lower focus).</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Massive neutrophilic infiltration, oxidative burst</li>\n<li>Dense purulent exudate</li>\n<li>Severe tissue remodeling/destruction</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Hyper-activated NF-κB, extreme up-regulation of Matrix Metalloproteinases (MMP−9 causing tissue breakdown), high IL−8 (neutrophil chemoattractant), and NOS2.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>A loud, barking, or painful cough with copious, thick, yellow-green, or foul-smelling purulent sputum (which may contain streaks of fresh blood). High fever, rapid labored breathing or wheezing (Chuan), flaring of the nostrils, chest pain that worsens with coughing, and intense thirst for cold drinks.</p>"}, {"label": "Tongue", "value": "<p>Red body with a thick, yellow, greasy, or sticky coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Rapid (Shuo), rolling quickly, forcefully, and fluidly.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Rapid, severe progression over 24-72 hours. Worse at night/lying flat (orthopnea).<br />\n&gt; sitting upright, warmth, productive expectoration<br />\n&lt; exertion, cold drinks (craved despite worsening damp)</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Chest wall pain worsened by coughing; intercostal muscle strain from forceful, barking cough; rib tenderness from sustained coughing fits.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>High anxiety, extreme agitation, panic or terror induced by air hunger (dyspnea), and delirium if the heat is severe enough to disturb the Shen (spirit).</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Lobar or lobular bacterial pneumonia</li>\n<li>Acute lung abscess</li>\n<li>Severe acute exacerbation of chronic bronchitis (AECB)</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>CBC with Differential: Marked leukocytosis with a left shift (high bands/immature neutrophils).</li>\n<li>Procalcitonin (PCT): Elevated levels, strongly confirming a localized or systemic bacterial infection rather than viral or inflammatory origins.</li>\n<li>Sputum Culture &amp; Gram Stain: Positive for specific bacterial pathogens (e.g., Streptococcus pneumoniae, Haemophilus influenzae, Pseudomonas) along with abundant sheets of polymorphonuclear neutrophils (PMNs).</li>\n<li><strong>Imaging</strong>: Chest X-ray revealing dense lobar consolidation, air bronchograms, or fluid-filled cavitary lesions.</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Clear heat/fire</li>\n<li>Resolve phlegm (cooling)</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Arisaema (Dan nan xing)</li>\n<li>Chinese skullcap (Huang qin)</li>\n<li>Trichosanthes seed (Gua lou ren)</li>\n<li>Bitter orange (Zhi shi)</li>\n<li>Houttuynia (Yu xing cao)</li>\n<li>Honeysuckle (Jin yin hua)</li>\n<li>Forsythia fruit (Lian qiao)</li>\n<li>Isatis root (Ban lan gen)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Andrographis (<em>Andrographis paniculata</em>)</li>\n<li>Echinacea (<em>E. angustifolia</em>, <em>E. purpurea</em>)</li>\n<li>Baptisia (<em>Baptisia tinctoria</em>)</li>\n<li>Phytolacca (<em>Phytolacca americana</em>)</li>\n<li>Usnea (<em>Usnea barbata</em>)</li>\n<li>Hyssop (<em>Hyssopus officinalis</em>)</li>\n<li>Coleus (<em>Coleus forskohlii</em>)</li>\n<li>Self-heal (<em>Prunella vulgaris</em>)</li>\n<li>Peach leaf (<em>Prunus persica</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Qing Qi Hua Tan Wan</strong> (Clear the Qi and Transform Phlegm Pills)</p>\n<ul>\n<li>Gua lou ren (Trichosanthes seed)</li>\n<li>Dan nan xing (Arisaema)</li>\n<li>Huang qin (Chinese skullcap)</li>\n<li>Zhi shi (Bitter orange)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Fu ling (Poria)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Ban xia (Pinellia)</li>\n</ul>\n<p><strong>Ting Li Da Zao Xie Fei Tang</strong> (Lepidium and Jujube Decoction to Drain the Lung)</p>\n<ul>\n<li>Ting li zi (Lepidium seed)</li>\n<li>Da zao (Jujube)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LU 10, LU 5, DU 14, UB 13, LI 4, RN 17</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C, D</li>\n<li>Minerals/Metals: Ag, Cu</li>\n<li>Other: N-acetylcysteine (mucolytic support)</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Echinacea angustifolia<br />\n10 Andrographis<br />\n10 Chinese skullcap<br />\n5 Usnea<br />\n5 Platycodon <br />\n5 Apricot seed<br />\n5 Asclepias<br />\n5 Lobelia<br />\n5 Prunella</p>\n<p>Oligo: Ag, Cu</p>"}], "id": "lung__p2"}, {"category": "Yang Deficiency", "subtitle": "External · Upper Respiratory · Wind-Cold", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Acute hypometabolic vasoconstriction — a local deficiency of metabolic-immune (Yang) activity in the upper respiratory field, not an invading excess (Cold Deficiency, Upper focus).</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Vasoconstriction</li>\n<li>Localized hypothermia of the upper respiratory tract</li>\n<li>Delayed early-phase viral clearance due to poor local perfusion</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Down-regulated eNOS (suppressed nitric oxide/vasodilation), delayed IFN−α/β expression, and initial up-regulation of cyclooxygenase-2 (COX−2).</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Acute cough with thin, clear, watery, or white frothy sputum. Pronounced aversion to cold, goosebumps, low-grade fever (where the chills clearly outweigh the fever), a total lack of sweating, sneezing, nasal congestion with clear watery discharge, and a dull, occipital headache radiating down the neck.</p>"}, {"label": "Tongue", "value": "<p>Normal body color with a thin, white, and moist/wet coating.</p>"}, {"label": "Pulse", "value": "<p>Floating (Fu) and Tight (Jin), feeling superficial, bouncy, and rigid like a stretched wire.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Sudden onset with cold exposure. Worse in cold/damp weather, mornings.<br />\n&gt; warmth, rest, covering up<br />\n&lt; wind, cold exposure, drafts</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Diffuse body aches, occipital headache radiating into neck/shoulders, stiffness with chills, muscle tension from shivering.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A desire to withdraw, curl up under blankets, and avoid stimulation. Mental processes may feel temporarily sluggish or foggy, mirroring the constricting, slowing nature of pathogenic Cold.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>The early incubation phase of the common cold (Rhinovirus, Coronavirus)</li>\n<li>Acute viral rhinopharyngitis</li>\n<li>Cold-induced asthma flares</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Complete Blood Count (CBC): Normal white blood cell (WBC) count or mild leukopenia with relative lymphocytosis, typical of an early viral process.</li>\n<li>Multiplex PCR Respiratory Panel: Positive for common respiratory viruses (Rhinovirus, RSV) without bacterial markers.</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Warming diaphoretics</li>\n<li>Pungent stimulants (these address lower respiratory tract Yang deficiency)</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Ephedra (Ma huang)</li>\n<li>Cinnamon twig (Gui zhi)</li>\n<li>Ginger, fresh (Sheng jiang)</li>\n<li>Perilla leaf (Su ye)</li>\n<li>Saposhnikoviae (Fang feng)</li>\n<li>Angelica dahaurica (Bai zhi)</li>\n<li>Notopterygii (Qiang huo)</li>\n<li>Wild ginger (Xi xin)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Elecampane (<em>Inula helenium</em>)</li>\n<li>Khella (<em>Ammi visnaga</em>)</li>\n<li>Osha / Bear Root (<em>Ligusticum porteri</em>)</li>\n<li>Mugwort (<em>Artemisia vulgaris</em>)</li>\n<li>Garlic (<em>Allium sativum</em>)</li>\n<li>Lomatium (<em>Lomatium dissectum</em>)</li>\n<li>Angelica (<em>Angelica archangelica</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>San Ao Tang</strong> (Three Unbinding Decoction)</p>\n<ul>\n<li>Ma huang (Ephedra)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Gan cao (Licorice, raw)</li>\n</ul>\n<p><strong>Ma Huang Tang</strong> (Ephedra Decoction)</p>\n<ul>\n<li>Ma huang (Ephedra)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>GB 20, LU 7, LI 4, DU 14, UB 12, UB 13</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C, D</li>\n<li>Minerals/Metals: Zn, Se</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Osha<br />\n10 Elderflower<br />\n10 Khella<br />\n10 Perilla leaf<br />\n10 Saposhnikoviae (Fang feng)<br />\n5 Ginger<br />\n5 Cinnamon twig</p>\n<p>Oligo: Zn</p>"}], "id": "lung__p3"}, {"category": "Yang Deficiency", "subtitle": "Internal · Lower Respiratory · Cold", "fields": [{"label": "Primary Biological Axis", "value": "<p>Two aspects to <strong>Lung Yang</strong>: </p>\n<ul>\n<li><strong>Thyroid hormones</strong> (Lung Yang): </li>\n<li><strong>Adrenal androgens</strong> (Kidney Yang): DHEA/testosterone</li>\n</ul>\n<p>Both are important to maintain overall lung metabolism</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Mucociliary Arrest: Localized ATP deficit reduces bronchial ciliary beat frequency (CBF)</li>\n<li>Aqueous Overflow: Downregulated T3​ suppresses epithelial sodium transport and aquaporins, triggering interstitial fluid pooling (alveolar edema) </li>\n<li>Immune Senescence: Metabolic exhaustion in alveolar macrophages stunts phagocytosis </li>\n<li>Surfactant Failure: ATP exhaustion in Type II pneumocytes compromises alveolar surface tension, leading to micro-atelectasis</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Downregulated: PPARGC1A (PGC-1alpha, mitochondrial biogenesis), UCP2 (uncoupling protein 2, thermogenesis), ATP5F1A (ATP synthase), AQP1 &amp; AQP5 (aquaporin channels), THRA &amp; THRB (thyroid receptors), AR (androgen receptor), PRKAA1 (AMPK, metabolic sensor).</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Chronic cough with profuse, clear, watery, or frothy white sputum. Shortness of breath (dyspnea) made worse by cold air or inactivity. Deep-seated chill in the upper back and chest. Cold extremities, bright pale/dusky complexion, lack of thirst, and spontaneous sweating under minimal exertion.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen, and flabby tongue body with scalloped/toothmarked margins. Overly wet, moist, or slippery white coating.</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen), Weak/Thready (Ru), and Slow (Chi) or Slippery (Hua).</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset. Worse in winter, cold/damp climates, and mornings before the body \"warms up.\"<br />\n&gt; warmth, rest, gentle movement<br />\n&lt; cold, overexertion, sleep deprivation</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized heaviness and weakness in the limbs, cold extremities with muscle stiffness, slowed reflexes, low back/knee weakness (Kidney-Yang territory).</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Low drive and motivation mirroring the metabolic slowing beneath it — mental heaviness, torpor, apathy, and cold-intolerance bleeding into mood. A sense of being \"banked low\": reluctance to initiate, diminished will-forces, reduced enthusiasm even for previously engaging tasks.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Hypothyroidism-induced respiratory dysfunction (subclinical interstitial pulmonary edema, reduced surfactant)</li>\n<li>Stable Chronic Obstructive Pulmonary Disease (COPD) with mitochondrial decay</li>\n<li>Senile emphysema with adrenal/androgenic decline (DHEA collapse)</li>\n<li>Chronic wet asthma</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>TSH elevated with free T3/T4 low-normal or low; possibly elevated reverse T3.</li>\n<li>DHEA-S low; morning cortisol low-normal.</li>\n<li>Consider ferritin if fatigue is prominent.</li>\n</ul>"}, {"label": "Herb Classes", "value": "<p><strong>Lung:</strong></p>\n<ul>\n<li>Warm diaphoretics</li>\n<li>Pungent stimulants</li>\n<li>Stop cough (warm)</li>\n</ul>\n<p><strong>Kidney:</strong></p>\n<ul>\n<li>Warm adaptogens</li>\n<li>Phytoandrogens</li>\n</ul>\n<p><strong>Chinese herbs</strong>:<br />\n<em>Pungent stimulants</em></p>\n<ul>\n<li>Dried ginger (Gan jiang)</li>\n<li>Asarum (Xi xin)</li>\n<li>Ephedra (Ma huang)</li>\n<li>Pinellia (Ban xia)</li>\n</ul>\n<p>See: Kidney Yang Tonics</p>\n<p><strong>Western herbs</strong>:<br />\n<em>Pungent stimulants</em></p>\n<ul>\n<li>Asclepias / Pleurisy Root (<em>Asclepias tuberosa</em>)</li>\n<li>Yerba Santa (<em>Eriodictyon californicum</em>)</li>\n<li>Acorus / Calamus root (<em>Acorus calamus</em>)</li>\n<li>Black seed (<em>Nigella sativa</em>)</li>\n<li>Cardamom (<em>Elettaria cardamomum</em>)</li>\n<li>Skunk cabbage (<em>Symplocarpus foetidus</em>)</li>\n<li>Aspidosperma (<em>Aspidosperma quebracho-blanco</em>)</li>\n<li>Horseradish (<em>Armoracia rusticana</em>)</li>\n<li>Black mustard (<em>Brassica nigra</em>)</li>\n<li>Spruce / Thuja / Pine (<em>Picea</em> spp. / <em>Thuja occidentalis</em> / <em>Pinus</em> spp.)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><em>Lung Yang Support</em><br />\n<strong>Gan Cao Gan Jiang Tang</strong> (Licorice and Ginger Decoction) — direct, acute warming of the local thyroid \"gate\"</p>\n<ul>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Pao jiang (Blast-fried ginger)</li>\n</ul>\n<p><strong>Xiao Qing Long Tang</strong> (Minor Blue-Green Dragon Decoction) — emergency mobilize-and-clear formula for cold-fluid excess; strong sympathomimetic up-regulation</p>\n<ul>\n<li>Ma huang (Ephedra)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Gan jiang (Dried ginger)</li>\n<li>Xi xin (Asarum)</li>\n<li>Wu wei zi (Schisandra)</li>\n<li>Bai shao (White peony)</li>\n<li>Ban xia (Pinellia)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>\n<p><em>Kidney Yang Support</em><br />\n<strong>Jin Kui Shen Qi Wan</strong> (Kidney Qi Pill from the Golden Cabinet) — systemic, long-term adrenal/androgen \"Kidney Yang\" support for chronic respiratory tissue wasting</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Fu ling (Poria)</li>\n<li>Ze xie (Alisma)</li>\n<li>Mu dan pi (Moutan)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Fu zi (Prepared aconite)</li>\n</ul>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: I, Se, Zn, Au</li>\n<li>Other: DHEA precursor support if clinically indicated; Iron if anemic</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Pinellia<br />\n10 Angelica archangelica<br />\n10 Black seed (Nigella)<br />\n10 Skunk cabbage<br />\n5 Asarum<br />\n5 Ginger<br />\n5 Yerba santa<br />\n5 Thyme</p>\n<p>Oligo: Au</p>"}], "id": "lung__p4"}, {"category": "Qi Deficiency", "subtitle": "", "fields": [{"label": "Primary Biological Axis", "value": "<ul>\n<li>Autonomic (Qi Axis): Sympathetic Nervous System (SNS) Hypoactivity leaving flaccid vagal tone dominant.</li>\n</ul>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Suppressed mitochondrial biogenesis, downregulated ATP synthesis</li>\n<li>Impaired innate mucosal immunity (Wei Qi barrier dysfunction)</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>AMPK/mTOR, PGC-1α (mitochondrial biogenesis), Nrf2 (cellular resilience), and down-regulated IFN−γ.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Shortness of breath on mild exertion, soft/weak voice, spontaneous daytime sweating, susceptibility to frequent infections.</p>"}, {"label": "Tongue", "value": "<ul>\n<li>Pale body</li>\n<li>Often swollen</li>\n<li>Teeth marks (indentations) on margins</li>\n<li>Thin, moist, white coating.</li>\n</ul>"}, {"label": "Pulse", "value": "<p>Empty (Xu) or Weak (Ruo), notably soft and lacking structural force, particularly in the right Cun (front/pulmonary) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, worsens with exertion and as the day progresses. Lung time 3-5 AM — early waking, fatigue on rising.<br />\n&gt; rest, gentle breathing exercises<br />\n&lt; overexertion, prolonged talking/singing, cold/damp</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized fatigue-related muscle weakness, poor postural tone, shallow/weak diaphragmatic movement, slouched posture from low Qi.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Grief, sadness, or a lingering sense of melancholy that saps physical vitality. Individuals may display an lack of motivation, situational anxiety regarding their low energy, or withdrawal from social interactions due to physical vocal and respiratory fatigue.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Chronic Obstructive Pulmonary Disease (COPD)</li>\n<li>Early-stage congestive heart failure (where pulmonary circulation lacks force)</li>\n<li>Chronic fatigue syndrome (ME/CFS)</li>\n<li>Recovering stages of acute viral bronchitis/pneumonia</li>\n<li>Allergic rhinitis</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Pulmonary Function Tests (PFTs): Reduced FEV1​ (Forced Expiratory Volume in 1 second) and FVC (Forced Vital Capacity) indicating diminished lung volume or airflow restriction.</li>\n<li>Immunological Profiles: Low total serum IgG or specific IgG subclasses, pointing to an impaired immune defense.</li>\n<li>Metabolic Markers: Lowered morning cortisol or sub-optimal thyroid panels (Free T3​/T4​) that mimic low systemic energetic drive.</li>\n</ul>"}, {"label": "Herb Classes", "value": "<p><em>Stimulant bitters</em></p>\n<p><strong>Chinese herbs</strong>:<br />\n<em>Note: although these are often cited as Kidney Qi tonics, note that they mostly support the HPA-axis (warm adaptogens--best for Kidney Qi and Yang deficiency)</em></p>\n<ul>\n<li>Astragalus (Huang qi)</li>\n<li>Ginseng (Ren shen)</li>\n<li>American ginseng</li>\n<li>Codonopsis (Dang shen)</li>\n<li>Eleutherococcus (Ci wu jia)</li>\n<li>Schisandra (Wu wei zi)</li>\n<li>Rhodiola (Hong jing tian)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Elecampane (<em>Inula helenium</em>)</li>\n<li>Verbascum / Mullein (<em>Verbascum thapsus</em>)</li>\n<li>Grindelia (<em>Grindelia camporum</em>)</li>\n<li>Tussilago / Coltsfoot (<em>Tussilago farfara</em>)</li>\n<li>Boneset (<em>Eupatorium perfoliatum</em>)</li>\n<li>Angelica (<em>Angelica archangelica</em>)</li>\n<li>Lovage (<em>Levisticum offincale</em>)</li>\n<li>Khella (<em>Ammi visnaga</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Bu Fei Tang</strong> (Tonify the Lung Decoction)</p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Huang qi (Astragalus)</li>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Wu wei zi (Schisandra)</li>\n<li>Zi wan (Aster)</li>\n<li>Sang bai pi (Mulberry root bark)</li>\n</ul>\n<p><strong>Yu Ping Feng San</strong> (Jade Windscreen Powder)</p>\n<ul>\n<li>Huang qi (Astragalus)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fang feng (Saposhnikovia)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>UB 13, UB 43, LU 7, LU 9, ST 36, SP 6</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D, B-complex</li>\n<li>Minerals/Metals: Zn, Se, Cu</li>\n<li>Other: astragalus polysaccharides (adaptogenic)</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Inula<br />\n10 Verbascum<br />\n10 Grindelia<br />\n10 Boneset<br />\n10 Tussilago <br />\n5 Khella<br />\n5 Horehound </p>\n<p>Oligo: Cu, Se</p>"}], "id": "lung__p5"}, {"category": "Qi Excess", "subtitle": "Constriction (Qi Stagnation)", "fields": [{"label": "Primary Biological Axis", "value": "<ul>\n<li>Autonomic (Qi Axis): SNS &amp; Sensory-Motor Hyper-reactivity</li>\n<li>Uncoordinated neurogenic tone.</li>\n</ul>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Hyperexpresson of airway nociceptors (TRPV1, TRPA1)</li>\n<li>Elevated Substance P/CGRP</li>\n<li>Localized spasmodic bronchospasms</li>\n<li>Receptor desensitization.</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>TRPV1, TRPA1 (nociceptor sensitization); Substance P, CGRP (neurogenic inflammation); elevated circulating catecholamines; reduced heart-rate variability/vagal tone.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Sensation of constriction, tightness or a \"blockage\" in the chest (Plum Pit Qi), frequent sighing, spasmodic ticklish cough.</p>"}, {"label": "Tongue", "value": "<p>Normal color, often a thin white coating; tip may appear slightly red or tremulous with anxiety.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian), tight, occasionally uneven with breath-holding; often faster when anxious.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Episodic, triggered by stress or emotion.<br />\n&gt; movement, breathing exercises, emotional expression<br />\n&lt; suppressed emotion, confined spaces, breath-holding</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Chest wall/intercostal tightness, diaphragmatic tension, upper trapezius and sternocleidomastoid (accessory breathing muscle) tension, tension headaches from breath-holding.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety, breath-holding, a subjective sense of being unable to get a full breath, hypervigilance toward bodily sensation, and a tendency toward catastrophizing that reinforces the somatic loop of panic and constriction.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Stress-induced bronchospasm</li>\n<li>Hyperventilation syndrome</li>\n<li>Asthma (cough-variant)</li>\n<li>Globus pharyngeus</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Positive methacholine challenge test</li>\n<li>Elevated circulating catecholamines or salivary cortisol</li>\n<li>Abnormal Esophageal Manometry</li>\n</ul>"}, {"label": "Herb Classes", "value": "<p><em>Lung nervines</em></p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Albizia (He huan hua)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Lobelia (<em>Lobelia inflata</em>)</li>\n<li>Drosera (<em>Drosera rotundifolia</em>)</li>\n<li>Wild Cherry Bark (<em>Prunus serotina</em>)</li>\n<li>Sweet Violet (<em>Viola odorata</em>)</li>\n<li>Passionflower (<em>Passiflora incarnata</em>)</li>\n<li>Lavender (<em>Lavandula angustifolia</em>)</li>\n<li>Verbena (<em>Verbena officinalis</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Ban Xia Hou Po Tang</strong> (Pinellia and Magnolia Bark Decoction) — classic Plum-Pit Qi formula for globus/constriction</p>\n<ul>\n<li>Ban xia (Pinellia)</li>\n<li>Hou po (Magnolia bark)</li>\n<li>Fu ling (Poria)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Zi su ye (Perilla leaf)</li>\n</ul>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: L-theanine (supportive nervine)</li>\n</ul>"}], "id": "lung__p6"}, {"category": "Yin Deficiency", "subtitle": "External · Acute Dryness", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Acute external mucosal desiccation.</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Acute environmental evaporation of airway surface liquid + sudden tight junction disruption</li>\n<li>Acute upregulation of TRPV1/TRPA1 airway nociceptors due to environmental irritants</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Claudins/Occludins (tight junction breakdown), transient receptor potential channels (TRPV1/TRPA1 up-regulation causing the dry tickle), and acute mucin depletion.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Sudden onset dry cough, parched nose/lips, scratchy throat, dry skin, acute aversion to wind. Normal or slightly red tongue with a dry, rough, moisture-depleted coating; Floating-Thin (Fu Xi) pulse.</p>"}, {"label": "Tongue", "value": "<p>Normal or slightly red body color, but the surface coating is noticeably dry, rough, and parched, lacking normal salivation.</p>"}, {"label": "Pulse", "value": "<p>Floating-Thin (Fu Xi) or Floating-Rapid (Fu Shuo), sitting superficially on the vessel wall but feeling narrow in diameter.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Sudden onset with dry environmental exposure (wildfire smoke, dry season, air travel). Worse in dry climates, autumn.<br />\n&gt; humidification, hydration<br />\n&lt; dry wind, low humidity, smoke</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Dry, tight sensations in the throat and chest musculature; occasional dry-cough-induced rib/intercostal strain; dry skin and scalp tension.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Restlessness and irritability from the acute discomfort of dryness — a felt sense of being parched and depleted, short temper driven by the sheer physical irritation of a dry, tickling throat and cough.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Acute tracheobronchitis triggered by low-humidity environments</li>\n<li>Dry-air induced airway hyperresponsiveness</li>\n<li>Acute irritation from smoke inhalation (wildfires, industrial pollutants)</li>\n<li>Early-stage viral pharyngitis/laryngitis before exudate forms</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Sputum Cytology showing sloughed epithelial cells without purulent inflammatory cells</li>\n<li>Transiently elevated Serum Osmolality</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Demulcents</li>\n<li>Consider: Kidney Yin tonics</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Mulberry leaf (Sang ye)</li>\n<li>Gypsum (Shi gao)</li>\n<li>Ass hide (E jiao)</li>\n<li>Black sesame seed (He zhi ma)</li>\n<li>Apricot kernel (Xing ren)</li>\n<li>Glenia (Sha shen)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Marshmallow root (<em>Althaea officinalis</em>)</li>\n<li>Mullein leaf (<em>Verbascum thapsus</em>)</li>\n<li>Plantain leaf (<em>Plantago major</em>)</li>\n<li>Slippery elm (<em>Ulmus rubra</em>)</li>\n<li>Irish moss (<em>Chondrus crispus</em>)</li>\n</ul>\n<p>Supportive: omega-3 fatty acids, antioxidant-rich food, hydration, restorative rest.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Qing Zao Jiu Fei Tang</strong> (Eliminate Dryness and Rescue the Lung Decoction)</p>\n<ul>\n<li>Sang ye (Mulberry leaf)</li>\n<li>Shi gao (Gypsum)</li>\n<li>E jiao (Ass hide)</li>\n<li>Hei zhi ma (Black sesame seed)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Pi pa ye (Loquat leaf)</li>\n<li>Gan cao (Licorice)</li>\n</ul>\n<p><strong>Sang Xing Tang</strong> (Mulberry Leaf and Apricot Kernel Decoction)</p>\n<ul>\n<li>Sang ye (Mulberry leaf)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Sha shen (Glenia)</li>\n<li>Zhe bei mu (Fritillaria)</li>\n<li>Dan dou chi (Fermented soybean)</li>\n<li>Zhi zi pi (Gardenia peel)</li>\n<li>Li pi (Pear peel)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LU 9, SP 6, LU 5, KI 6, LI 11, LI 4, DU 14</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: A, C</li>\n<li>Minerals/Metals: Cu</li>\n<li>Other: Omega-3s, adequate hydration/electrolytes</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Verbascum<br />\n10 Plantain leaf<br />\n10 Irish moss<br />\n10 Apricot seed<br />\n5 Slippery elm<br />\n5 Marshmallow (root)<br />\n5 Mulberry (leaf)<br />\n5 Licorice</p>\n<p>Oligo: Cu</p>"}], "id": "lung__p7"}, {"category": "Yin Deficiency", "subtitle": "Internal · Chronic Dryness", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Chronic structural fluid depletion &amp; tissue atrophy.</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Tissue atrophy, chronic low-grade cellular senescence, loss of mucosal barrier integrity</li>\n<li>Uncoupled hyper-reactivity (Empty Heat)</li>\n<li><strong>Estrogen</strong> deficiency</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Down-regulated mucin genes (MUC5AC), up-regulated chronic inflammatory cytokines (IL−6, TNF−α) without an active pathogen, and dysregulated aquaporins (AQP5).</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Chronic dry cough with scant, highly tenacious or blood-streaked sputum, dry throat/mouth, malar flush, night sweats, heat in the palms, soles, and chest (five-center heat).</p>"}, {"label": "Tongue", "value": "<p>Red body, thin, dry, with a peeled or completely absent coating (Mirror Tongue), or cracked, particularly in the anterior third (the Lung reflective zone).</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), feeling like a fine, taut thread ticking at an accelerated rate under the fingers.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset. Worse afternoon/evening (five-center heat pattern), worse in dry seasons.<br />\n&gt; rest, cooling/moistening foods, quiet evenings<br />\n&lt; overwork, heat exposure, insufficient sleep</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized wasting/thinness, low back and knee weakness (Kidney-Yin overlap), nighttime muscle cramping (fluid-tendon deficiency), restless legs.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Chronic restlessness, vague hyper-reactivity, a feeling of running on empty, or a \"tired but wired\" state of mind. The lack of grounding Yin allows the mind to float, manifesting as evening insomnia, racing thoughts, and systemic irritability.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Pulmonary Tuberculosis</li>\n<li>Idiopathic Pulmonary Fibrosis</li>\n<li>Sjogren's Syndrome with respiratory involvement</li>\n<li>Post-radiation pneumonitis</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Elevated ESR or CRP</li>\n<li>Positive Anti-SSA/SSB antibodies</li>\n<li>High-Resolution Chest CT showing fibrotic changes or ground-glass opacities</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Phytoestrogens (Kidney Yin herbs)</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Lily bulb (Bai he)</li>\n<li>Rehmannia (raw &amp; prep)</li>\n<li>Ophiopogon (Mai men dong)</li>\n<li>Licorice (Gan cao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>See Kidney Yin herbs (phytoestrogens)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Bai He Gu Jing Tang</strong></p>\n<ul>\n<li>Bai he (Lily bulb)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Bei mu (Fritillaria)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Bai shao (White peony)</li>\n<li>Xuan shen (Scrophularia)</li>\n<li>Jie geng (Platycodon)</li>\n<li>Gan cao (Licorice)</li>\n</ul>\n<p><strong>Sha Shen Mai Dong Tong</strong></p>\n<ul>\n<li>Sha shen (Glenia)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Yu zhu (Solomon's seal)</li>\n<li>Tian hua fen (Trichosanthes root)</li>\n<li>Sang ye (Mulberry leaf)</li>\n<li>Bian dou (Hyacinth bean)</li>\n<li>Gan cao (Licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LU 9, LU 5, UB 13, UB 43, SP 6, KI 3, KI 6</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: E</li>\n<li>Other: Omega-3 fatty acids, N-acetylcysteine, adequate hydration; consider antioxidant/glutathione-precursor support given the oxidative and senescence component</li>\n</ul>"}], "id": "lung__p8"}, {"category": "Yin Excess", "subtitle": "Phlegm-Damp", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Excess fluid accumulation and transport failure.</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Hypersecretion of low-viscosity or gel-like mucins</li>\n<li>Impaired ciliary beat frequency</li>\n<li>Metabolic stagnation (often linked to Spleen/insulin resistance networks)</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Up-regulated MUC5AC and MUC5B mucin genes, down-regulated FOXA2 (which normally suppresses mucus production), and elevated metabolic leukotrienes.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Chronic cough with copious, white, thick, sticky or easy-to-expectorate sputum, chest oppression, systemic heaviness, mental fog. Pale, swollen tongue with thick, white, greasy coating; Slippery (Hua) pulse.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen, or enlarged body with a thick, white, greasy, or sticky coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Soggy/Soft (Ru), rolling smoothly under the fingers like pearls sliding through a basin.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual, chronic accumulation. Worse in damp weather, mornings (phlegm pooling overnight), after heavy or greasy meals.<br />\n&gt; warmth, movement, dry weather<br />\n&lt; damp, cold, dairy/sugar, sedentary periods</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Heavy, achy limbs; generalized heaviness and lethargy in the muscles; possible joint stiffness with damp; puffy, edema-like fullness.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Profound mental fog, subjective \"heaviness\" of thought, difficulty concentrating, and complacency. The accumulation of Dampness blankets the cognitive faculties, leading to a state of mental dampening or inertia.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Chronic Bronchitis (COPD \"blue bloater\")</li>\n<li>Bronchiectasis</li>\n<li>Chronic post-nasal drip (UACS)</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>High concentration of mucin on Sputum Analysis</li>\n<li>Chest X-ray/CT showing increased bronchovascular markings, peribronchial cuffing, or hyperinflation</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Resolve lung damp/phlegm (warming)</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Pinellia (Ban xia)</li>\n<li>Tangerine peel (Chen pi)</li>\n<li>Mustard seed (Bai jie zi)</li>\n<li>Perilla seed (Su zi)</li>\n<li>Radish seed (Lai fu zi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Horehound (<em>Marrubium vulgare</em>)</li>\n<li>Hyssop (<em>Hyssopus officinalis</em>)</li>\n<li>Thyme (<em>Thymus vulgaris</em>)</li>\n<li>Sage (<em>Salvia officinalis</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Er Chen Tang</strong> (Two Cured Decoction)</p>\n<ul>\n<li>Ban xia (Pinellia)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Fu ling (Poria)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>\n<p><strong>San Zi Yang Qin Tang</strong> (Three-Seed Decoction to Nourish One's Parents)</p>\n<ul>\n<li>Bai jie zi (Mustard seed)</li>\n<li>Su zi (Perilla seed)</li>\n<li>Lai fu zi (Radish seed)</li>\n</ul>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Cr (if insulin-resistance-linked), Ca</li>\n<li>Other: Choline (fat metabolism support), inositol (if insulin-resistance-linked, per the noted Spleen/metabolic connection); reduce refined carbohydrate and dairy intake</li>\n</ul>"}], "id": "lung__p9"}, {"category": "Multi-Organ Patterns", "subtitle": "Lung / Kidney Yin Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Chronic cough with little sputum, dry mouth and throat, low back pain, night sweats, hot flashes, afternoon fever, constipation.</p>"}, {"label": "Tongue", "value": "<p>Red tongue with little or no coat.</p>"}, {"label": "Pulse", "value": "<p>Thin, rapid.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Eight Immortals Formula (Ba Xian Chang Shou Wan)</strong></p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Ze xie (Alisma)</li>\n<li>Fu ling (Poria)</li>\n<li>Mu dan pi (Moutan)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Wu wei zi (Schisandra)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LU 9, LU 5, KI 3, KI 6, SP 6</p>"}], "id": "lung__p10"}, {"category": "Multi-Organ Patterns", "subtitle": "Lung / Spleen Qi Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Weak voice, weak cough with sputum, shortness of breath, wheezing, poor appetite, abdominal distention, fatigue.</p>"}, {"label": "Tongue", "value": "<p>Pale tongue with thin, white coat.</p>"}, {"label": "Pulse", "value": "<p>Weak.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Six Gentlemen Formula (Liu Jun Zi Tang)</strong></p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fu ling (Poria)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Ban xia (Pinellia)</li>\n</ul>\n<p><strong>Ginseng and Astragalus Formula (Bu Zhong Yi Qi Tang)</strong></p>\n<ul>\n<li>Huang qi (Astragalus)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Sheng ma (Cimicifuga)</li>\n<li>Chai hu (Bupleurum)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>UB 13, SP 3, SP 6, LU 9, ST 36, UB 20</p>"}], "id": "lung__p11"}, {"category": "Multi-Organ Patterns", "subtitle": "Lung / Heart Qi Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Weak voice, weak cough, shortness of breath, dyspnea, palpitations, chest tightness or discomfort.</p>"}, {"label": "Tongue", "value": "<p>Pale.</p>"}, {"label": "Pulse", "value": "<p>Weak.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Baked Licorice Formula (Zhi Gan Cao Tang)</strong></p>\n<ul>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>E jiao (Ass hide)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Ma zi ren (Hemp seed)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Da zao (Jujube)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 7, LU 9, UB 13, UB 15, PC 6, CV 17</p>"}], "id": "lung__p12"}]}, {"slug": "liv-gb", "title": "Liver-Biliary System", "subtitle": "", "character": "", "order": 2, "preface": [], "conditions": [], "conditionsIntro": "", "patterns": [{"category": "Yang Excess", "subtitle": "Liver Fire Blazing", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Acute hyperinflammatory, hyperadrenergic surge concentrated in the hepatobiliary and upper-body vasculature.</p>"}, {"label": "Pathophysiology", "value": "<p>Acute hepatic and biliary inflammatory cascade with elevated portal inflammatory tone; hyperadrenergic/hypercortisolemic activation driving vasodilation in the head and upper body; disrupted bile flow with cholestatic irritation.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>NF-κB activation, elevated hepatic IL-6/TNF-α, COX-2 upregulation, elevated circulating catecholamines and cortisol, transient endothelial nitric oxide surge in cephalic vasculature.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Sudden, severe, throbbing headache (temporal or vertex), red face and eyes, bitter taste in the mouth, marked thirst, constipation, dark scanty urine, sudden loud tinnitus, insomnia, explosive irritability or rage, and in severe cases nosebleed or hematemesis.</p>"}, {"label": "Tongue", "value": "<p>Red body, especially at the sides, with a thick, dry, yellow coating.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian) and Rapid (Shuo), forceful and taut, most pronounced at the left Guan (middle/Liver) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Sudden onset, often precipitated by anger, frustration, or alcohol. Worse afternoon/evening.<br />\n&gt; cooling, rest, emotional release<br />\n&lt; anger, alcohol, greasy or spicy food, heat exposure</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Severe head, neck, and shoulder tension; jaw clenching; possible acute muscle spasm accompanying the headache.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Explosive anger, rage, and acute agitation — the classic TCM presentation of the Hun (Ethereal Soul) driven into overt excess; poor impulse control while the fire is active.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Acute hepatitis flare, acute cholecystitis, hypertensive urgency/crisis, acute angle-closure glaucoma, thyrotoxic crisis, acute manic or agitated psychiatric presentations.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Liver Function Panel: Elevated AST/ALT, elevated GGT.</p>\n<p>Inflammatory Markers: Elevated hs-CRP, leukocytosis.</p>\n<p>Endocrine: Elevated morning cortisol, elevated urinary catecholamines; TSH suppressed with elevated free T4 if thyrotoxic.</p>"}, {"label": "Herb Classes", "value": "<p>Clear Liver fire, drain fire downward</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Gentiana (Long dan cao)</li>\n<li>Chinese skullcap (Huang qin)</li>\n<li>Gardenia (Zhi zi)</li>\n<li>Bupleurum (Chai hu)</li>\n<li>Alisma (Ze xie)</li>\n<li>Plantain seed (Che qian zi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Milk Thistle (<em>Silybum marianum</em>)</li>\n<li>Dandelion Root (<em>Taraxacum officinale</em>)</li>\n<li>Barberry (<em>Berberis vulgaris</em>)</li>\n<li>Oregon Grape (<em>Mahonia aquifolium</em>)</li>\n<li>Gentian (<em>Gentiana lutea</em>)</li>\n<li>Greater Celandine (<em>Chelidonium majus</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Long Dan Xie Gan Tang</strong> (Gentiana Longdancao Decoction to Drain the Liver)</p>\n<ul>\n<li>Long dan cao (Gentiana)</li>\n<li>Huang qin (Chinese skullcap)</li>\n<li>Zhi zi (Gardenia)</li>\n<li>Ze xie (Alisma)</li>\n<li>Mu tong (Akebia)</li>\n<li>Che qian zi (Plantain seed)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Chai hu (Bupleurum)</li>\n<li>Gan cao (Licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 2, GB 43, GB 20, LI 11, LR 3, GB 34</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: Magnesium and taurine for hepatic/vascular calming; avoid alcohol and stimulants during acute flares</li>\n</ul>"}], "id": "liv-gb__p1"}, {"category": "Yang Excess", "subtitle": "Liver Yang Rising", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Sympathetic/vascular hyperactivity at the \"branch,\" rooted in a Yin-deficient \"root\" (Liver/Kidney Yin deficiency failing to anchor Yang) — a deficiency-below, excess-above presentation categorized here by its presenting Yang-excess picture rather than its Yin-deficient origin.</p>"}, {"label": "Pathophysiology", "value": "<p>Chronic sympathetic overactivity and vasoconstriction with reduced baroreceptor sensitivity, developing against a background of declining gonadal/adrenal Yin reserve (estrogen or androgen decline); endothelial dysfunction and RAAS activation sustain the elevated vascular tone over time.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated angiotensin II signaling, reduced eNOS activity, elevated plasma renin/aldosterone in a subset, declining estrogen/testosterone receptor activity, elevated sympathetic outflow (reduced heart-rate variability).</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Dizziness and a sensation of the head being \"too full,\" tinnitus, distending headache concentrated at the vertex and temples, flushed face when angry, dry mouth, irritability, insomnia — with underlying weakness or soreness in the low back and knees betraying the Yin-deficient root beneath the excess presentation.</p>"}, {"label": "Tongue", "value": "<p>Red body, may be thinner or drier than in Liver Fire Blazing, with a thin yellow or patchy coating rather than a thick one.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian), but often thinner or weaker at the Chi (deep/Kidney) position than at the Guan (Liver) position — the pulse signature of excess above and deficiency below.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Fluctuating, worse with stress or emotional upset, often worse in spring (the Liver's associated season). Improves with rest and quiet.<br />\n&gt; rest, quiet, emotional calm<br />\n&lt; stress, sleep deprivation, overwork</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Neck and shoulder stiffness, tension headache radiating into the temples, occasional fine tremor of the hands.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Irritability, impatience, a headstrong or driven quality, difficulty relaxing even when physically at rest — restlessness with an exhausted undercurrent rather than the explosive rage of Liver Fire Blazing.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Essential hypertension (this pattern is TCM's classic correlate for it), menopausal hot flashes with concurrent hypertension, vertigo, early cerebrovascular risk/TIA.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Cardiovascular: Elevated systolic and diastolic blood pressure; reduced heart-rate variability.</p>\n<p>Endocrine: Low-normal or declining estradiol/testosterone for age; elevated homocysteine in some presentations.</p>\n<p>Vascular Imaging: Elevated carotid intima-media thickness where cerebrovascular risk is a concern.</p>"}, {"label": "Herb Classes", "value": "<p>Subdue Liver Yang, anchor Yang, extinguish wind</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Uncaria (Gou teng)</li>\n<li>Abalone shell (Shi jue ming)</li>\n<li>Chrysanthemum (Ju hua)</li>\n<li>Tribulus (Bai ji li)</li>\n<li>Gastrodia (Tian ma)</li>\n<li>Achyranthes (Niu xi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Linden Flower (<em>Tilia europaea</em>)</li>\n<li>Hawthorn (<em>Crataegus monogyna</em>)</li>\n<li>Motherwort (<em>Leonurus cardiaca</em>)</li>\n<li>European Mistletoe (<em>Viscum album</em>)</li>\n<li>Skullcap (<em>Scutellaria lateriflora</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Tian Ma Gou Teng Yin</strong> (Gastrodia and Uncaria Decoction)</p>\n<ul>\n<li>Tian ma (Gastrodia)</li>\n<li>Gou teng (Uncaria)</li>\n<li>Shi jue ming (Abalone shell)</li>\n<li>Zhi zi (Gardenia)</li>\n<li>Huang qin (Chinese skullcap)</li>\n<li>Chuan niu xi (Achyranthes)</li>\n<li>Du zhong (Eucommia)</li>\n<li>Yi mu cao (Leonurus)</li>\n<li>Sang ji sheng (Loranthus)</li>\n<li>Ye jiao teng (Polygonum vine)</li>\n<li>Fu shen (Poria with wood)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 3, GB 20, LI 4, KI 3, LR 2, Taiyang (extra point)</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Mg, K</li>\n<li>Other: CoQ10 and omega-3s for endothelial/vascular support</li>\n</ul>"}], "id": "liv-gb__p2"}, {"category": "Yang Deficiency", "subtitle": "Cold Stagnation in the Liver Channel", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Local hypometabolic vasoconstriction along the Liver channel's lower pathway (groin, genitals, lower abdomen) — a deficiency of metabolic-immune (Yang) activity in that specific territory, not an invading excess.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced pelvic and testicular perfusion from local vasospasm, blunted local androgen/metabolic activity, and impaired smooth-muscle relaxation in the reproductive vasculature under cold exposure.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced local nitric oxide-mediated vasodilation, cold-induced alpha-adrenergic vasoconstriction, blunted local androgen receptor signaling, reduced mitochondrial thermogenic output in pelvic adipose/smooth muscle.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Cold, dragging, or contracting pain in the lower abdomen, groin, or testicles, often with testicular retraction, markedly relieved by warmth and worsened by cold exposure; possible scrotal swelling or coldness to the touch.</p>"}, {"label": "Tongue", "value": "<p>Pale body with a white, moist coating.</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen), Wiry (Xian), and Slow (Chi), most pronounced at the left Guan or Chi position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious, markedly worse in cold weather or after cold exposure (cold water, sitting on cold surfaces). Worse in winter.<br />\n&gt; warmth, heat application, rest<br />\n&lt; cold exposure, cold drinks, damp-cold environments</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Cold-aggravated groin and lower-abdominal cramping, cold sensitivity in the lower limbs, occasional low back ache worse with cold.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Withdrawn affect, reduced libido and drive, a generally \"cold\" emotional presentation with diminished assertiveness — the Hun's outward-reaching quality dampened by cold rather than driven into excess.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Varicocele, chronic epididymitis (cold-type, non-infectious), hydrocele, cold-sensitive inguinal hernia, functional hypogonadism.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Reproductive/Endocrine: Low-normal or low testosterone; scrotal Doppler ultrasound showing reduced testicular arterial flow or venous reflux (varicocele).</p>\n<p>Imaging: Scrotal ultrasound for structural correlates (varicocele, hydrocele).</p>"}, {"label": "Herb Classes", "value": "<p>Warm the Liver channel, disperse cold, move Qi</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Evodia (Wu zhu yu)</li>\n<li>Fennel seed (Xiao hui xiang)</li>\n<li>Lindera (Wu yao)</li>\n<li>Cinnamon bark (Rou gui)</li>\n<li>Litchi seed (Li zhi he)</li>\n<li>Tangerine seed (Ju he)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Ginger (<em>Zingiber officinale</em>)</li>\n<li>Cinnamon (<em>Cinnamomum verum</em>)</li>\n<li>Cramp Bark (<em>Viburnum opulus</em>)</li>\n<li>Black Cohosh (<em>Actaea racemosa</em>)</li>\n<li>Angelica (<em>Angelica archangelica</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Nuan Gan Jian</strong> (Warm the Liver Decoction)</p>\n<ul>\n<li>Rou gui (Cinnamon bark)</li>\n<li>Wu yao (Lindera)</li>\n<li>Xiao hui xiang (Fennel seed)</li>\n<li>Fu ling (Poria)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Gou qi zi (Goji berry)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 8, CV 4, CV 6, SP 6, LR 1</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Zn</li>\n<li>Other: Warming, circulation-supportive nutrients (L-arginine, capsaicin-containing foods) if clinically tolerated</li>\n</ul>"}], "id": "liv-gb__p3"}, {"category": "Qi Excess", "subtitle": "Liver Qi Stagnation", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Sympathetic/enteric-nervous-system reactivity and visceral hypersensitivity, concentrated in the hepatobiliary and gastrointestinal territory.</p>"}, {"label": "Pathophysiology", "value": "<p>Autonomic dysregulation with heightened visceral hypersensitivity, gut-brain axis disruption, and reactive smooth-muscle tension in the biliary tree and GI tract; HPA-axis reactivity amplifies with sustained emotional stress.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated corticotropin-releasing hormone (CRH) signaling, altered gut motilin/CCK signaling, reduced heart-rate variability, elevated circulating catecholamines during flares, TRPV1 upregulation in visceral afferents contributing to hypersensitivity.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Distension and pain in the chest and hypochondrium, frequent sighing, a sensation of a lump in the throat, mood swings and irritability alternating with low mood, premenstrual breast tenderness and irregular menses, belching or acid reflux worsened by stress.</p>"}, {"label": "Tongue", "value": "<p>Normal or slightly purple body, often with a thin white coating; may appear normal between flares.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian) throughout, most pronounced at the left Guan (Liver) position, often shifting in strength with mood.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Fluctuates directly with mood and stress level; classically worse premenstrually. Better with movement, exercise, and emotional expression.<br />\n&gt; movement, exercise, emotional release, stress reduction<br />\n&lt; suppressed emotion, prolonged sitting, unresolved conflict</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Rib-side and hypochondriac tension, chest tightness, tension headaches, jaw clenching (TMJ), shoulder and neck tightness that eases with movement.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Frustration, mood swings, irritability alternating with a depressive undertone, frequent sighing as the body's own attempt to release the constrained Qi — the Hun's free, unobstructed movement is what's compromised here.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Irritable bowel syndrome, functional dyspepsia, GERD (Liver invading Stomach), premenstrual syndrome/PMDD, tension headache, fibrocystic breast changes, stress-reactive conditions generally.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Functional/Autonomic: Reduced heart-rate variability; elevated salivary or serum cortisol with a flattened diurnal curve.</p>\n<p>GI Workup: Typically normal endoscopy/imaging in isolated cases (a diagnosis of exclusion biomedically), supporting a functional rather than structural process.</p>"}, {"label": "Herb Classes", "value": "<p>Soothe Liver Qi, regulate Qi</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Bupleurum (Chai hu)</li>\n<li>Cyperus (Xiang fu)</li>\n<li>White peony (Bai shao)</li>\n<li>Tangerine peel (Chen pi)</li>\n<li>Curcuma (Yu jin)</li>\n<li>Mint (Bo he)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>St. John's Wort (<em>Hypericum perforatum</em>)</li>\n<li>Lemon Balm (<em>Melissa officinalis</em>)</li>\n<li>Motherwort (<em>Leonurus cardiaca</em>)</li>\n<li>Bitter Orange Peel (<em>Citrus aurantium</em>)</li>\n<li>Rose (<em>Rosa damascena</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Chai Hu Shu Gan San</strong> (Bupleurum Powder to Spread the Liver)</p>\n<ul>\n<li>Chai hu (Bupleurum)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Chuan xiong (Ligusticum)</li>\n<li>Xiang fu (Cyperus)</li>\n<li>Zhi ke (Bitter orange)</li>\n<li>Bai shao (White peony)</li>\n<li>Gan cao (Licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 3, LI 4, PC 6, GB 34, RN 17</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: L-theanine and magnesium for nervous-system regulation; regular aerobic movement as adjunct</li>\n</ul>"}], "id": "liv-gb__p4"}, {"category": "Qi Deficiency", "subtitle": "Gallbladder Qi Deficiency (Timidity)", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Reduced decisive/threat-response drive — the Gallbladder's classical \"governor of decision-making\" (胆主决断) function running weak.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced noradrenergic and dopaminergic drive supporting decisive action, a blunted cortisol response to acute stressors that paradoxically leaves threat-response calibration poorly regulated rather than resilient, and reduced prefrontal-limbic regulatory capacity under pressure.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced dopaminergic signaling in prefrontal decision-related circuits, blunted HPA-axis cortisol response to acute stressors, reduced noradrenergic tone.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Timidity, indecisiveness, susceptibility to fright, being easily startled, poor decision-making ability, insomnia with frequent dream-disturbed sleep, frequent sighing, a general lack of resolve or courage.</p>"}, {"label": "Tongue", "value": "<p>Pale or normal body, thin white coating.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian) but Thin (Xi) — lacking the fuller force of Liver Qi Stagnation's wiry pulse.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, constitutional, worse under pressure to decide or act quickly. Worse with fatigue and sleep deprivation.<br />\n&gt; reassurance, predictable low-pressure environments, adequate sleep<br />\n&lt; pressure to decide quickly, sudden fright, sleep deprivation</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Mild generalized tension from chronic low-grade anxiety, no significant structural pain.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Timidity and indecisiveness as the core presentation, easily startled, poor resolve — distinct from Liver Qi Stagnation's frustration/irrita
