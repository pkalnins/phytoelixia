, "value": "<p>Acute cough with thin, clear, watery, or white frothy sputum. Pronounced aversion to cold, goosebumps, low-grade fever (where the chills clearly outweigh the fever), a total lack of sweating, sneezing, nasal congestion with clear watery discharge, and a dull, occipital headache radiating down the neck.</p>"}, {"label": "Tongue", "value": "<p>Normal body color with a thin, white, and moist/wet coating.</p>"}, {"label": "Pulse", "value": "<p>Floating (Fu) and Tight (Jin), feeling superficial, bouncy, and rigid like a stretched wire.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Sudden onset with cold exposure. Worse in cold/damp weather, mornings.<br />\n&gt; warmth, rest, covering up<br />\n&lt; wind, cold exposure, drafts</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Diffuse body aches, occipital headache radiating into neck/shoulders, stiffness with chills, muscle tension from shivering.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A desire to withdraw, curl up under blankets, and avoid stimulation. Mental processes may feel temporarily sluggish or foggy, mirroring the constricting, slowing nature of pathogenic Cold.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>The early incubation phase of the common cold (Rhinovirus, Coronavirus)</li>\n<li>Acute viral rhinopharyngitis</li>\n<li>Cold-induced asthma flares</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Complete Blood Count (CBC): Normal white blood cell (WBC) count or mild leukopenia with relative lymphocytosis, typical of an early viral process.</li>\n<li>Multiplex PCR Respiratory Panel: Positive for common respiratory viruses (Rhinovirus, RSV) without bacterial markers.</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Warming diaphoretics</li>\n<li>Pungent stimulants (these address lower respiratory tract Yang deficiency)</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Ephedra (Ma huang)</li>\n<li>Cinnamon twig (Gui zhi)</li>\n<li>Ginger, fresh (Sheng jiang)</li>\n<li>Perilla leaf (Su ye)</li>\n<li>Saposhnikoviae (Fang feng)</li>\n<li>Angelica dahaurica (Bai zhi)</li>\n<li>Notopterygii (Qiang huo)</li>\n<li>Wild ginger (Xi xin)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Elecampane (<em>Inula helenium</em>)</li>\n<li>Khella (<em>Ammi visnaga</em>)</li>\n<li>Osha / Bear Root (<em>Ligusticum porteri</em>)</li>\n<li>Mugwort (<em>Artemisia vulgaris</em>)</li>\n<li>Garlic (<em>Allium sativum</em>)</li>\n<li>Lomatium (<em>Lomatium dissectum</em>)</li>\n<li>Angelica (<em>Angelica archangelica</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>San Ao Tang</strong> (Three Unbinding Decoction)</p>\n<ul>\n<li>Ma huang (Ephedra)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Gan cao (Licorice, raw)</li>\n</ul>\n<p><strong>Ma Huang Tang</strong> (Ephedra Decoction)</p>\n<ul>\n<li>Ma huang (Ephedra)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>GB 20, LU 7, LI 4, DU 14, UB 12, UB 13</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C, D</li>\n<li>Minerals/Metals: Zn, Se</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Osha<br />\n10 Elderflower<br />\n10 Khella<br />\n10 Perilla leaf<br />\n10 Saposhnikoviae (Fang feng)<br />\n5 Ginger<br />\n5 Cinnamon twig</p>\n<p>Oligo: Zn</p>"}], "id": "lung__p3"}, {"category": "Yang Deficiency", "subtitle": "Internal · Lower Respiratory · Cold", "fields": [{"label": "Primary Biological Axis", "value": "<p>Two aspects to <strong>Lung Yang</strong>: </p>\n<ul>\n<li><strong>Thyroid hormones</strong> (Lung Yang): </li>\n<li><strong>Adrenal androgens</strong> (Kidney Yang): DHEA/testosterone</li>\n</ul>\n<p>Both are important to maintain overall lung metabolism</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Mucociliary Arrest: Localized ATP deficit reduces bronchial ciliary beat frequency (CBF)</li>\n<li>Aqueous Overflow: Downregulated T3​ suppresses epithelial sodium transport and aquaporins, triggering interstitial fluid pooling (alveolar edema) </li>\n<li>Immune Senescence: Metabolic exhaustion in alveolar macrophages stunts phagocytosis </li>\n<li>Surfactant Failure: ATP exhaustion in Type II pneumocytes compromises alveolar surface tension, leading to micro-atelectasis</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Downregulated: PPARGC1A (PGC-1alpha, mitochondrial biogenesis), UCP2 (uncoupling protein 2, thermogenesis), ATP5F1A (ATP synthase), AQP1 &amp; AQP5 (aquaporin channels), THRA &amp; THRB (thyroid receptors), AR (androgen receptor), PRKAA1 (AMPK, metabolic sensor).</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Chronic cough with profuse, clear, watery, or frothy white sputum. Shortness of breath (dyspnea) made worse by cold air or inactivity. Deep-seated chill in the upper back and chest. Cold extremities, bright pale/dusky complexion, lack of thirst, and spontaneous sweating under minimal exertion.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen, and flabby tongue body with scalloped/toothmarked margins. Overly wet, moist, or slippery white coating.</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen), Weak/Thready (Ru), and Slow (Chi) or Slippery (Hua).</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset. Worse in winter, cold/damp climates, and mornings before the body \"warms up.\"<br />\n&gt; warmth, rest, gentle movement<br />\n&lt; cold, overexertion, sleep deprivation</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized heaviness and weakness in the limbs, cold extremities with muscle stiffness, slowed reflexes, low back/knee weakness (Kidney-Yang territory).</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Low drive and motivation mirroring the metabolic slowing beneath it — mental heaviness, torpor, apathy, and cold-intolerance bleeding into mood. A sense of being \"banked low\": reluctance to initiate, diminished will-forces, reduced enthusiasm even for previously engaging tasks.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Hypothyroidism-induced respiratory dysfunction (subclinical interstitial pulmonary edema, reduced surfactant)</li>\n<li>Stable Chronic Obstructive Pulmonary Disease (COPD) with mitochondrial decay</li>\n<li>Senile emphysema with adrenal/androgenic decline (DHEA collapse)</li>\n<li>Chronic wet asthma</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>TSH elevated with free T3/T4 low-normal or low; possibly elevated reverse T3.</li>\n<li>DHEA-S low; morning cortisol low-normal.</li>\n<li>Consider ferritin if fatigue is prominent.</li>\n</ul>"}, {"label": "Herb Classes", "value": "<p><strong>Lung:</strong></p>\n<ul>\n<li>Warm diaphoretics</li>\n<li>Pungent stimulants</li>\n<li>Stop cough (warm)</li>\n</ul>\n<p><strong>Kidney:</strong></p>\n<ul>\n<li>Warm adaptogens</li>\n<li>Phytoandrogens</li>\n</ul>\n<p><strong>Chinese herbs</strong>:<br />\n<em>Pungent stimulants</em></p>\n<ul>\n<li>Dried ginger (Gan jiang)</li>\n<li>Asarum (Xi xin)</li>\n<li>Ephedra (Ma huang)</li>\n<li>Pinellia (Ban xia)</li>\n</ul>\n<p>See: Kidney Yang Tonics</p>\n<p><strong>Western herbs</strong>:<br />\n<em>Pungent stimulants</em></p>\n<ul>\n<li>Asclepias / Pleurisy Root (<em>Asclepias tuberosa</em>)</li>\n<li>Yerba Santa (<em>Eriodictyon californicum</em>)</li>\n<li>Acorus / Calamus root (<em>Acorus calamus</em>)</li>\n<li>Black seed (<em>Nigella sativa</em>)</li>\n<li>Cardamom (<em>Elettaria cardamomum</em>)</li>\n<li>Skunk cabbage (<em>Symplocarpus foetidus</em>)</li>\n<li>Aspidosperma (<em>Aspidosperma quebracho-blanco</em>)</li>\n<li>Horseradish (<em>Armoracia rusticana</em>)</li>\n<li>Black mustard (<em>Brassica nigra</em>)</li>\n<li>Spruce / Thuja / Pine (<em>Picea</em> spp. / <em>Thuja occidentalis</em> / <em>Pinus</em> spp.)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><em>Lung Yang Support</em><br />\n<strong>Gan Cao Gan Jiang Tang</strong> (Licorice and Ginger Decoction) — direct, acute warming of the local thyroid \"gate\"</p>\n<ul>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Pao jiang (Blast-fried ginger)</li>\n</ul>\n<p><strong>Xiao Qing Long Tang</strong> (Minor Blue-Green Dragon Decoction) — emergency mobilize-and-clear formula for cold-fluid excess; strong sympathomimetic up-regulation</p>\n<ul>\n<li>Ma huang (Ephedra)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Gan jiang (Dried ginger)</li>\n<li>Xi xin (Asarum)</li>\n<li>Wu wei zi (Schisandra)</li>\n<li>Bai shao (White peony)</li>\n<li>Ban xia (Pinellia)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>\n<p><em>Kidney Yang Support</em><br />\n<strong>Jin Kui Shen Qi Wan</strong> (Kidney Qi Pill from the Golden Cabinet) — systemic, long-term adrenal/androgen \"Kidney Yang\" support for chronic respiratory tissue wasting</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Fu ling (Poria)</li>\n<li>Ze xie (Alisma)</li>\n<li>Mu dan pi (Moutan)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Fu zi (Prepared aconite)</li>\n</ul>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: I, Se, Zn, Au</li>\n<li>Other: DHEA precursor support if clinically indicated; Iron if anemic</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Pinellia<br />\n10 Angelica archangelica<br />\n10 Black seed (Nigella)<br />\n10 Skunk cabbage<br />\n5 Asarum<br />\n5 Ginger<br />\n5 Yerba santa<br />\n5 Thyme</p>\n<p>Oligo: Au</p>"}], "id": "lung__p4"}, {"category": "Qi Deficiency", "subtitle": "", "fields": [{"label": "Primary Biological Axis", "value": "<ul>\n<li>Autonomic (Qi Axis): Sympathetic Nervous System (SNS) Hypoactivity leaving flaccid vagal tone dominant.</li>\n</ul>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Suppressed mitochondrial biogenesis, downregulated ATP synthesis</li>\n<li>Impaired innate mucosal immunity (Wei Qi barrier dysfunction)</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>AMPK/mTOR, PGC-1α (mitochondrial biogenesis), Nrf2 (cellular resilience), and down-regulated IFN−γ.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Shortness of breath on mild exertion, soft/weak voice, spontaneous daytime sweating, susceptibility to frequent infections.</p>"}, {"label": "Tongue", "value": "<ul>\n<li>Pale body</li>\n<li>Often swollen</li>\n<li>Teeth marks (indentations) on margins</li>\n<li>Thin, moist, white coating.</li>\n</ul>"}, {"label": "Pulse", "value": "<p>Empty (Xu) or Weak (Ruo), notably soft and lacking structural force, particularly in the right Cun (front/pulmonary) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, worsens with exertion and as the day progresses. Lung time 3-5 AM — early waking, fatigue on rising.<br />\n&gt; rest, gentle breathing exercises<br />\n&lt; overexertion, prolonged talking/singing, cold/damp</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized fatigue-related muscle weakness, poor postural tone, shallow/weak diaphragmatic movement, slouched posture from low Qi.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Grief, sadness, or a lingering sense of melancholy that saps physical vitality. Individuals may display an lack of motivation, situational anxiety regarding their low energy, or withdrawal from social interactions due to physical vocal and respiratory fatigue.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Chronic Obstructive Pulmonary Disease (COPD)</li>\n<li>Early-stage congestive heart failure (where pulmonary circulation lacks force)</li>\n<li>Chronic fatigue syndrome (ME/CFS)</li>\n<li>Recovering stages of acute viral bronchitis/pneumonia</li>\n<li>Allergic rhinitis</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Pulmonary Function Tests (PFTs): Reduced FEV1​ (Forced Expiratory Volume in 1 second) and FVC (Forced Vital Capacity) indicating diminished lung volume or airflow restriction.</li>\n<li>Immunological Profiles: Low total serum IgG or specific IgG subclasses, pointing to an impaired immune defense.</li>\n<li>Metabolic Markers: Lowered morning cortisol or sub-optimal thyroid panels (Free T3​/T4​) that mimic low systemic energetic drive.</li>\n</ul>"}, {"label": "Herb Classes", "value": "<p><em>Stimulant bitters</em></p>\n<p><strong>Chinese herbs</strong>:<br />\n<em>Note: although these are often cited as Kidney Qi tonics, note that they mostly support the HPA-axis (warm adaptogens--best for Kidney Qi and Yang deficiency)</em></p>\n<ul>\n<li>Astragalus (Huang qi)</li>\n<li>Ginseng (Ren shen)</li>\n<li>American ginseng</li>\n<li>Codonopsis (Dang shen)</li>\n<li>Eleutherococcus (Ci wu jia)</li>\n<li>Schisandra (Wu wei zi)</li>\n<li>Rhodiola (Hong jing tian)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Elecampane (<em>Inula helenium</em>)</li>\n<li>Verbascum / Mullein (<em>Verbascum thapsus</em>)</li>\n<li>Grindelia (<em>Grindelia camporum</em>)</li>\n<li>Tussilago / Coltsfoot (<em>Tussilago farfara</em>)</li>\n<li>Boneset (<em>Eupatorium perfoliatum</em>)</li>\n<li>Angelica (<em>Angelica archangelica</em>)</li>\n<li>Lovage (<em>Levisticum offincale</em>)</li>\n<li>Khella (<em>Ammi visnaga</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Bu Fei Tang</strong> (Tonify the Lung Decoction)</p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Huang qi (Astragalus)</li>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Wu wei zi (Schisandra)</li>\n<li>Zi wan (Aster)</li>\n<li>Sang bai pi (Mulberry root bark)</li>\n</ul>\n<p><strong>Yu Ping Feng San</strong> (Jade Windscreen Powder)</p>\n<ul>\n<li>Huang qi (Astragalus)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fang feng (Saposhnikovia)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>UB 13, UB 43, LU 7, LU 9, ST 36, SP 6</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D, B-complex</li>\n<li>Minerals/Metals: Zn, Se, Cu</li>\n<li>Other: astragalus polysaccharides (adaptogenic)</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Inula<br />\n10 Verbascum<br />\n10 Grindelia<br />\n10 Boneset<br />\n10 Tussilago <br />\n5 Khella<br />\n5 Horehound </p>\n<p>Oligo: Cu, Se</p>"}], "id": "lung__p5"}, {"category": "Qi Excess", "subtitle": "Constriction (Qi Stagnation)", "fields": [{"label": "Primary Biological Axis", "value": "<ul>\n<li>Autonomic (Qi Axis): SNS &amp; Sensory-Motor Hyper-reactivity</li>\n<li>Uncoordinated neurogenic tone.</li>\n</ul>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Hyperexpresson of airway nociceptors (TRPV1, TRPA1)</li>\n<li>Elevated Substance P/CGRP</li>\n<li>Localized spasmodic bronchospasms</li>\n<li>Receptor desensitization.</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>TRPV1, TRPA1 (nociceptor sensitization); Substance P, CGRP (neurogenic inflammation); elevated circulating catecholamines; reduced heart-rate variability/vagal tone.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Sensation of constriction, tightness or a \"blockage\" in the chest (Plum Pit Qi), frequent sighing, spasmodic ticklish cough.</p>"}, {"label": "Tongue", "value": "<p>Normal color, often a thin white coating; tip may appear slightly red or tremulous with anxiety.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian), tight, occasionally uneven with breath-holding; often faster when anxious.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Episodic, triggered by stress or emotion.<br />\n&gt; movement, breathing exercises, emotional expression<br />\n&lt; suppressed emotion, confined spaces, breath-holding</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Chest wall/intercostal tightness, diaphragmatic tension, upper trapezius and sternocleidomastoid (accessory breathing muscle) tension, tension headaches from breath-holding.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety, breath-holding, a subjective sense of being unable to get a full breath, hypervigilance toward bodily sensation, and a tendency toward catastrophizing that reinforces the somatic loop of panic and constriction.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Stress-induced bronchospasm</li>\n<li>Hyperventilation syndrome</li>\n<li>Asthma (cough-variant)</li>\n<li>Globus pharyngeus</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Positive methacholine challenge test</li>\n<li>Elevated circulating catecholamines or salivary cortisol</li>\n<li>Abnormal Esophageal Manometry</li>\n</ul>"}, {"label": "Herb Classes", "value": "<p><em>Lung nervines</em></p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Albizia (He huan hua)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Lobelia (<em>Lobelia inflata</em>)</li>\n<li>Drosera (<em>Drosera rotundifolia</em>)</li>\n<li>Wild Cherry Bark (<em>Prunus serotina</em>)</li>\n<li>Sweet Violet (<em>Viola odorata</em>)</li>\n<li>Passionflower (<em>Passiflora incarnata</em>)</li>\n<li>Lavender (<em>Lavandula angustifolia</em>)</li>\n<li>Verbena (<em>Verbena officinalis</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Ban Xia Hou Po Tang</strong> (Pinellia and Magnolia Bark Decoction) — classic Plum-Pit Qi formula for globus/constriction</p>\n<ul>\n<li>Ban xia (Pinellia)</li>\n<li>Hou po (Magnolia bark)</li>\n<li>Fu ling (Poria)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Zi su ye (Perilla leaf)</li>\n</ul>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: L-theanine (supportive nervine)</li>\n</ul>"}], "id": "lung__p6"}, {"category": "Yin Deficiency", "subtitle": "External · Acute Dryness", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Acute external mucosal desiccation.</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Acute environmental evaporation of airway surface liquid + sudden tight junction disruption</li>\n<li>Acute upregulation of TRPV1/TRPA1 airway nociceptors due to environmental irritants</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Claudins/Occludins (tight junction breakdown), transient receptor potential channels (TRPV1/TRPA1 up-regulation causing the dry tickle), and acute mucin depletion.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Sudden onset dry cough, parched nose/lips, scratchy throat, dry skin, acute aversion to wind. Normal or slightly red tongue with a dry, rough, moisture-depleted coating; Floating-Thin (Fu Xi) pulse.</p>"}, {"label": "Tongue", "value": "<p>Normal or slightly red body color, but the surface coating is noticeably dry, rough, and parched, lacking normal salivation.</p>"}, {"label": "Pulse", "value": "<p>Floating-Thin (Fu Xi) or Floating-Rapid (Fu Shuo), sitting superficially on the vessel wall but feeling narrow in diameter.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Sudden onset with dry environmental exposure (wildfire smoke, dry season, air travel). Worse in dry climates, autumn.<br />\n&gt; humidification, hydration<br />\n&lt; dry wind, low humidity, smoke</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Dry, tight sensations in the throat and chest musculature; occasional dry-cough-induced rib/intercostal strain; dry skin and scalp tension.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Restlessness and irritability from the acute discomfort of dryness — a felt sense of being parched and depleted, short temper driven by the sheer physical irritation of a dry, tickling throat and cough.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Acute tracheobronchitis triggered by low-humidity environments</li>\n<li>Dry-air induced airway hyperresponsiveness</li>\n<li>Acute irritation from smoke inhalation (wildfires, industrial pollutants)</li>\n<li>Early-stage viral pharyngitis/laryngitis before exudate forms</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Sputum Cytology showing sloughed epithelial cells without purulent inflammatory cells</li>\n<li>Transiently elevated Serum Osmolality</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Demulcents</li>\n<li>Consider: Kidney Yin tonics</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Mulberry leaf (Sang ye)</li>\n<li>Gypsum (Shi gao)</li>\n<li>Ass hide (E jiao)</li>\n<li>Black sesame seed (He zhi ma)</li>\n<li>Apricot kernel (Xing ren)</li>\n<li>Glenia (Sha shen)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Marshmallow root (<em>Althaea officinalis</em>)</li>\n<li>Mullein leaf (<em>Verbascum thapsus</em>)</li>\n<li>Plantain leaf (<em>Plantago major</em>)</li>\n<li>Slippery elm (<em>Ulmus rubra</em>)</li>\n<li>Irish moss (<em>Chondrus crispus</em>)</li>\n</ul>\n<p>Supportive: omega-3 fatty acids, antioxidant-rich food, hydration, restorative rest.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Qing Zao Jiu Fei Tang</strong> (Eliminate Dryness and Rescue the Lung Decoction)</p>\n<ul>\n<li>Sang ye (Mulberry leaf)</li>\n<li>Shi gao (Gypsum)</li>\n<li>E jiao (Ass hide)</li>\n<li>Hei zhi ma (Black sesame seed)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Pi pa ye (Loquat leaf)</li>\n<li>Gan cao (Licorice)</li>\n</ul>\n<p><strong>Sang Xing Tang</strong> (Mulberry Leaf and Apricot Kernel Decoction)</p>\n<ul>\n<li>Sang ye (Mulberry leaf)</li>\n<li>Xing ren (Apricot kernel)</li>\n<li>Sha shen (Glenia)</li>\n<li>Zhe bei mu (Fritillaria)</li>\n<li>Dan dou chi (Fermented soybean)</li>\n<li>Zhi zi pi (Gardenia peel)</li>\n<li>Li pi (Pear peel)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LU 9, SP 6, LU 5, KI 6, LI 11, LI 4, DU 14</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: A, C</li>\n<li>Minerals/Metals: Cu</li>\n<li>Other: Omega-3s, adequate hydration/electrolytes</li>\n</ul>"}, {"label": "Kalnins Formula", "value": "<p>60 ml tincture: </p>\n<p>10 Verbascum<br />\n10 Plantain leaf<br />\n10 Irish moss<br />\n10 Apricot seed<br />\n5 Slippery elm<br />\n5 Marshmallow (root)<br />\n5 Mulberry (leaf)<br />\n5 Licorice</p>\n<p>Oligo: Cu</p>"}], "id": "lung__p7"}, {"category": "Yin Deficiency", "subtitle": "Internal · Chronic Dryness", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Chronic structural fluid depletion &amp; tissue atrophy.</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Tissue atrophy, chronic low-grade cellular senescence, loss of mucosal barrier integrity</li>\n<li>Uncoupled hyper-reactivity (Empty Heat)</li>\n<li><strong>Estrogen</strong> deficiency</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Down-regulated mucin genes (MUC5AC), up-regulated chronic inflammatory cytokines (IL−6, TNF−α) without an active pathogen, and dysregulated aquaporins (AQP5).</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Chronic dry cough with scant, highly tenacious or blood-streaked sputum, dry throat/mouth, malar flush, night sweats, heat in the palms, soles, and chest (five-center heat).</p>"}, {"label": "Tongue", "value": "<p>Red body, thin, dry, with a peeled or completely absent coating (Mirror Tongue), or cracked, particularly in the anterior third (the Lung reflective zone).</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), feeling like a fine, taut thread ticking at an accelerated rate under the fingers.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset. Worse afternoon/evening (five-center heat pattern), worse in dry seasons.<br />\n&gt; rest, cooling/moistening foods, quiet evenings<br />\n&lt; overwork, heat exposure, insufficient sleep</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized wasting/thinness, low back and knee weakness (Kidney-Yin overlap), nighttime muscle cramping (fluid-tendon deficiency), restless legs.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Chronic restlessness, vague hyper-reactivity, a feeling of running on empty, or a \"tired but wired\" state of mind. The lack of grounding Yin allows the mind to float, manifesting as evening insomnia, racing thoughts, and systemic irritability.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Pulmonary Tuberculosis</li>\n<li>Idiopathic Pulmonary Fibrosis</li>\n<li>Sjogren's Syndrome with respiratory involvement</li>\n<li>Post-radiation pneumonitis</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>Elevated ESR or CRP</li>\n<li>Positive Anti-SSA/SSB antibodies</li>\n<li>High-Resolution Chest CT showing fibrotic changes or ground-glass opacities</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Phytoestrogens (Kidney Yin herbs)</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Lily bulb (Bai he)</li>\n<li>Rehmannia (raw &amp; prep)</li>\n<li>Ophiopogon (Mai men dong)</li>\n<li>Licorice (Gan cao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>See Kidney Yin herbs (phytoestrogens)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Bai He Gu Jing Tang</strong></p>\n<ul>\n<li>Bai he (Lily bulb)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Bei mu (Fritillaria)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Bai shao (White peony)</li>\n<li>Xuan shen (Scrophularia)</li>\n<li>Jie geng (Platycodon)</li>\n<li>Gan cao (Licorice)</li>\n</ul>\n<p><strong>Sha Shen Mai Dong Tong</strong></p>\n<ul>\n<li>Sha shen (Glenia)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Yu zhu (Solomon's seal)</li>\n<li>Tian hua fen (Trichosanthes root)</li>\n<li>Sang ye (Mulberry leaf)</li>\n<li>Bian dou (Hyacinth bean)</li>\n<li>Gan cao (Licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LU 9, LU 5, UB 13, UB 43, SP 6, KI 3, KI 6</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: E</li>\n<li>Other: Omega-3 fatty acids, N-acetylcysteine, adequate hydration; consider antioxidant/glutathione-precursor support given the oxidative and senescence component</li>\n</ul>"}], "id": "lung__p8"}, {"category": "Yin Excess", "subtitle": "Phlegm-Damp", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Excess fluid accumulation and transport failure.</p>"}, {"label": "Pathophysiology", "value": "<ul>\n<li>Hypersecretion of low-viscosity or gel-like mucins</li>\n<li>Impaired ciliary beat frequency</li>\n<li>Metabolic stagnation (often linked to Spleen/insulin resistance networks)</li>\n</ul>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Up-regulated MUC5AC and MUC5B mucin genes, down-regulated FOXA2 (which normally suppresses mucus production), and elevated metabolic leukotrienes.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Chronic cough with copious, white, thick, sticky or easy-to-expectorate sputum, chest oppression, systemic heaviness, mental fog. Pale, swollen tongue with thick, white, greasy coating; Slippery (Hua) pulse.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen, or enlarged body with a thick, white, greasy, or sticky coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Soggy/Soft (Ru), rolling smoothly under the fingers like pearls sliding through a basin.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual, chronic accumulation. Worse in damp weather, mornings (phlegm pooling overnight), after heavy or greasy meals.<br />\n&gt; warmth, movement, dry weather<br />\n&lt; damp, cold, dairy/sugar, sedentary periods</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Heavy, achy limbs; generalized heaviness and lethargy in the muscles; possible joint stiffness with damp; puffy, edema-like fullness.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Profound mental fog, subjective \"heaviness\" of thought, difficulty concentrating, and complacency. The accumulation of Dampness blankets the cognitive faculties, leading to a state of mental dampening or inertia.</p>"}, {"label": "Biomedical Correlates", "value": "<ul>\n<li>Chronic Bronchitis (COPD \"blue bloater\")</li>\n<li>Bronchiectasis</li>\n<li>Chronic post-nasal drip (UACS)</li>\n</ul>"}, {"label": "Confirming Lab Markers", "value": "<ul>\n<li>High concentration of mucin on Sputum Analysis</li>\n<li>Chest X-ray/CT showing increased bronchovascular markings, peribronchial cuffing, or hyperinflation</li>\n</ul>"}, {"label": "Herb Classes", "value": "<ul>\n<li>Resolve lung damp/phlegm (warming)</li>\n</ul>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Pinellia (Ban xia)</li>\n<li>Tangerine peel (Chen pi)</li>\n<li>Mustard seed (Bai jie zi)</li>\n<li>Perilla seed (Su zi)</li>\n<li>Radish seed (Lai fu zi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Horehound (<em>Marrubium vulgare</em>)</li>\n<li>Hyssop (<em>Hyssopus officinalis</em>)</li>\n<li>Thyme (<em>Thymus vulgaris</em>)</li>\n<li>Sage (<em>Salvia officinalis</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Er Chen Tang</strong> (Two Cured Decoction)</p>\n<ul>\n<li>Ban xia (Pinellia)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Fu ling (Poria)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>\n<p><strong>San Zi Yang Qin Tang</strong> (Three-Seed Decoction to Nourish One's Parents)</p>\n<ul>\n<li>Bai jie zi (Mustard seed)</li>\n<li>Su zi (Perilla seed)</li>\n<li>Lai fu zi (Radish seed)</li>\n</ul>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Cr (if insulin-resistance-linked), Ca</li>\n<li>Other: Choline (fat metabolism support), inositol (if insulin-resistance-linked, per the noted Spleen/metabolic connection); reduce refined carbohydrate and dairy intake</li>\n</ul>"}], "id": "lung__p9"}, {"category": "Multi-Organ Patterns", "subtitle": "Lung / Kidney Yin Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Chronic cough with little sputum, dry mouth and throat, low back pain, night sweats, hot flashes, afternoon fever, constipation.</p>"}, {"label": "Tongue", "value": "<p>Red tongue with little or no coat.</p>"}, {"label": "Pulse", "value": "<p>Thin, rapid.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Eight Immortals Formula (Ba Xian Chang Shou Wan)</strong></p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Ze xie (Alisma)</li>\n<li>Fu ling (Poria)</li>\n<li>Mu dan pi (Moutan)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Wu wei zi (Schisandra)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LU 9, LU 5, KI 3, KI 6, SP 6</p>"}], "id": "lung__p10"}, {"category": "Multi-Organ Patterns", "subtitle": "Lung / Spleen Qi Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Weak voice, weak cough with sputum, shortness of breath, wheezing, poor appetite, abdominal distention, fatigue.</p>"}, {"label": "Tongue", "value": "<p>Pale tongue with thin, white coat.</p>"}, {"label": "Pulse", "value": "<p>Weak.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Six Gentlemen Formula (Liu Jun Zi Tang)</strong></p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fu ling (Poria)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Ban xia (Pinellia)</li>\n</ul>\n<p><strong>Ginseng and Astragalus Formula (Bu Zhong Yi Qi Tang)</strong></p>\n<ul>\n<li>Huang qi (Astragalus)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Sheng ma (Cimicifuga)</li>\n<li>Chai hu (Bupleurum)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>UB 13, SP 3, SP 6, LU 9, ST 36, UB 20</p>"}], "id": "lung__p11"}, {"category": "Multi-Organ Patterns", "subtitle": "Lung / Heart Qi Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Weak voice, weak cough, shortness of breath, dyspnea, palpitations, chest tightness or discomfort.</p>"}, {"label": "Tongue", "value": "<p>Pale.</p>"}, {"label": "Pulse", "value": "<p>Weak.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Baked Licorice Formula (Zhi Gan Cao Tang)</strong></p>\n<ul>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>E jiao (Ass hide)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Ma zi ren (Hemp seed)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Da zao (Jujube)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 7, LU 9, UB 13, UB 15, PC 6, CV 17</p>"}], "id": "lung__p12"}]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('workbook-data').textContent);

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  if (children) children.forEach(c => c && e.appendChild(c));
  return e;
}

const tabsNav = document.getElementById('main-tabs');
const viewsWrap = document.getElementById('views');

// Activates a top-level view (one of the buttons in nav.tabs) by id.
function showTopView(id) {
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('nav.tabs button[data-view="' + id + '"]');
  if (btn) btn.classList.add('active');
  document.querySelectorAll('section.view').forEach(v => v.classList.remove('active'));
  const view = document.getElementById('view-' + id);
  if (view) view.classList.add('active');
}

function addTab(id, label, isActive) {
  const btn = el('button', { html: label });
  btn.dataset.view = id;
  if (isActive) btn.classList.add('active');
  btn.addEventListener('click', () => showTopView(id));
  tabsNav.appendChild(btn);
}

// Opens a specific organ's page (id "view-organ-<slug>"), which lives
// underneath the top-level "Organs" tab rather than having its own nav
// button — the organ picker (card grid) is what the Organs tab shows by
// default. Keeps the "Organs" nav button highlighted as active throughout.
function openOrgan(slug) {
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const organsBtn = document.querySelector('nav.tabs button[data-view="organs"]');
  if (organsBtn) organsBtn.classList.add('active');
  document.querySelectorAll('section.view').forEach(v => v.classList.remove('active'));
  const view = document.getElementById('view-organ-' + slug);
  if (view) view.classList.add('active');
  if (typeof window.scrollTo === 'function') window.scrollTo(0, 0);
}

// Builds a labeled sub-tab row + matching sub-views, scoped under idPrefix
// (typically an organ slug) so multiple organs' subtabs never collide and
// so switchSubtab() can address a specific organ's subtabs from outside
// (e.g. jumpToPattern() switching to the Patterns subtab before opening a
// card). tabs: [{ id, label, render: () => Node }, ...].
function buildSubtabbedSection(idPrefix, tabs) {
  const subtabs = el('div', { class: 'subtabs', id: 'subtabs-' + idPrefix });
  const subviewsWrap = el('div', { id: 'subviews-' + idPrefix });
  tabs.forEach((t, i) => {
    const btn = el('button', { html: t.label });
    btn.dataset.subtab = t.id;
    if (i === 0) btn.classList.add('active');
    btn.addEventListener('click', () => switchSubtab(idPrefix, t.id));
    subtabs.appendChild(btn);

    const sv = el('div', { class: 'subview' + (i === 0 ? ' active' : ''), id: 'sub-' + idPrefix + '-' + t.id });
    sv.appendChild(t.render());
    subviewsWrap.appendChild(sv);
  });
  const wrap = el('div');
  wrap.appendChild(subtabs);
  wrap.appendChild(subviewsWrap);
  return wrap;
}

function switchSubtab(idPrefix, subtabId) {
  const subtabsBar = document.getElementById('subtabs-' + idPrefix);
  const subviewsWrap = document.getElementById('subviews-' + idPrefix);
  if (!subtabsBar || !subviewsWrap) return;
  subtabsBar.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.subtab === subtabId));
  subviewsWrap.querySelectorAll('.subview').forEach(v => v.classList.toggle('active', v.id === 'sub-' + idPrefix + '-' + subtabId));
}

const groupOrder = ["Yang Excess", "Yang Deficiency", "Qi Excess", "Qi Deficiency", "Blood Excess", "Blood Deficiency", "Yin Excess", "Yin Deficiency", "Multi-Organ Patterns"];
const specialGroupColors = { "Multi-Organ Patterns": "#5a6570" };
// Top-level Patterns-tab grouping: one heading per axis (Yang/Qi/Blood/Yin),
// with that axis's Excess/Deficiency patterns underneath rather than each
// getting its own heading — Excess vs. Deficiency still reads clearly from
// each card's own color-coded badge. An axis with zero patterns for this
// organ (e.g. Blood, currently Liver/Heart territory — no Lung patterns
// yet) is skipped automatically, same as the old per-category skip. Order
// within an axis (Excess before Deficiency) still comes from groupOrder.
const axisOrder = ["Yang", "Qi", "Blood", "Yin"];

function renderPatternCard(wrap, p, cat) {
  const color = DATA.colorLegend[cat] || specialGroupColors[cat] || '#8a6a4c';
  const card = el('div', {
    class: 'pattern-card', id: p.id,
    style: `border-left-color:${color}; background: color-mix(in srgb, ${color} 6%, #fff);`
  });
  const head = el('div', { class: 'head' });
  const titles = el('div', { class: 'titles' }, [
    el('span', { class: 'cat-badge', style: `background:${color}`, html: cat }),
    el('span', { class: 'subtitle', html: p.subtitle || '' })
  ]);
  head.appendChild(titles);
  head.appendChild(el('span', { class: 'chevron', html: '&#9656;' }));
  head.addEventListener('click', () => card.classList.toggle('open'));
  card.appendChild(head);
  const body = el('div', { class: 'body' });
  p.fields.forEach(f => {
    const isFormula = /formula/i.test(f.label);
    const fieldEl = el('div', { class: 'field' + (isFormula ? ' formula' : '') });
    fieldEl.appendChild(el('div', { class: 'flabel', html: f.label }));
    fieldEl.appendChild(el('div', { class: 'fval', html: f.value }));
    body.appendChild(fieldEl);
  });
  card.appendChild(body);
  wrap.appendChild(card);
}

function buildPatternGroups(patterns) {
  const wrap = el('div');
  axisOrder.forEach(axis => {
    const cats = groupOrder.filter(c => c.startsWith(axis + ' '));
    const items = patterns.filter(p => cats.includes(p.category));
    if (!items.length) return;
    wrap.appendChild(el('h3', { class: 'group-heading', html: axis }));
    cats.forEach(cat => {
      patterns.filter(p => p.category === cat).forEach(p => renderPatternCard(wrap, p, cat));
    });
  });
  // Multi-Organ Patterns, plus any category not covered by axisOrder (future-proofing), last.
  const leftoverCats = groupOrder.filter(c => !axisOrder.some(a => c.startsWith(a + ' ')))
    .concat([...new Set(patterns.map(p => p.category))].filter(c => !groupOrder.includes(c)));
  leftoverCats.forEach(cat => {
    const items = patterns.filter(p => p.category === cat);
    if (!items.length) return;
    wrap.appendChild(el('h3', { class: 'group-heading', html: cat }));
    items.forEach(p => renderPatternCard(wrap, p, cat));
  });
  return wrap;
}

// Renders an organ's "common biomedical conditions" index (content/organs/
// <slug>/conditions.md, optional). Each condition's fields may contain
// <a class="pattern-link" data-id="..."> anchors (resolved at build time
// from "[[Category|Subtitle]]" shorthand in the markdown source) that jump
// to the matching pattern card via jumpToPattern() below.
function buildConditions(conditions) {
  const wrap = el('div');
  conditions.forEach(c => {
    const card = el('div', { class: 'condition-card' });
    const head = el('div', { class: 'head' }, [
      el('span', { class: 'name', html: c.category }),
      c.subtitle ? el('span', { class: 'subtitle', html: c.subtitle }) : null
    ]);
    card.appendChild(head);
    c.fields.forEach(f => {
      const fieldEl = el('div', { class: 'field' });
      fieldEl.appendChild(el('div', { class: 'flabel', html: f.label }));
      fieldEl.appendChild(el('div', { class: 'fval', html: f.value }));
      card.appendChild(fieldEl);
    });
    wrap.appendChild(card);
  });
  return wrap;
}

// Jumps to a pattern card by id (format "<organ-slug>__p<N>"): opens that
// organ's page, switches its Patterns subtab, opens the card's accordion,
// scrolls it into view, and briefly flashes its background so the
// destination is unmistakable.
function jumpToPattern(id) {
  const organSlug = id.split('__p')[0];
  openOrgan(organSlug);
  switchSubtab(organSlug, 'patterns');
  const card = document.getElementById(id);
  if (!card) return;
  card.classList.add('open');
  if (typeof card.scrollIntoView === 'function') {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  card.classList.remove('jump-highlight');
  void card.offsetWidth; // restart the CSS animation if clicked twice
  card.classList.add('jump-highlight');
}

document.addEventListener('click', (e) => {
  const link = e.target.closest('a.pattern-link');
  if (!link) return;
  e.preventDefault();
  jumpToPattern(link.dataset.id);
});

// Builds a section's <div class="card"> body, with a Prose/Bullets mode
// toggle when the section has a bulletsHtml rendition (teaching-slide-style
// condensed bullets, authored alongside the prose in the same .md file).
function buildSectionCard(s) {
  const card = el('div', { class: 'card' });
  if (s.source) card.appendChild(el('div', { class: 'source-note', html: s.source }));
  const hasBullets = s.bulletsHtml && s.bulletsHtml.trim().length > 0;
  if (hasBullets) {
    const toggle = el('div', { class: 'mode-toggle' });
    const proseBtn = el('button', { html: 'Prose' });
    const bulletsBtn = el('button', { html: 'Bullets' });
    proseBtn.classList.add('active');
    const proseDiv = el('div', { class: 'content-prose active', html: s.html });
    const bulletsDiv = el('div', { class: 'content-bullets', html: s.bulletsHtml });
    proseBtn.addEventListener('click', () => {
      proseBtn.classList.add('active'); bulletsBtn.classList.remove('active');
      proseDiv.classList.add('active'); bulletsDiv.classList.remove('active');
    });
    bulletsBtn.addEventListener('click', () => {
      bulletsBtn.classList.add('active'); proseBtn.classList.remove('active');
      bulletsDiv.classList.add('active'); proseDiv.classList.remove('active');
    });
    toggle.appendChild(proseBtn); toggle.appendChild(bulletsBtn);
    card.appendChild(toggle);
    card.appendChild(proseDiv);
    card.appendChild(bulletsDiv);
  } else {
    card.appendChild(el('div', { html: s.html }));
  }
  return card;
}

// Finds pattern-name mentions (bolded "Category · Subtitle" text) inside a table cell and
// re-styles them as small colored tiles matching the Patterns tab's pattern-card look.
// Used for the "Worked Example" phase-to-pattern table in Foundations, identified by its
// "Lung Pattern(s)" column header rather than position, so it stays robust if more tables
// are added above it later.
function tilePatternMentions(root) {
  const table = [...root.querySelectorAll('table')].find(t => t.innerHTML.includes('Lung Pattern(s)'));
  if (!table) return;
  table.querySelectorAll('td strong').forEach(strongEl => {
    const text = strongEl.textContent;
    const cat = groupOrder.find(c => text.startsWith(c));
    if (!cat) return;
    const color = DATA.colorLegend[cat] || specialGroupColors[cat] || '#8a6a4c';
    strongEl.classList.add('pattern-tile');
    strongEl.style.borderLeftColor = color;
    strongEl.style.background = `color-mix(in srgb, ${color} 12%, #fff)`;
  });
  table.querySelectorAll('td em').forEach(emEl => {
    if (emEl.textContent.trim() === '(open)') emEl.classList.add('pattern-tile', 'pattern-tile-open');
  });
}

// ---- Foundations view (book-wide, organ-agnostic; reused ahead of every organ's own preface) ----
const hasFoundations = DATA.foundationSections && DATA.foundationSections.length;
if (hasFoundations) {
  addTab('foundations', 'Foundations', true);
  const foundationsView = el('section', { class: 'view active', id: 'view-foundations' });
  foundationsView.appendChild(el('div', { class: 'section-kicker', html: 'Book-wide' }));
  foundationsView.appendChild(el('div', { class: 'section-title', html: 'Foundations' }));
  const multipleFoundationSections = DATA.foundationSections.length > 1;
  DATA.foundationSections.forEach((s, i) => {
    if (!multipleFoundationSections) {
      foundationsView.appendChild(buildSectionCard(s));
      return;
    }
    const kicker = `Module ${s.order != null ? s.order : i + 1}`;
    const moduleCard = el('div', { class: 'module-card' });
    const head = el('div', { class: 'module-head' });
    head.appendChild(el('div', { class: 'module-heading', html: `${kicker}<span class="module-title">${s.title}</span>` }));
    head.appendChild(el('span', { class: 'chevron', html: '&#9656;' }));
    head.addEventListener('click', () => moduleCard.classList.toggle('open'));
    moduleCard.appendChild(head);
    const body = el('div', { class: 'module-body' });
    body.appendChild(buildSectionCard(s));
    moduleCard.appendChild(body);
    foundationsView.appendChild(moduleCard);
  });
  tilePatternMentions(foundationsView);
  viewsWrap.appendChild(foundationsView);
}

// ---- Organs tab: landing page (card grid, from roadmap.md) + one page per organ ----
addTab('organs', 'Organs', !hasFoundations);
const organsView = el('section', { class: 'view' + (hasFoundations ? '' : ' active'), id: 'view-organs' });
organsView.appendChild(el('div', { class: 'section-kicker', html: 'Organ Modules' }));
organsView.appendChild(el('div', { class: 'section-title', html: 'Organs' }));
organsView.appendChild(el('div', { class: 'lede', html: 'Twelve organs across six paired modules. Open a module for its phenomenology, physiology, clinical patterns, and common conditions.' }));
const organGrid = el('div', { class: 'organ-grid' });
DATA.roadmap.forEach(r => {
  const card = el('div', { class: 'organ-module-card ' + (r.live ? 'live' : 'planned') });
  card.appendChild(el('div', { class: 'name', html: r.organ }));
  card.appendChild(el('div', { class: 'status', html: r.live ? 'Open module' : r.status }));
  card.appendChild(el('div', { class: 'note', html: r.note }));
  if (r.live) card.addEventListener('click', () => openOrgan(r.slug));
  organGrid.appendChild(card);
});
organsView.appendChild(organGrid);
viewsWrap.appendChild(organsView);

DATA.organs.forEach(organ => {
  const view = el('section', { class: 'view', id: 'view-organ-' + organ.slug });
  const backLink = el('a', { class: 'back-link', html: '&larr; All Organs' });
  backLink.addEventListener('click', (e) => { e.preventDefault(); showTopView('organs'); });
  view.appendChild(backLink);
  view.appendChild(el('div', { class: 'section-kicker', html: 'Organ Module' }));
  const heading = organ.character ? `${organ.title} (${organ.character})` : organ.title;
  const headingFull = organ.subtitle ? `${heading} &mdash; ${organ.subtitle}` : heading;
  view.appendChild(el('div', { class: 'section-title', html: headingFull }));

  const subtabDefs = [];
  organ.preface.forEach(s => {
    subtabDefs.push({
      id: s.tab,
      label: s.title,
      render: () => {
        if (s.status === 'pending') {
          const inner = s.source ? `<div class="source-note">${s.source}</div>${s.html}` : s.html;
          return el('div', { class: 'pending-note', html: inner });
        }
        return buildSectionCard(s);
      }
    });
  });
  subtabDefs.push({
    id: 'patterns',
    label: 'Patterns',
    render: () => {
      const wrap = el('div');
      wrap.appendChild(buildPatternGroups(organ.patterns));
      return wrap;
    }
  });
  if (organ.conditions && organ.conditions.length) {
    subtabDefs.push({
      id: 'conditions',
      label: 'Conditions',
      render: () => {
        const wrap = el('div');
        wrap.appendChild(el('div', { class: 'lede', style: 'margin-bottom:16px;', html: 'Start from a diagnosis you already recognize, then follow a link into its predominant pattern(s) under the Patterns tab.' }));
        if (organ.conditionsIntro) {
          wrap.appendChild(el('div', { class: 'card', html: organ.conditionsIntro }));
        }
        wrap.appendChild(buildConditions(organ.conditions));
        return wrap;
      }
    });
  }
  view.appendChild(buildSubtabbedSection(organ.slug, subtabDefs));
  viewsWrap.appendChild(view);
});

// ---- Roadmap view ----
addTab('roadmap', 'Roadmap', false);
const roadmapView = el('section', { class: 'view', id: 'view-roadmap' });
roadmapView.appendChild(el('div', { class: 'section-kicker', html: 'Workbook Roadmap' }));
roadmapView.appendChild(el('div', { class: 'section-title', html: 'Organ Module Status' }));
roadmapView.appendChild(el('div', { class: 'lede', html: 'Status of each organ archetype in this workbook.' }));
const rl = el('ul', { class: 'roadmap-list' });
DATA.roadmap.forEach(r => {
  rl.appendChild(el('li', {}, [
    el('span', { class: 'organ', html: r.organ }),
    el('span', { class: 'status', html: r.status }),
    el('span', { class: 'note', html: r.note })
  ]));
});
roadmapView.appendChild(rl);
viewsWrap.appendChild(roadmapView);
</script>
</body>
</html>
