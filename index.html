\n<li>Long gu (Dragon bone)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Fu shen (Poria with wood)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Shi chang pu (Acorus)</li>\n<li>Yuan zhi (Polygala)</li>\n<li>Gui ban (Tortoise shell)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>RN 4, KI 3, BL 23, SP 6, GV 4</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Mg, Zn</li>\n<li>Other: Pelvic floor physical therapy as adjunct where indicated</li>\n</ul>"}], "id": "ki-bl__p5"}, {"category": "Yin Excess", "subtitle": "Bladder Damp-Heat", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Acute infectious/inflammatory fluid burden in the lower urinary tract.</p>"}, {"label": "Pathophysiology", "value": "<p>Bacterial colonization and infection of the urinary tract with mucosal inflammation, carrying risk of ascending infection to the kidneys if untreated.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated uroepithelial TLR4 activation (bacterial LPS response), elevated urinary IL-6/IL-8, neutrophilic infiltration of the bladder mucosa.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Burning, painful urination, urgency and frequency, dark and scanty urine, possible visible blood in the urine, low-grade fever, and low back or suprapubic pain.</p>"}, {"label": "Tongue", "value": "<p>Red body with a thick, yellow, greasy coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Rapid (Shuo), rolling quickly and forcefully.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Acute onset, worse in hot/humid weather, often following sexual activity or dehydration.<br />\n&gt; hydration, rest, cooling<br />\n&lt; dehydration, holding urine, humid weather, sexual activity without adequate hygiene</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Suprapubic and low back pain, occasionally radiating pain if infection ascends toward the kidney.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Irritability and discomfort-driven distraction during acute flares, anxiety about recurrence in those with a history of frequent UTIs.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Acute cystitis/urinary tract infection, pyelonephritis, urethritis.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Urinalysis: Positive leukocyte esterase and nitrites, pyuria, bacteriuria.</p>\n<p>Culture: Positive urine culture identifying the causative organism and sensitivities.</p>\n<p>Inflammatory Markers: Elevated CRP/WBC if ascending infection (pyelonephritis) is suspected.</p>"}, {"label": "Herb Classes", "value": "<p>Clear damp-heat, disinhibit urination</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Plantago seed (Che qian zi)</li>\n<li>Talcum (Hua shi)</li>\n<li>Akebia (Mu tong)</li>\n<li>Dianthus (Qu mai)</li>\n<li>Polygonum aviculare (Bian xu)</li>\n<li>Gardenia (Zhi zi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Uva Ursi (<em>Arctostaphylos uva-ursi</em>)</li>\n<li>Cranberry (<em>Vaccinium macrocarpon</em>)</li>\n<li>Corn Silk (<em>Zea mays</em>)</li>\n<li>Goldenseal (<em>Hydrastis canadensis</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Ba Zheng San</strong> (Eight-Herb Powder for Rectification)</p>\n<ul>\n<li>Qu mai (Dianthus)</li>\n<li>Bian xu (Polygonum aviculare)</li>\n<li>Che qian zi (Plantago seed)</li>\n<li>Hua shi (Talcum)</li>\n<li>Zhi zi (Gardenia)</li>\n<li>Da huang (Rhubarb)</li>\n<li>Mu tong (Akebia)</li>\n<li>Gan cao shao (Licorice tip)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>BL 28, SP 9, SP 6, RN 3, KI 2</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: D-mannose and cranberry PACs for adherence-blocking support; adequate hydration</li>\n</ul>"}], "id": "ki-bl__p6"}, {"category": "Yin Deficiency", "subtitle": "Kidney Yin Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Chronic structural fluid depletion across the renal and reproductive-hormonal systems, without overt heat-flaring.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced renal concentrating capacity, mild chronic HPA-axis dysregulation, and declining gonadal hormone reserve, without the acute vasomotor flaring seen in the Deficient Fire variant.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Mild chronic elevation of FSH/LH with declining estradiol/testosterone, reduced renal aquaporin-2 expression, mild chronic elevation of inflammatory markers without acute-flare intensity.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Dizziness, tinnitus, low back and knee soreness and weakness, night sweats, five-center heat, dry mouth (especially at night), premature graying, mild memory difficulty.</p>"}, {"label": "Tongue", "value": "<p>Red body with little or no coating.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), fine and fast, weak at both Chi positions.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset, worse in the afternoon and evening, worse in hot weather.<br />\n&gt; rest, cooling/moistening foods, quiet evenings<br />\n&lt; overwork, heat exposure, insufficient sleep</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Low back and knee soreness and weakness, mild nocturnal muscle cramping.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A quieter, more chronic version of the restlessness seen in Deficient Fire — mild anxiety, occasional insomnia, a sense of running on a low reserve without acute agitation.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Early or mild chronic kidney disease, milder menopausal syndrome, osteoporosis with mild systemic heat signs, chronic mild dehydration or electrolyte imbalance.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Renal: Mildly reduced eGFR or mildly elevated creatinine in early CKD; reduced urine specific gravity.</p>\n<p>Endocrine: Mildly elevated FSH/LH with declining estradiol/testosterone; normal or mildly elevated evening cortisol.</p>"}, {"label": "Herb Classes", "value": "<p>Nourish Kidney Yin</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Prepared rehmannia (Shu di huang)</li>\n<li>Cornus (Shan zhu yu)</li>\n<li>Chinese yam (Shan yao)</li>\n<li>Ligustrum (Nu zhen zi)</li>\n<li>Eclipta (Han lian cao)</li>\n<li>Tortoise shell (Gui ban)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Ashwagandha (<em>Withania somnifera</em>)</li>\n<li>Milky Oats (<em>Avena sativa</em>)</li>\n<li>Solomon's Seal (<em>Polygonatum multiflorum</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Liu Wei Di Huang Wan</strong> (Six-Ingredient Rehmannia Pill)</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Ze xie (Alisma)</li>\n<li>Fu ling (Poria)</li>\n<li>Mu dan pi (Moutan)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>KI 3, KI 6, SP 6, RN 4, BL 23</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: Adequate hydration; omega-3 fatty acids for general anti-inflammatory support</li>\n</ul>"}], "id": "ki-bl__p7"}, {"category": "Yin Deficiency", "subtitle": "Kidney Essence Deficiency — Hot Signs", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Accelerated reproductive and hormonal senescence with a depleted, heat-leaning presentation rather than pure hypofunction.</p>"}, {"label": "Pathophysiology", "value": "<p>Accelerated reproductive and hormonal senescence with a mild inflammatory (\"inflammaging\") component and reduced telomerase-associated cellular regenerative capacity, presenting with heat and depletion signs rather than cold.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Accelerated ovarian follicular depletion or testicular senescence, reduced telomerase activity with mild elevation of inflammatory cytokines, declining DHEA-S with age disproportionate to chronological age.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Premature graying with dry, heat-leaning signs, infertility with scanty or absent menses, early menopause, tinnitus, memory decline, and a generally depleted-but-warm constitutional picture.</p>"}, {"label": "Tongue", "value": "<p>Red body, thin, dry, little coating.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), fine and fast.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, constitutional, progressive. Worse with heat exposure and sleep deprivation.<br />\n&gt; rest, cooling/moistening support, consistent sleep<br />\n&lt; heat exposure, chronic stress, sleep deprivation</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Poor bone density with heat-associated joint discomfort, low back soreness, dry/brittle hair and nails.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A restless, prematurely \"aged\" quality to mental energy — mild anxiety about aging or fertility, a sense of time-pressure layered over genuine physiological depletion.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Primary ovarian insufficiency, early menopause, age-accelerated cognitive decline, osteoporosis with concurrent hyperthyroid-adjacent features.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Endocrine: Elevated FSH with low AMH (ovarian reserve markers) or low testosterone with elevated LH; low DHEA-S disproportionate to age.</p>\n<p>Bone: DEXA scan showing reduced bone mineral density.</p>"}, {"label": "Herb Classes", "value": "<p>Nourish Essence and Yin together</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Ligustrum (Nu zhen zi)</li>\n<li>Eclipta (Han lian cao)</li>\n<li>Tortoise shell (Gui ban)</li>\n<li>Prepared rehmannia (Shu di huang)</li>\n<li>Dendrobium (Shi hu)</li>\n<li>Asparagus root (Tian men dong)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Ashwagandha (<em>Withania somnifera</em>)</li>\n<li>Shatavari (<em>Asparagus racemosus</em>)</li>\n<li>Milky Oats (<em>Avena sativa</em>)</li>\n<li>Rhodiola (<em>Rhodiola rosea</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Zuo Gui Wan</strong> (Restore the Left [Kidney] Pill)</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Gou qi zi (Goji berry)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Chuan niu xi (Achyranthes)</li>\n<li>Tu si zi (Cuscuta)</li>\n<li>Lu jiao jiao (Deer antler gelatin)</li>\n<li>Gui ban jiao (Tortoise shell gelatin)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>KI 3, KI 6, SP 6, GV 4, BL 23</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D, E</li>\n<li>Minerals/Metals: Ca</li>\n<li>Other: Omega-3 fatty acids and antioxidant support given the mild inflammatory component; adequate hydration</li>\n</ul>"}], "id": "ki-bl__p8"}, {"category": "Multi-Organ Patterns", "subtitle": "Heart / Kidney Disharmony", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Insomnia with difficulty falling and staying asleep, anxiety, palpitations, night sweats, dizziness, tinnitus, low back soreness, dream-disturbed sleep, and nocturnal emissions — the classic \"Fire and Water fail to communicate\" picture.</p>"}, {"label": "Tongue", "value": "<p>Red tongue, especially at the tip, with little coating.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), weak at both Chi (Kidney) positions and slightly rapid at the left Cun (Heart) position.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Jiao Tai Wan</strong> (Grand Communication Pill)</p>\n<ul>\n<li>Huang lian (Coptis)</li>\n<li>Rou gui (Cinnamon bark)</li>\n</ul>\n<p><strong>Tian Wang Bu Xin Dan</strong> (Emperor of Heaven's Special Pill to Tonify the Heart)</p>\n<ul>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Xuan shen (Scrophularia)</li>\n<li>Dan shen (Salvia)</li>\n<li>Fu ling (Poria)</li>\n<li>Wu wei zi (Schisandra)</li>\n<li>Yuan zhi (Polygala)</li>\n<li>Jie geng (Platycodon)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Tian men dong (Asparagus root)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Bai zi ren (Biota seed)</li>\n<li>Suan zao ren (Sour jujube seed)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 6, KI 3, KI 6, SP 6, HT 7, RN 4</p>"}], "id": "ki-bl__p9"}]}, {"slug": "ht", "title": "Heart System", "subtitle": "", "character": "", "order": 5, "preface": [], "conditions": [], "conditionsIntro": "", "patterns": [{"category": "Yang Excess", "subtitle": "Heart Fire Blazing", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Acute hyperadrenergic arousal with mucosal and oral inflammatory overlap.</p>"}, {"label": "Pathophysiology", "value": "<p>Hyperadrenergic and hypercortisolemic arousal state, oral mucosal inflammation, and hypothalamic arousal-system overactivity; in more severe presentations, heat is said to transfer downward to the Small Intestine, correlating with lower urinary tract irritation.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated circulating catecholamines and cortisol, NF-κB-driven oral mucosal inflammation, elevated orexin/hypocretin arousal signaling.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Difficulty falling asleep, mouth and tongue ulcers, red face, marked thirst, dark or burning urine, agitation and restlessness, palpitations, and in severe cases delirium or manic agitation.</p>"}, {"label": "Tongue", "value": "<p>Red body, especially at the tip, with a yellow coating; may show ulceration at the tip.</p>"}, {"label": "Pulse", "value": "<p>Rapid (Shuo) and forceful, most pronounced at the left Cun (Heart) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Acute or acute-on-chronic, often precipitated by stress, stimulants, or sleep deprivation. Worse in the evening and at night.<br />\n&gt; cooling, rest, calm environment<br />\n&lt; stimulants, stress, sleep deprivation, heat exposure</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Jaw and facial tension, restless agitation with difficulty sitting still, occasional tension headache.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Agitation, restlessness, and mental overactivity that prevents settling into sleep — the Shen (Mind/Spirit) disturbed by excess heat rather than lacking a home to rest in.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Acute stomatitis/aphthous ulcers, chronic insomnia disorder, hyperthyroid-associated agitation, acute manic or agitated psychiatric presentations.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Endocrine: Elevated evening cortisol; TSH suppressed with elevated free T4 if thyrotoxic.</p>\n<p>Inflammatory: Elevated hs-CRP in active oral or systemic inflammation.</p>"}, {"label": "Herb Classes", "value": "<p>Clear Heart fire, drain fire downward</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Coptis (Huang lian)</li>\n<li>Lotus plumule (Lian zi xin)</li>\n<li>Raw rehmannia (Sheng di huang)</li>\n<li>Akebia (Mu tong)</li>\n<li>Talcum (Hua shi)</li>\n<li>Gardenia (Zhi zi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Motherwort (<em>Leonurus cardiaca</em>)</li>\n<li>Lemon Balm (<em>Melissa officinalis</em>)</li>\n<li>Passionflower (<em>Passiflora incarnata</em>)</li>\n<li>Skullcap (<em>Scutellaria lateriflora</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Dao Chi San</strong> (Guide Out the Red Powder)</p>\n<ul>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Mu tong (Akebia)</li>\n<li>Zhu ye (Bamboo leaf)</li>\n<li>Gan cao shao (Licorice tip)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 8, HT 9, SI 5, RN 15, PC 8</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: Magnesium and L-theanine for calming; avoid caffeine and stimulants in the evening</li>\n</ul>"}], "id": "ht__p1"}, {"category": "Yang Deficiency", "subtitle": "Heart Yang Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Reduced cardiac contractile and metabolic output, with peripheral hypoperfusion.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced cardiac contractility and output, reduced peripheral perfusion, and — in severe presentations — inadequate autonomic compensatory reserve (Heart Yang Collapse, correlating with cardiogenic shock).</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced β-adrenergic receptor sensitivity, reduced myocardial ATP production (mitochondrial dysfunction), elevated but ultimately insufficient BNP/NT-proBNP compensatory signaling.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Palpitations, cold extremities, chest oppression or pain worse with cold, pale or purplish lips, spontaneous sweating, and fatigue; in severe cases, cold sweat with a barely perceptible pulse (Heart Yang Collapse).</p>"}, {"label": "Tongue", "value": "<p>Pale body, possibly with a purplish tinge, moist coating.</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen) and Weak (Ruo), occasionally Knotted or Intermittent (Jie/Dai) reflecting irregular cardiac rhythm.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset, markedly worse in cold weather and with exertion. Worse in winter.<br />\n&gt; warmth, rest, gentle movement<br />\n&lt; cold, overexertion, sudden exertion after rest</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Cold extremities, generalized fatigue-related weakness, chest oppression worse with cold or exertion.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Low drive and a diminished sense of warmth or connection, mild apathy, a \"banked low\" quality mirroring the reduced cardiac output beneath it.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Congestive heart failure with reduced ejection fraction, bradyarrhythmias, cardiogenic shock (severe presentation), hypothyroidism with cardiac involvement (myxedema heart).</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Cardiac: Elevated BNP/NT-proBNP; echocardiogram showing reduced ejection fraction.</p>\n<p>Endocrine: TSH elevated with free T3/T4 low-normal or low if hypothyroid.</p>\n<p>ECG: Bradycardia or conduction abnormalities where relevant.</p>"}, {"label": "Herb Classes", "value": "<p>Warm and tonify Heart Yang</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Prepared aconite (Fu zi)</li>\n<li>Cinnamon twig (Gui zhi)</li>\n<li>Ginseng (Ren shen)</li>\n<li>Fresh ginger (Sheng jiang)</li>\n<li>Astragalus (Huang qi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Hawthorn (<em>Crataegus monogyna</em>)</li>\n<li>Ginger (<em>Zingiber officinale</em>)</li>\n<li>Cinnamon (<em>Cinnamomum verum</em>)</li>\n<li>Rhodiola (<em>Rhodiola rosea</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Shen Fu Tang</strong> (Ginseng and Aconite Decoction)</p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Fu zi (Prepared aconite)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 5, RN 17, RN 6, BL 15</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Mg, Se</li>\n<li>Other: CoQ10 for myocardial mitochondrial support; warming, easily-digested foods</li>\n</ul>"}], "id": "ht__p2"}, {"category": "Qi Excess", "subtitle": "Fright Palpitations (Jing Ji)", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Sympathetic hyperreactivity triggered by emotional shock, without a sustained heat component.</p>"}, {"label": "Pathophysiology", "value": "<p>Autonomic hyperreactivity with episodic sympathetic surges, amygdala-driven hyperarousal, and benign ectopic cardiac activity precipitated by fright or sustained anxiety.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Episodic elevation of circulating catecholamines, elevated amygdala reactivity on functional imaging, reduced heart-rate variability during acute episodes.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Palpitations triggered by fright, shock, or sudden emotion, being easily startled, restless or light sleep, anxiety, and occasional chest tightness — without the heat signs seen in Heart Fire Blazing.</p>"}, {"label": "Tongue", "value": "<p>Normal or slightly pale body, thin white coating.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian) or irregular, occasionally rapid during acute episodes but not consistently forceful.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Episodic, triggered by sudden fright, stress, or emotional shock. Worse in unfamiliar or unpredictable situations.<br />\n&gt; reassurance, calm predictable environment, gradual reintroduction to triggers<br />\n&lt; sudden fright, unpredictable stress, stimulants</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Chest tightness during episodes, a startle-reflex quality to muscle tension, occasional trembling.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Easily startled, anticipatory anxiety about future episodes, a hypervigilant quality distinct from Heart Fire's heat-driven agitation — the Shen unsettled by shock rather than overheated.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Panic disorder, benign premature atrial/ventricular contractions triggered by stress, adjustment disorder with cardiac-focused anxiety, post-traumatic stress with cardiac symptoms.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Cardiac: Holter monitoring showing benign ectopy correlating with symptomatic episodes; otherwise structurally normal echocardiogram.</p>\n<p>Autonomic: Reduced heart-rate variability during symptomatic periods.</p>"}, {"label": "Herb Classes", "value": "<p>Calm the Shen, settle fright</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Dragon bone (Long gu)</li>\n<li>Oyster shell (Mu li)</li>\n<li>Amber (Hu po)</li>\n<li>Polygala (Yuan zhi)</li>\n<li>Poria with wood (Fu shen)</li>\n<li>Sour jujube seed (Suan zao ren)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Passionflower (<em>Passiflora incarnata</em>)</li>\n<li>Valerian (<em>Valeriana officinalis</em>)</li>\n<li>Lemon Balm (<em>Melissa officinalis</em>)</li>\n<li>Motherwort (<em>Leonurus cardiaca</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>An Shen Ding Zhi Wan</strong> (Calm the Spirit and Settle the Emotions Pill)</p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Fu ling (Poria)</li>\n<li>Fu shen (Poria with wood)</li>\n<li>Yuan zhi (Polygala)</li>\n<li>Shi chang pu (Acorus)</li>\n<li>Long chi (Dragon tooth)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 7, PC 6, GB 40, RN 14</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: L-theanine for calming; reduce caffeine and other stimulants</li>\n</ul>"}], "id": "ht__p3"}, {"category": "Qi Deficiency", "subtitle": "Heart Qi Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Reduced cardiac functional reserve under exertion.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced cardiac reserve, reduced stroke volume under exertion, and mild autonomic imbalance without the structural decline seen in Heart Yang Deficiency.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced myocardial contractile reserve, mildly reduced ejection fraction, reduced exercise-induced augmentation of cardiac output.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Palpitations worse with exertion, shortness of breath, spontaneous sweating, fatigue, and pale complexion.</p>"}, {"label": "Tongue", "value": "<p>Pale body, thin white coating.</p>"}, {"label": "Pulse", "value": "<p>Weak (Ruo) or Empty (Xu), soft and lacking force, most notable at the left Cun (Heart) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, worse with exertion and as the day progresses. Better with rest.<br />\n&gt; rest, gentle graded activity, adequate sleep<br />\n&lt; overexertion, sleep deprivation, prolonged talking/singing</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized fatigue-related weakness, mild breathlessness with exertion, no significant structural pain.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Mild anxiety about physical capacity, a quiet fatigue-driven withdrawal, low motivation for exertion rather than acute distress.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Mild heart failure with preserved ejection fraction, deconditioning, chronic fatigue with a cardiac component, mild arrhythmia accompanied by fatigue.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Cardiac: Echocardiogram showing preserved or mildly reduced ejection fraction; exercise stress testing showing reduced functional capacity.</p>\n<p>Metabolic: Rule out anemia or thyroid dysfunction as contributing factors.</p>"}, {"label": "Herb Classes", "value": "<p>Tonify Heart Qi</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Ginseng (Ren shen)</li>\n<li>Astragalus (Huang qi)</li>\n<li>Poria with wood (Fu shen)</li>\n<li>Schisandra (Wu wei zi)</li>\n<li>Honey-fried licorice (Zhi gan cao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>American Ginseng (<em>Panax quinquefolius</em>)</li>\n<li>Hawthorn (<em>Crataegus monogyna</em>)</li>\n<li>Astragalus (<em>Astragalus membranaceus</em>)</li>\n<li>Motherwort (<em>Leonurus cardiaca</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Yang Xin Tang</strong> (Nourish the Heart Decoction)</p>\n<ul>\n<li>Huang qi (Astragalus)</li>\n<li>Fu ling (Poria)</li>\n<li>Fu shen (Poria with wood)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Chuan xiong (Ligusticum)</li>\n<li>Ban xia qu (Prepared pinellia)</li>\n<li>Yuan zhi (Polygala)</li>\n<li>Rou gui (Cinnamon bark)</li>\n<li>Bai zi ren (Biota seed)</li>\n<li>Suan zao ren (Sour jujube seed)</li>\n<li>Wu wei zi (Schisandra)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 7, PC 6, RN 17, BL 15, ST 36</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex, D</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: CoQ10 for mitochondrial/energetic support; graded aerobic reconditioning</li>\n</ul>"}], "id": "ht__p4"}, {"category": "Blood Excess", "subtitle": "Heart Blood Stasis", "fields": [{"label": "Primary Biological Axis", "value": "<p>Circulatory/Nutritive (Blood Axis): Obstructed coronary perfusion from atherosclerotic and thrombogenic processes.</p>"}, {"label": "Pathophysiology", "value": "<p>Coronary atherosclerotic plaque with reduced myocardial perfusion, endothelial dysfunction, and platelet hyperaggregability.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated LDL oxidation, elevated inflammatory markers within atherosclerotic plaque (IL-6, hs-CRP), elevated platelet activation markers (thromboxane A2).</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Fixed, stabbing chest pain that may radiate to the shoulder or arm, purplish lips and tongue, palpitations, and a sensation of oppression in the chest.</p>"}, {"label": "Tongue", "value": "<p>Dark purple or dusky body, possibly with visible stasis spots.</p>"}, {"label": "Pulse", "value": "<p>Choppy (Se) or Knotted/Intermittent (Jie/Dai), rough and uneven under the fingers.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Episodic or chronic, often triggered or worsened by exertion, cold, or emotional stress. Fixed in location, worse at night.<br />\n&gt; rest, warmth, gradual activity<br />\n&lt; exertion, cold, emotional stress, fatty food</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Fixed stabbing chest pain radiating to the left shoulder or arm, occasional jaw or upper back referred discomfort.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Suppressed anxiety about the heart itself, a guarded quality around exertion, occasionally a stoic minimization of symptoms that delays seeking care.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Coronary artery disease, angina pectoris, myocardial infarction, atherosclerotic cardiovascular disease generally.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Cardiac: Elevated troponin if acute infarction; coronary angiography or CT angiography showing stenotic lesions; elevated LDL and Lp(a).</p>\n<p>Inflammatory: Elevated hs-CRP as an independent cardiovascular risk marker.</p>"}, {"label": "Herb Classes", "value": "<p>Invigorate Blood, unblock the vessels, relieve pain</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Salvia (Dan shen)</li>\n<li>Persica (Tao ren)</li>\n<li>Carthamus (Hong hua)</li>\n<li>Ligusticum (Chuan xiong)</li>\n<li>Frankincense (Ru xiang)</li>\n<li>Myrrh (Mo yao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Hawthorn (<em>Crataegus monogyna</em>)</li>\n<li>Ginkgo (<em>Ginkgo biloba</em>)</li>\n<li>Garlic (<em>Allium sativum</em>)</li>\n<li>Turmeric (<em>Curcuma longa</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Xue Fu Zhu Yu Tang</strong> (Drive Out Stasis in the Mansion of Blood Decoction)</p>\n<ul>\n<li>Tao ren (Persica)</li>\n<li>Hong hua (Carthamus)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Chuan xiong (Ligusticum)</li>\n<li>Chi shao (Red peony)</li>\n<li>Niu xi (Achyranthes)</li>\n<li>Jie geng (Platycodon)</li>\n<li>Chai hu (Bupleurum)</li>\n<li>Zhi ke (Bitter orange)</li>\n<li>Gan cao (Licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>PC 6, HT 7, BL 14, BL 15, RN 17</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: E</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Omega-3 fatty acids and CoQ10 for cardiovascular support; avoid smoking entirely</li>\n</ul>"}], "id": "ht__p5"}, {"category": "Blood Deficiency", "subtitle": "Heart Blood Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Circulatory/Nutritive (Blood Axis): Reduced oxygen-carrying capacity with secondary compensatory cardiac and cerebral effects.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced oxygen-carrying capacity driving compensatory tachycardia and palpitations, and reduced cerebral perfusion contributing to dizziness and memory difficulty.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced hemoglobin synthesis, compensatory elevation of erythropoietin where marrow-responsive, reduced myocardial oxygen delivery under exertion.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Palpitations, insomnia, poor memory, dizziness, pale complexion and lips, and general fatigue.</p>"}, {"label": "Tongue", "value": "<p>Pale body, thin.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) or Choppy (Se), fine and difficult to locate.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, worse with fatigue, overwork, or after significant blood loss (menstrual, surgical, postpartum). Better with rest and nourishing food.<br />\n&gt; rest, nourishing food, adequate sleep<br />\n&lt; overexertion, excessive blood loss, chronic undernutrition</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized weakness, mild dizziness with positional change, no significant structural pain.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety and poor sleep with vivid or unsettled dreaming, poor concentration, indecisiveness — the Shen lacking adequate Blood to house it at night.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Iron-deficiency anemia with cardiac symptoms, mild anemia of chronic disease, B12 deficiency with neuro-cardiac symptoms.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Hematologic: Low hemoglobin/hematocrit, low ferritin, low serum iron with elevated total iron-binding capacity.</p>\n<p>Nutritional: Low B12/folate where relevant.</p>"}, {"label": "Herb Classes", "value": "<p>Nourish Heart Blood</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Angelica sinensis (Dang gui)</li>\n<li>Sour jujube seed (Suan zao ren)</li>\n<li>Longan (Long yan rou)</li>\n<li>Prepared rehmannia (Shu di huang)</li>\n<li>Polygala (Yuan zhi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Hawthorn (<em>Crataegus monogyna</em>)</li>\n<li>Nettle Leaf (<em>Urtica dioica</em>)</li>\n<li>Oats (<em>Avena sativa</em>)</li>\n<li>Chamomile (<em>Matricaria chamomilla</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Si Wu Tang</strong> (Four Substance Decoction)</p>\n<ul>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Bai shao (White peony)</li>\n<li>Chuan xiong (Ligusticum)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 7, SP 6, BL 15, BL 17, RN 4</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B12</li>\n<li>Minerals/Metals: Fe</li>\n<li>Other: Folate; adequate dietary protein and heme-iron sources</li>\n</ul>"}], "id": "ht__p6"}, {"category": "Yin Excess", "subtitle": "Phlegm Misting the Heart", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Excess fluid/secretory burden compromising consciousness and cognitive clarity.</p>"}, {"label": "Pathophysiology", "value": "<p>Cerebral hypoperfusion or structural cerebral insult, excessive airway or oral secretions, and altered consciousness arising from metabolic or structural disruption.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced cerebral glucose metabolism on functional imaging, elevated neuroinflammatory markers in post-stroke or post-seizure states, altered acetylcholine signaling in cognitive blunting presentations.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Mental confusion or dullness, in severe cases stupor or loss of consciousness, a gurgling sound in the throat from phlegm, possible seizure activity, and chest oppression.</p>"}, {"label": "Tongue", "value": "<p>Pale or normal body with a thick, greasy, white coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua), rolling smoothly under the fingers; may be deep or hidden in acute loss-of-consciousness presentations.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Acute (post-stroke, post-seizure, delirium) or chronic (depression with cognitive blunting). Worse in damp weather.<br />\n&gt; warmth, dry environment, gradual cognitive stimulation<br />\n&lt; damp, cold, sedating medications where avoidable</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized heaviness, reduced spontaneous movement, chest oppression.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Mental fog, dullness, or in severe cases frank loss of consciousness — the Shen's clarity obscured by accumulated Phlegm rather than lacking Blood or Yin to house it.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Post-stroke altered consciousness, seizure disorders with post-ictal confusion, delirium with prominent respiratory secretions, severe depression with cognitive blunting (\"pseudo-dementia\").</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Neurological: EEG showing seizure activity where relevant; neuroimaging (CT/MRI) to identify structural cerebral lesions.</p>\n<p>Metabolic: Rule out metabolic causes of altered consciousness (glucose, electrolytes, ammonia, thyroid).</p>"}, {"label": "Herb Classes", "value": "<p>Transform Phlegm, open the orifices</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Acorus (Shi chang pu)</li>\n<li>Curcuma (Yu jin)</li>\n<li>Pinellia (Ban xia)</li>\n<li>Bile arisaema (Dan nan xing)</li>\n<li>Poria (Fu ling)</li>\n<li>Tangerine peel (Chen pi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Gotu Kola (<em>Centella asiatica</em>)</li>\n<li>Ginkgo (<em>Ginkgo biloba</em>)</li>\n<li>Rosemary (<em>Salvia rosmarinus</em>)</li>\n<li>Bacopa (<em>Bacopa monnieri</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Di Tan Tang</strong> (Scour Phlegm Decoction)</p>\n<ul>\n<li>Ban xia (Pinellia)</li>\n<li>Dan nan xing (Bile arisaema)</li>\n<li>Zhi shi (Bitter orange)</li>\n<li>Fu ling (Poria)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Shi chang pu (Acorus)</li>\n<li>Zhu ru (Bamboo shavings)</li>\n<li>Gan cao (Licorice)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>PC 5, ST 40, GV 20, PC 6</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Choline for cognitive/membrane support; medical evaluation of the underlying neurological cause is essential and should not be delayed by herbal treatment</li>\n</ul>"}], "id": "ht__p7"}, {"category": "Yin Deficiency", "subtitle": "Heart Yin Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Chronic structural fluid depletion reducing nocturnal parasympathetic restoration.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced parasympathetic/vagal restorative tone, chronic sympathetic overactivity without adequate nocturnal down-regulation, and a mild chronic low-grade inflammatory state.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced nocturnal melatonin secretion, elevated evening cortisol, reduced heart-rate variability reflecting reduced vagal tone.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Palpitations, difficulty staying asleep (as opposed to falling asleep), night sweats, five-center heat, malar flush, and dry mouth.</p>"}, {"label": "Tongue", "value": "<p>Red body with little or no coating, may show a crack down the center extending to the tip.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), fine and fast, most notable at the left Cun (Heart) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset, worse in the evening and at night, worse in hot weather.<br />\n&gt; rest, cooling/moistening foods, quiet evenings<br />\n&lt; overwork, heat exposure, insufficient sleep, stimulants</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Mild restlessness with fidgeting, nocturnal warmth-related discomfort, no significant structural pain.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A restless, \"tired but wired\" quality — anxiety and racing thoughts particularly at night, when the Shen is meant to rest but lacks sufficient Yin to be contained.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Menopausal palpitations and insomnia, hyperthyroidism with cardiac symptoms, chronic anxiety-related insomnia with a prominent autonomic component.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Endocrine: Declining estradiol/testosterone in menopausal presentations; TSH suppressed with elevated free T4 if hyperthyroid.</p>\n<p>Autonomic: Reduced heart-rate variability; polysomnography showing reduced sleep efficiency where formally assessed.</p>"}, {"label": "Herb Classes", "value": "<p>Nourish Heart Yin</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Ophiopogon (Mai men dong)</li>\n<li>Schisandra (Wu wei zi)</li>\n<li>Sour jujube seed (Suan zao ren)</li>\n<li>Biota seed (Bai zi ren)</li>\n<li>Prepared rehmannia (Shu di huang)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Milky Oats (<em>Avena sativa</em>)</li>\n<li>Motherwort (<em>Leonurus cardiaca</em>)</li>\n<li>Passionflower (<em>Passiflora incarnata</em>)</li>\n<li>Solomon's Seal (<em>Polygonatum multiflorum</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Tian Wang Bu Xin Dan</strong> (Emperor of Heaven's Special Pill to Tonify the Heart)</p>\n<ul>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Xuan shen (Scrophularia)</li>\n<li>Dan shen (Salvia)</li>\n<li>Fu ling (Poria)</li>\n<li>Wu wei zi (Schisandra)</li>\n<li>Yuan zhi (Polygala)</li>\n<li>Jie geng (Platycodon)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Tian men dong (Asparagus root)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Bai zi ren (Biota seed)</li>\n<li>Suan zao ren (Sour jujube seed)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>HT 6, KI 6, SP 6, RN 4, HT 7</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: Adequate hydration; consistent sleep-wake timing to support nocturnal parasympathetic restoration</li>\n</ul>"}], "id": "ht__p8"}]}, {"slug": "tb-pc", "title": "Triple Burner-Pericardium System", "subtitle": "", "character": "", "order": 6, "preface": [], "conditions": [], "conditionsIntro": "", "patterns": [{"category": "Yang Excess", "subtitle": "TB: San Jiao Fire (Triple Burner Heat Excess)", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Systemic hyperinflammatory state spanning all three Burners rather than localized to one organ.</p>"}, {"label": "Pathophysiology", "value": "<p>Widespread pro-inflammatory cytokine release, systemic vasodilation, and a hypermetabolic state affecting the upper (respiratory/cardiac), middle (digestive), and lower (urogenital/eliminative) territories simultaneously.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated systemic IL-6, TNF-α, and IL-1β, elevated CRP/procalcitonin, widespread NF-κB activation across multiple tissue beds.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Generalized high fever, marked thirst, restlessness, possible constipation, dark scanty urine — heat pervading all three burners rather than concentrated in one organ's own territory.</p>"}, {"label": "Tongue", "value": "<p>Red body throughout, thick yellow coating covering the whole surface rather than a single zone.</p>"}, {"label": "Pulse", "value": "<p>Rapid (Shuo) and forceful throughout all three positions (Cun, Guan, Chi).</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Acute, rapidly progressive. Worse as the day progresses, worse with dehydration.<br />\n&gt; cooling, hydration, rest<br />\n&lt; heat exposure, dehydration, delayed treatment</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized malaise and myalgia, diffuse body aches accompanying the systemic fever.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Restlessness and agitation proportional to fever severity, mental clouding as systemic heat intensifies.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Systemic inflammatory response syndrome (SIRS), early/hyperdynamic-phase sepsis, severe systemic infection with multi-organ involvement.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Inflammatory: Markedly elevated CRP and procalcitonin; leukocytosis with left shift.</p>\n<p>Metabolic: Elevated lactate if hypoperfusion is developing; blood cultures positive if bacteremic.</p>"}, {"label": "Herb Classes", "value": "<p>Clear heat from all three Burners</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Gypsum (Shi gao)</li>\n<li>Coptis (Huang lian)</li>\n<li>Chinese skullcap (Huang qin)</li>\n<li>Phellodendron (Huang bai)</li>\n<li>Forsythia (Lian qiao)</li>\n<li>Honeysuckle (Jin yin hua)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Echinacea (<em>Echinacea purpurea</em>)</li>\n<li>Andrographis (<em>Andrographis paniculata</em>)</li>\n<li>Boneset (<em>Eupatorium perfoliatum</em>)</li>\n<li>Yarrow (<em>Achillea millefolium</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Huang Lian Jie Du Tang</strong> (Coptis Decoction to Relieve Toxicity)</p>\n<ul>\n<li>Huang lian (Coptis)</li>\n<li>Huang qin (Chinese skullcap)</li>\n<li>Huang bai (Phellodendron)</li>\n<li>Zhi zi (Gardenia)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>TB 5, TB 6, LI 11, DU 14, TB 2</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C</li>\n<li>Minerals/Metals: Zn</li>\n<li>Other: Aggressive hydration and electrolyte repletion; medical evaluation for infectious source is essential and should not be delayed by herbal treatment</li>\n</ul>"}], "id": "tb-pc__p1"}, {"category": "Yang Deficiency", "subtitle": "TB: San Jiao Yang Deficiency (Failure of Qi Transformation)", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Hypofunction of the whole fluid-metabolism pathway — the transformation and movement of fluid across all three Burners running cold and sluggish.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced aldosterone/ADH regulation combined with reduced cardiac and renal output, and reduced capillary oncotic pressure, together producing generalized rather than localized fluid retention.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced RAAS-appropriate compensatory response, reduced hepatic albumin synthesis, reduced renal sodium/water handling.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Generalized edema (face, limbs, and in advanced cases the whole body), reduced urination, cold extremities, fatigue, poor appetite, loose stools.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen body with a wet white coating.</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen) and Weak (Ruo) throughout all three positions.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset, worse in cold weather and toward the end of the day (dependent edema). Worse with prolonged standing/sitting.<br />\n&gt; warmth, rest, elevation of swollen limbs<br />\n&lt; cold, prolonged standing, excess salt/fluid intake</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized heaviness in the limbs, cold extremities, mild joint stiffness from tissue edema.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Low drive and a diminished, waterlogged mental quality — heaviness in thought mirroring heaviness in the body.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Generalized/systemic edema states (nephrotic syndrome, right heart failure with anasarca, hypoalbuminemia), hypothyroid-associated myxedema.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Renal/Hepatic: Low serum albumin; proteinuria if nephrotic; elevated creatinine if renal function is impaired.</p>\n<p>Cardiac: Elevated BNP/NT-proBNP if right heart failure is contributing.</p>\n<p>Endocrine: TSH elevated with free T3/T4 low-normal or low if hypothyroid.</p>"}, {"label": "Herb Classes", "value": "<p>Warm and promote Qi transformation, disinhibit water</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Cinnamon bark (Rou gui)</li>\n<li>Prepared aconite (Fu zi)</li>\n<li>Poria (Fu ling)</li>\n<li>Polyporus (Zhu ling)</li>\n<li>Astragalus (Huang qi)</li>\n<li>White atractylodes (Bai zhu)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Ginger (<em>Zingiber officinale</em>)</li>\n<li>Dandelion (<em>Taraxacum officinale</em>)</li>\n<li>Juniper (<em>Juniperus communis</em>)</li>\n<li>Cinnamon (<em>Cinnamomum verum</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Zhen Wu Tang</strong> (True Warrior Decoction)</p>\n<ul>\n<li>Fu zi (Prepared aconite)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fu ling (Poria)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Bai shao (White peony)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>TB 4, RN 9, RN 5, BL 22</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Address underlying renal/cardiac/thyroid cause directly; monitor sodium and fluid intake as clinically indicated</li>\n</ul>"}], "id": "tb-pc__p2"}, {"category": "Qi Excess", "subtitle": "TB: San Jiao Qi Stagnation", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Functional, non-structural disruption of vascular permeability and lymphatic flow across the fluid-passage system.</p>"}, {"label": "Pathophysiology", "value": "<p>Autonomic dysregulation of vascular permeability and lymphatic flow producing functional, non-structural fluid shifts — distension and mild edema that move and fluctuate rather than settling in one place.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Altered capillary permeability under sympathetic stress states, functionally variable lymphatic flow without structural obstruction.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Fluctuating distension and bloating throughout the abdomen and chest, intermittent edema that comes and goes with stress or position change, a diffuse sense of fullness without clear localization.</p>"}, {"label": "Tongue", "value": "<p>Normal or slightly swollen body, thin white coating.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian) throughout, may shift in strength with stress.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Fluctuates with stress and position; often worse by end of day, better on waking.<br />\n&gt; movement, stress reduction, elevation of swollen areas<br />\n&lt; prolonged sitting/standing, stress, salty food</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Diffuse bloating-related discomfort, mild joint puffiness that shifts location, tension accompanying the fullness.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A restless, unsettled quality tied directly to physical bloating/fullness — frustration with the body's own unpredictability.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Functional bloating/distension syndromes, cyclical idiopathic edema, stress-related fluid retention.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Workup: Typically normal renal/hepatic/cardiac panels (a diagnosis of exclusion biomedically), distinguishing this from San Jiao Yang Deficiency's structural fluid retention.</p>"}, {"label": "Herb Classes", "value": "<p>Regulate Qi, promote fluid movement</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Cyperus (Xiang fu)</li>\n<li>Areca peel (Da fu pi)</li>\n<li>Poria skin (Fu ling pi)</li>\n<li>Tangerine peel (Chen pi)</li>\n<li>Lindera (Wu yao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Fennel (<em>Foeniculum vulgare</em>)</li>\n<li>Dandelion Leaf (<em>Taraxacum officinale</em>)</li>\n<li>Ginger (<em>Zingiber officinale</em>)</li>\n<li>Chamomile (<em>Matricaria chamomilla</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Wu Pi Yin</strong> (Five Peel Drink)</p>\n<ul>\n<li>Fu ling pi (Poria skin)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Sang bai pi (Mulberry root bark)</li>\n<li>Da fu pi (Areca peel)</li>\n<li>Sheng jiang pi (Fresh ginger peel)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>TB 6, RN 9, SP 9, LR 3, TB 3</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B6</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: Magnesium for fluid-shift-related tension; regular movement to support lymphatic flow</li>\n</ul>"}], "id": "tb-pc__p3"}, {"category": "Qi Deficiency", "subtitle": "TB: San Jiao Qi Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Broad, non-localized weakness of the whole Qi-distribution and fluid-transformation pathway.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced overall metabolic and Qi-transformation capacity distributed across all three Burners rather than any single organ system — a diffuse, low-grade functional weakness.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Broadly reduced mitochondrial ATP output, mild reduction in albumin/total protein synthesis.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Generalized fatigue, poor appetite, mild diffuse edema worse with exertion, weak voice, spontaneous sweating.</p>"}, {"label": "Tongue", "value": "<p>Pale body, thin white coating, may show mild swelling.</p>"}, {"label": "Pulse", "value": "<p>Weak (Ruo) or Empty (Xu) throughout all three positions.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, worse with exertion and as the day progresses. Better with rest.<br />\n&gt; rest, warm nourishing food, gentle movement<br />\n&lt; overexertion, prolonged standing, irregular meals</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized fatigue-related weakness, mild diffuse puffiness worse with exertion.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Low motivation and a diffuse, hard-to-localize sense of depletion — tired in a way that doesn't map to any one system.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Chronic fatigue syndrome with a fluid-retention component, general deconditioning, mild chronic hypoalbuminemia.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Nutritional: Low-normal albumin/prealbumin.</p>\n<p>Metabolic: Rule out anemia, thyroid dysfunction, and adrenal insufficiency as contributing factors.</p>"}, {"label": "Herb Classes", "value": "<p>Tonify Qi broadly, support fluid transformation</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Astragalus (Huang qi)</li>\n<li>Ginseng (Ren shen)</li>\n<li>White atractylodes (Bai zhu)</li>\n<li>Poria (Fu ling)</li>\n<li>Licorice (Gan cao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Astragalus (<em>Astragalus membranaceus</em>)</li>\n<li>American Ginseng (<em>Panax quinquefolius</em>)</li>\n<li>Dandelion (<em>Taraxacum officinale</em>)</li>\n<li>Oats (<em>Avena sativa</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Fang Ji Huang Qi Tang</strong> (Stephania and Astragalus Decoction)</p>\n<ul>\n<li>Fang ji (Stephania)</li>\n<li>Huang qi (Astragalus)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Gan cao (Licorice)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Da zao (Jujube)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>TB 4, ST 36, RN 6, SP 9, BL 22</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex, D</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Adequate dietary protein; graded activity as tolerated</li>\n</ul>"}], "id": "tb-pc__p4"}, {"category": "Yin Excess", "subtitle": "TB: San Jiao Damp-Heat (Damp-Warmth Lingering in the Triple Burner)", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Persistent, low-grade systemic inflammatory/damp burden spanning all three Burners — the classic Damp-Warmth (湿温) presentation of Warm Disease theory.</p>"}, {"label": "Pathophysiology", "value": "<p>Gut-associated systemic low-grade inflammation, dysbiosis-driven endotoxemia, and sluggish lymphatic clearance producing a persistent, hard-to-resolve low-grade inflammatory state.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Chronically elevated but modest IL-6/CRP, elevated LPS-binding protein reflecting gut-derived endotoxemia.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Low-grade persistent fever, a heavy sensation throughout the body, chest and epigastric fullness, poor appetite — notoriously slow to resolve compared to acute heat patterns.</p>"}, {"label": "Tongue", "value": "<p>Greasy, thick, yellow-white coating covering the whole surface.</p>"}, {"label": "Pulse", "value": "<p>Soggy (Ru) or Slippery (Hua), soft and rolling rather than sharply forceful.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, protracted course, worse in humid weather and summer. Notoriously slow to resolve once established.<br />\n&gt; dry climate, light diet, patience with gradual resolution<br />\n&lt; humidity, greasy/fatty food, alcohol</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized heaviness and achiness, joint stiffness with a damp quality, lethargy disproportionate to any single finding.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Mental fog and a \"stuck,\" unresolving quality to mood — low-grade malaise that doesn't clear even with rest, mirroring the pattern's own slow-to-resolve nature.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Prolonged or atypical infections with persistent low-grade fever, metabolic syndrome with systemic low-grade inflammation, post-viral fatigue syndromes with a prominent GI/inflammatory component.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Inflammatory: Modestly elevated CRP/ESR, persisting longer than expected for the apparent severity of illness.</p>\n<p>GI: Elevated LPS-binding protein or zonulin if gut permeability is being assessed; stool studies showing dysbiotic pattern.</p>"}, {"label": "Herb Classes", "value": "<p>Transform damp, clear heat, aromatic transformation</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Amomum (Bai dou kou)</li>\n<li>Coix seed (Yi yi ren)</li>\n<li>Talcum (Hua shi)</li>\n<li>Pogostemon (Huo xiang)</li>\n<li>Areca husk (Da fu pi)</li>\n<li>Apricot kernel (Xing ren)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Gentian (<em>Gentiana lutea</em>)</li>\n<li>Dandelion (<em>Taraxacum officinale</em>)</li>\n<li>Chamomile (<em>Matricaria chamomilla</em>)</li>\n<li>Andrographis (<em>Andrographis paniculata</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>San Ren Tang</strong> (Three Kernel Decoction)</p>\n<ul>\n<li>Xing ren (Apricot kernel)</li>\n<li>Bai dou kou (Amomum)</li>\n<li>Yi yi ren (Coix seed)</li>\n<li>Hou po (Magnolia bark)</li>\n<li>Ban xia (Pinellia)</li>\n<li>Tong cao (Rice paper pith)</li>\n<li>Hua shi (Talcum)</li>\n<li>Dan zhu ye (Lophatherum)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>SP 9, TB 6, RN 9, ST 40, LI 11</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Probiotic support once acute inflammatory phase settles; reduce refined carbohydrate and alcohol intake</li>\n</ul>"}], "id": "tb-pc__p5"}, {"category": "Yin Deficiency", "subtitle": "TB: San Jiao Fluid Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Generalized fluid depletion across the whole metabolic pathway rather than any single organ's Yin specifically.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced total body water with mucosal surface dryness throughout, and broadly reduced aquaporin-mediated fluid retention rather than a single-organ deficit.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Compensatory elevation of ADH against persistent mild hypovolemia, reduced aquaporin-2 responsiveness.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Generalized dryness of the mouth, skin, and eyes, scanty urine, dry stools, and mild diffuse heat sensations without a clear single source.</p>"}, {"label": "Tongue", "value": "<p>Thin, dry body with little coating throughout.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), fine and fast.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, gradual, worse in dry/hot weather and with inadequate hydration.<br />\n&gt; adequate hydration, moistening foods, cool environments<br />\n&lt; dehydration, excessive sweating, diuretics/laxatives overuse</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized dryness-related stiffness, mild diffuse muscle cramping.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A depleted, low-reserve quality without acute distress — mild restlessness from diffuse dryness rather than the sharper anxiety of organ-specific Yin deficiency patterns.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Chronic mild dehydration, Sjögren's-adjacent generalized dryness, post-diuretic or post-diaphoretic fluid depletion.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Metabolic: Elevated serum osmolality; elevated urine specific gravity with reduced volume.</p>\n<p>Electrolytes: Assess for mild hypernatremia in significant chronic depletion.</p>"}, {"label": "Herb Classes", "value": "<p>Generate fluids broadly, nourish Yin</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Ophiopogon (Mai men dong)</li>\n<li>Trichosanthes root (Tian hua fen)</li>\n<li>Dendrobium (Shi hu)</li>\n<li>Glehnia (Sha shen)</li>\n<li>Raw rehmannia (Sheng di huang)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Marshmallow Root (<em>Althaea officinalis</em>)</li>\n<li>Licorice (<em>Glycyrrhiza glabra</em>)</li>\n<li>Solomon's Seal (<em>Polygonatum multiflorum</em>)</li>\n<li>Milky Oats (<em>Avena sativa</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Zeng Ye Tang</strong> (Increase the Fluids Decoction)</p>\n<ul>\n<li>Xuan shen (Scrophularia)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>TB 6, KI 6, SP 6, RN 4</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: (none specified)</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Adequate hydration and electrolyte balance is the single most correctable factor</li>\n</ul>"}], "id": "tb-pc__p6"}, {"category": "Yang Excess", "subtitle": "Pc: Heat Entering the Pericardium", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Acute systemic inflammatory crisis with blood-brain barrier disruption — pathogenic heat breaching the Pericardium's protective role en route to the Heart.</p>"}, {"label": "Pathophysiology", "value": "<p>Systemic inflammatory response with blood-brain barrier disruption, cytokine-mediated encephalopathy, and hyperthermia-associated altered consciousness.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Markedly elevated systemic IL-6/TNF-α, disrupted blood-brain barrier tight-junction protein expression, elevated central inflammatory markers where CSF is sampled.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>High fever, delirium or confused speech, restlessness progressing to loss of consciousness in severe cases — the classic Warm Disease crisis pattern.</p>"}, {"label": "Tongue", "value": "<p>Dark red body, especially the tip, may appear dry.</p>"}, {"label": "Pulse", "value": "<p>Rapid (Shuo) and forceful, may become faint or hidden as consciousness declines in the most severe presentations.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Acute, rapidly progressive, a medical emergency. Worse as fever climbs.<br />\n&gt; immediate medical treatment, cooling, rest<br />\n&lt; delayed treatment, dehydration, further heat exposure</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized rigidity or restlessness depending on the stage, possible neck stiffness if meningeal involvement is present.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Confusion progressing to delirium and, in the most severe cases, loss of consciousness — the Shen overwhelmed as pathogenic heat breaches its protective barrier.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Sepsis with encephalopathy, severe bacterial meningitis or encephalitis, high fever-associated delirium in children or the critically ill.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>This is a medical emergency requiring immediate biomedical evaluation, not herbal management alone.</p>\n<p>Inflammatory/Infectious: Markedly elevated CRP/procalcitonin, blood and CSF cultures where indicated, CSF analysis for meningitis/encephalitis.</p>"}, {"label": "Herb Classes", "value": "<p>Clear heat, open the orifices, arrest wind</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Water buffalo horn (Shui niu jiao)</li>\n<li>Coptis (Huang lian)</li>\n<li>Gardenia (Zhi zi)</li>\n<li>Forsythia (Lian qiao)</li>\n<li>Moutan (Mu dan pi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Echinacea (<em>Echinacea purpurea</em>)</li>\n<li>Andrographis (<em>Andrographis paniculata</em>)</li>\n<li>Skullcap (<em>Scutellaria lateriflora</em>)</li>\n<li>Lemon Balm (<em>Melissa officinalis</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Qing Ying Tang</strong> (Clear the Nutritive Level Decoction)</p>\n<ul>\n<li>Shui niu jiao (Water buffalo horn)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Xuan shen (Scrophularia)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Jin yin hua (Honeysuckle)</li>\n<li>Lian qiao (Forsythia)</li>\n<li>Huang lian (Coptis)</li>\n<li>Zhu ye xin (Lophatherum heart)</li>\n<li>Dan shen (Salvia)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>PC 8, PC 9, GV 26, GV 14, HT 8</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: This is an emergency presentation — biomedical treatment takes priority; herbal/nutrient support is adjunctive only, under direct clinical supervision</li>\n</ul>"}], "id": "tb-pc__p7"}, {"category": "Yin Excess", "subtitle": "Pc: Phlegm-Heat Misting the Pericardium", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Acute infection-driven fluid/secretory burden compromising consciousness — distinguished from Heart's own chronic Phlegm Misting pattern by its acute, febrile-illness-specific onset.</p>"}, {"label": "Pathophysiology", "value": "<p>Acute systemic infection with secondary CNS involvement and excessive airway or oral secretions, typically arising in the context of critical illness rather than a chronic structural or metabolic process.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated CSF/serum inflammatory markers in infectious encephalopathy, elevated mucin production in concurrent respiratory infection.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Stupor or coma with a gurgling sound of phlegm in the throat, high fever, possible seizure activity — an acute, infection-driven presentation.</p>"}, {"label": "Tongue", "value": "<p>Thick, greasy, yellow coating; body may be dark.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Rapid (Shuo), rolling quickly.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Acute, arising in the context of severe febrile or infectious illness. A medical emergency.<br />\n&gt; immediate medical treatment, airway support, rest<br />\n&lt; delayed treatment, aspiration risk if secretions are unmanaged</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized flaccidity or rigidity depending on the stage of illness, minimal spontaneous movement in severe stupor.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Clouded consciousness progressing to stupor — the Shen's clarity obscured by both heat and accumulated Phlegm simultaneously, a more severe and acute picture than Heart's own chronic Phlegm-Misting pattern.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Sepsis-associated encephalopathy, severe pneumonia with delirium, acute bacterial meningitis with copious respiratory secretions.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>This is a medical emergency requiring immediate biomedical evaluation, not herbal management alone.</p>\n<p>Infectious/Neurological: Blood and CSF cultures where indicated, neuroimaging to rule out structural cause, EEG if seizure activity is present.</p>"}, {"label": "Herb Classes", "value": "<p>Clear heat, transform phlegm, open the orifices</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Bile arisaema (Dan nan xing)</li>\n<li>Acorus (Shi chang pu)</li>\n<li>Coptis (Huang lian)</li>\n<li>Trichosanthes fruit (Gua lou)</li>\n<li>Bamboo shavings (Zhu ru)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Gotu Kola (<em>Centella asiatica</em>)</li>\n<li>Skullcap (<em>Scutellaria lateriflora</em>)</li>\n<li>Ginkgo (<em>Ginkgo biloba</em>)</li>\n<li>Andrographis (<em>Andrographis paniculata</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>An Gong Niu Huang Wan</strong> (Peaceful Palace Bovine Bezoar Pill) — a classical emergency formula, typically hospital-administered</p>\n<ul>\n<li>Niu huang (Bovine bezoar)</li>\n<li>Shui niu jiao (Water buffalo horn)</li>\n<li>She xiang (Musk)</li>\n<li>Zhen zhu (Pearl)</li>\n<li>Xiong huang (Realgar)</li>\n<li>Zhi zi (Gardenia)</li>\n<li>Huang lian (Coptis)</li>\n<li>Huang qin (Chinese skullcap)</li>\n<li>Yu jin (Curcuma)</li>\n<li>Bing pian (Borneol)</li>\n<li>Jin bo (Amber)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>PC 9, GV 26, PC 8, ST 40, GV 20</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: (none specified)</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: This is an emergency presentation — biomedical treatment takes priority; herbal/nutrient support is adjunctive only, under direct clinical supervision</li>\n</ul>"}], "id": "tb-pc__p8"}, {"category": "Qi Deficiency", "subtitle": "Pc: Pericardium Qi Deficiency (Weakened Protective Barrier)", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Reduced baseline defensive/immune reserve — the protective \"gate\" itself running thin, offering the Heart poor buffering against acute insult.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced innate immune reserve and reduced barrier defenses generally, leaving poor physiological reserve to buffer an acute infectious insult before it becomes critical.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced neutrophil and complement reserve, reduced baseline immunoglobulin levels in some presentations, reduced acute-phase response capacity.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Recurrent infections that progress unusually quickly to severe presentations, general frailty, palpitations accompanied by a subjective sense of vulnerability.</p>"}, {"label": "Tongue", "value": "<p>Pale body, thin white coating.</p>"}, {"label": "Pulse", "value": "<p>Weak (Ruo), soft and lacking force.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, constitutional, worse with any acute infectious exposure. Worse with immunosuppressive states or advanced age.<br />\n&gt; rest, infection prevention, gradual immune support<br />\n&lt; acute infection exposure, overexertion, chronic immunosuppression</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized frailty and fatigue-related weakness, slow recovery from any physical insult.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A vulnerable, easily-overwhelmed quality — anxiety about becoming unwell, a felt sense of insufficient protection against the outside world.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Immunocompromised states (post-chemotherapy, immunosuppressive therapy, primary immunodeficiency), elderly frailty with poor infection tolerance, sepsis susceptibility in chronic disease.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Immunological: Reduced total immunoglobulin levels or subclasses where relevant; reduced absolute neutrophil count in chemotherapy-associated presentations.</p>\n<p>General: Low albumin/prealbumin reflecting overall physiological reserve.</p>"}, {"label": "Herb Classes", "value": "<p>Tonify Qi, strengthen defense</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Astragalus (Huang qi)</li>\n<li>Ginseng (Ren shen)</li>\n<li>White atractylodes (Bai zhu)</li>\n<li>Schisandra (Wu wei zi)</li>\n<li>Poria with wood (Fu shen)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Astragalus (<em>Astragalus membranaceus</em>)</li>\n<li>Reishi (<em>Ganoderma lucidum</em>)</li>\n<li>American Ginseng (<em>Panax quinquefolius</em>)</li>\n<li>Eleuthero (<em>Eleutherococcus senticosus</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Yu Ping Feng San</strong> (Jade Windscreen Powder)</p>\n<ul>\n<li>Huang qi (Astragalus)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fang feng (Saposhnikovia)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>PC 6, ST 36, RN 6, BL 14, BL 43</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C, D</li>\n<li>Minerals/Metals: Zn</li>\n<li>Other: Adequate protein intake; infection-prevention hygiene measures; medical evaluation of underlying immunocompromise where applicable</li>\n</ul>"}], "id": "tb-pc__p9"}, {"category": "Multi-Organ Patterns", "subtitle": "Triple Burner / Gallbladder — Shaoyang Disharmony", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Alternating fever and chills, bitter taste in the mouth, dry throat, dizziness, chest and rib-side fullness or distension, reduced appetite, nausea, irritability — the classic <em>Shang Han Lun</em> \"half-exterior, half-interior\" presentation.</p>"}, {"label": "Tongue", "value": "<p>Normal body with a thin white or slightly yellow coating.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian), the signature pulse of Shaoyang-stage disease.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Xiao Chai Hu Tang</strong> (Minor Bupleurum Decoction)</p>\n<ul>\n<li>Chai hu (Bupleurum)</li>\n<li>Huang qin (Chinese skullcap)</li>\n<li>Ban xia (Pinellia)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Da zao (Jujube)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>GB 41, TB 5, GB 20, LR 3, PC 6</p>"}], "id": "tb-pc__p10"}]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('workbook-data').textContent);

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'html') e.innerHTML = attrs[k];
    else e.setAttribute(k, attrs[k]);
  }
  if (children) children.forEach(c => c && e.appendChild(c));
  return e;
}

const tabsNav = document.getElementById('main-tabs');
const viewsWrap = document.getElementById('views');

// Activates a top-level view (one of the buttons in nav.tabs) by id.
function showTopView(id) {
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('nav.tabs button[data-view="' + id + '"]');
  if (btn) btn.classList.add('active');
  document.querySelectorAll('section.view').forEach(v => v.classList.remove('active'));
  const view = document.getElementById('view-' + id);
  if (view) view.classList.add('active');
}

function addTab(id, label, isActive) {
  const btn = el('button', { html: label });
  btn.dataset.view = id;
  if (isActive) btn.classList.add('active');
  btn.addEventListener('click', () => showTopView(id));
  tabsNav.appendChild(btn);
}

// Opens a specific organ's page (id "view-organ-<slug>"), which lives
// underneath the top-level "Organs" tab rather than having its own nav
// button — the organ picker (card grid) is what the Organs tab shows by
// default. Keeps the "Organs" nav button highlighted as active throughout.
function openOrgan(slug) {
  document.querySelectorAll('nav.tabs button').forEach(b => b.classList.remove('active'));
  const organsBtn = document.querySelector('nav.tabs button[data-view="organs"]');
  if (organsBtn) organsBtn.classList.add('active');
  document.querySelectorAll('section.view').forEach(v => v.classList.remove('active'));
  const view = document.getElementById('view-organ-' + slug);
  if (view) view.classList.add('active');
  if (typeof window.scrollTo === 'function') window.scrollTo(0, 0);
}

// Builds a labeled sub-tab row + matching sub-views, scoped under idPrefix
// (typically an organ slug) so multiple organs' subtabs never collide and
// so switchSubtab() can address a specific organ's subtabs from outside
// (e.g. jumpToPattern() switching to the Patterns subtab before opening a
// card). tabs: [{ id, label, render: () => Node }, ...].
function buildSubtabbedSection(idPrefix, tabs) {
  const subtabs = el('div', { class: 'subtabs', id: 'subtabs-' + idPrefix });
  const subviewsWrap = el('div', { id: 'subviews-' + idPrefix });
  tabs.forEach((t, i) => {
    const btn = el('button', { html: t.label });
    btn.dataset.subtab = t.id;
    if (i === 0) btn.classList.add('active');
    btn.addEventListener('click', () => switchSubtab(idPrefix, t.id));
    subtabs.appendChild(btn);

    const sv = el('div', { class: 'subview' + (i === 0 ? ' active' : ''), id: 'sub-' + idPrefix + '-' + t.id });
    sv.appendChild(t.render());
    subviewsWrap.appendChild(sv);
  });
  const wrap = el('div');
  wrap.appendChild(subtabs);
  wrap.appendChild(subviewsWrap);
  return wrap;
}

function switchSubtab(idPrefix, subtabId) {
  const subtabsBar = document.getElementById('subtabs-' + idPrefix);
  const subviewsWrap = document.getElementById('subviews-' + idPrefix);
  if (!subtabsBar || !subviewsWrap) return;
  subtabsBar.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.subtab === subtabId));
  subviewsWrap.querySelectorAll('.subview').forEach(v => v.classList.toggle('active', v.id === 'sub-' + idPrefix + '-' + subtabId));
}

const groupOrder = ["Yang Excess", "Yang Deficiency", "Qi Excess", "Qi Deficiency", "Blood Excess", "Blood Deficiency", "Yin Excess", "Yin Deficiency", "Multi-Organ Patterns"];
const specialGroupColors = { "Multi-Organ Patterns": "#5a6570" };
// Top-level Patterns-tab grouping: one heading per axis (Yang/Qi/Blood/Yin),
// with that axis's Excess/Deficiency patterns underneath rather than each
// getting its own heading — Excess vs. Deficiency still reads clearly from
// each card's own color-coded badge. An axis with zero patterns for this
// organ (e.g. Blood, currently Liver/Heart territory — no Lung patterns
// yet) is skipped automatically, same as the old per-category skip. Order
// within an axis (Excess before Deficiency) still comes from groupOrder.
const axisOrder = ["Yang", "Qi", "Blood", "Yin"];

function renderPatternCard(wrap, p, cat) {
  const color = DATA.colorLegend[cat] || specialGroupColors[cat] || '#8a6a4c';
  const card = el('div', {
    class: 'pattern-card', id: p.id,
