    style: `border-left-color:${color}; background: color-mix(in srgb, ${color} 6%, #fff);`
  });
  const head = el('div', { class: 'head' });
  const titles = el('div', { class: 'titles' }, [
    el('span', { class: 'cat-badge', style: `background:${color}`, html: cat }),
    el('span', { class: 'subtitle', html: p.subtitle || '' })
  ]);
  head.appendChild(titles);
  head.appendChild(el('span', { class: 'chevron', html: '&#9656;' }));
  head.addEventListener('click', () => card.classList.toggle('open'));
  card.appendChild(head);
  const body = el('div', { class: 'body' });
  p.fields.forEach(f => {
    const isFormula = /formula/i.test(f.label);
    const fieldEl = el('div', { class: 'field' + (isFormula ? ' formula' : '') });
    fieldEl.appendChild(el('div', { class: 'flabel', html: f.label }));
    fieldEl.appendChild(el('div', { class: 'fval', html: f.value }));
    body.appendChild(fieldEl);
  });
  card.appendChild(body);
  wrap.appendChild(card);
}

function buildPatternGroups(patterns) {
  const wrap = el('div');
  axisOrder.forEach(axis => {
    const cats = groupOrder.filter(c => c.startsWith(axis + ' '));
    const items = patterns.filter(p => cats.includes(p.category));
    if (!items.length) return;
    wrap.appendChild(el('h3', { class: 'group-heading', html: axis }));
    cats.forEach(cat => {
      patterns.filter(p => p.category === cat).forEach(p => renderPatternCard(wrap, p, cat));
    });
  });
  // Multi-Organ Patterns, plus any category not covered by axisOrder (future-proofing), last.
  const leftoverCats = groupOrder.filter(c => !axisOrder.some(a => c.startsWith(a + ' ')))
    .concat([...new Set(patterns.map(p => p.category))].filter(c => !groupOrder.includes(c)));
  leftoverCats.forEach(cat => {
    const items = patterns.filter(p => p.category === cat);
    if (!items.length) return;
    wrap.appendChild(el('h3', { class: 'group-heading', html: cat }));
    items.forEach(p => renderPatternCard(wrap, p, cat));
  });
  return wrap;
}

// Renders an organ's "common biomedical conditions" index (content/organs/
// <slug>/conditions.md, optional). Each condition's fields may contain
// <a class="pattern-link" data-id="..."> anchors (resolved at build time
// from "[[Category|Subtitle]]" shorthand in the markdown source) that jump
// to the matching pattern card via jumpToPattern() below.
function buildConditions(conditions) {
  const wrap = el('div');
  conditions.forEach(c => {
    const card = el('div', { class: 'condition-card' });
    const head = el('div', { class: 'head' }, [
      el('span', { class: 'name', html: c.category }),
      c.subtitle ? el('span', { class: 'subtitle', html: c.subtitle }) : null
    ]);
    card.appendChild(head);
    c.fields.forEach(f => {
      const fieldEl = el('div', { class: 'field' });
      fieldEl.appendChild(el('div', { class: 'flabel', html: f.label }));
      fieldEl.appendChild(el('div', { class: 'fval', html: f.value }));
      card.appendChild(fieldEl);
    });
    wrap.appendChild(card);
  });
  return wrap;
}

// Jumps to a pattern card by id (format "<organ-slug>__p<N>"): opens that
// organ's page, switches its Patterns subtab, opens the card's accordion,
// scrolls it into view, and briefly flashes its background so the
// destination is unmistakable.
function jumpToPattern(id) {
  const organSlug = id.split('__p')[0];
  openOrgan(organSlug);
  switchSubtab(organSlug, 'patterns');
  const card = document.getElementById(id);
  if (!card) return;
  card.classList.add('open');
  if (typeof card.scrollIntoView === 'function') {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  card.classList.remove('jump-highlight');
  void card.offsetWidth; // restart the CSS animation if clicked twice
  card.classList.add('jump-highlight');
}

document.addEventListener('click', (e) => {
  const link = e.target.closest('a.pattern-link');
  if (!link) return;
  e.preventDefault();
  jumpToPattern(link.dataset.id);
});

// Builds a section's <div class="card"> body, with a Prose/Bullets mode
// toggle when the section has a bulletsHtml rendition (teaching-slide-style
// condensed bullets, authored alongside the prose in the same .md file).
function buildSectionCard(s) {
  const card = el('div', { class: 'card' });
  if (s.source) card.appendChild(el('div', { class: 'source-note', html: s.source }));
  const hasBullets = s.bulletsHtml && s.bulletsHtml.trim().length > 0;
  if (hasBullets) {
    const toggle = el('div', { class: 'mode-toggle' });
    const proseBtn = el('button', { html: 'Prose' });
    const bulletsBtn = el('button', { html: 'Bullets' });
    proseBtn.classList.add('active');
    const proseDiv = el('div', { class: 'content-prose active', html: s.html });
    const bulletsDiv = el('div', { class: 'content-bullets', html: s.bulletsHtml });
    proseBtn.addEventListener('click', () => {
      proseBtn.classList.add('active'); bulletsBtn.classList.remove('active');
      proseDiv.classList.add('active'); bulletsDiv.classList.remove('active');
    });
    bulletsBtn.addEventListener('click', () => {
      bulletsBtn.classList.add('active'); proseBtn.classList.remove('active');
      bulletsDiv.classList.add('active'); proseDiv.classList.remove('active');
    });
    toggle.appendChild(proseBtn); toggle.appendChild(bulletsBtn);
    card.appendChild(toggle);
    card.appendChild(proseDiv);
    card.appendChild(bulletsDiv);
  } else {
    card.appendChild(el('div', { html: s.html }));
  }
  return card;
}

// Finds pattern-name mentions (bolded "Category · Subtitle" text) inside a table cell and
// re-styles them as small colored tiles matching the Patterns tab's pattern-card look.
// Used for the "Worked Example" phase-to-pattern table in Foundations, identified by its
// "Lung Pattern(s)" column header rather than position, so it stays robust if more tables
// are added above it later.
function tilePatternMentions(root) {
  const table = [...root.querySelectorAll('table')].find(t => t.innerHTML.includes('Lung Pattern(s)'));
  if (!table) return;
  table.querySelectorAll('td strong').forEach(strongEl => {
    const text = strongEl.textContent;
    const cat = groupOrder.find(c => text.startsWith(c));
    if (!cat) return;
    const color = DATA.colorLegend[cat] || specialGroupColors[cat] || '#8a6a4c';
    strongEl.classList.add('pattern-tile');
    strongEl.style.borderLeftColor = color;
    strongEl.style.background = `color-mix(in srgb, ${color} 12%, #fff)`;
  });
  table.querySelectorAll('td em').forEach(emEl => {
    if (emEl.textContent.trim() === '(open)') emEl.classList.add('pattern-tile', 'pattern-tile-open');
  });
}

// ---- Foundations view (book-wide, organ-agnostic; reused ahead of every organ's own preface) ----
const hasFoundations = DATA.foundationSections && DATA.foundationSections.length;
if (hasFoundations) {
  addTab('foundations', 'Foundations', true);
  const foundationsView = el('section', { class: 'view active', id: 'view-foundations' });
  foundationsView.appendChild(el('div', { class: 'section-kicker', html: 'Book-wide' }));
  foundationsView.appendChild(el('div', { class: 'section-title', html: 'Foundations' }));
  const multipleFoundationSections = DATA.foundationSections.length > 1;
  DATA.foundationSections.forEach((s, i) => {
    if (!multipleFoundationSections) {
      foundationsView.appendChild(buildSectionCard(s));
      return;
    }
    const kicker = `Module ${s.order != null ? s.order : i + 1}`;
    const moduleCard = el('div', { class: 'module-card' });
    const head = el('div', { class: 'module-head' });
    head.appendChild(el('div', { class: 'module-heading', html: `${kicker}<span class="module-title">${s.title}</span>` }));
    head.appendChild(el('span', { class: 'chevron', html: '&#9656;' }));
    head.addEventListener('click', () => moduleCard.classList.toggle('open'));
    moduleCard.appendChild(head);
    const body = el('div', { class: 'module-body' });
    body.appendChild(buildSectionCard(s));
    moduleCard.appendChild(body);
    foundationsView.appendChild(moduleCard);
  });
  tilePatternMentions(foundationsView);
  viewsWrap.appendChild(foundationsView);
}

// ---- Organs tab: landing page (card grid, from roadmap.md) + one page per organ ----
addTab('organs', 'Organs', !hasFoundations);
const organsView = el('section', { class: 'view' + (hasFoundations ? '' : ' active'), id: 'view-organs' });
organsView.appendChild(el('div', { class: 'section-kicker', html: 'Organ Modules' }));
organsView.appendChild(el('div', { class: 'section-title', html: 'Organs' }));
organsView.appendChild(el('div', { class: 'lede', html: 'Twelve organs across six paired modules. Open a module for its phenomenology, physiology, clinical patterns, and common conditions.' }));
const organGrid = el('div', { class: 'organ-grid' });
DATA.roadmap.forEach(r => {
  const card = el('div', { class: 'organ-module-card ' + (r.live ? 'live' : 'planned') });
  card.appendChild(el('div', { class: 'name', html: r.organ }));
  card.appendChild(el('div', { class: 'status', html: r.live ? 'Open module' : r.status }));
  if (r.live) card.addEventListener('click', () => openOrgan(r.slug));
  organGrid.appendChild(card);
});
organsView.appendChild(organGrid);
viewsWrap.appendChild(organsView);

DATA.organs.forEach(organ => {
  const view = el('section', { class: 'view', id: 'view-organ-' + organ.slug });
  const backLink = el('a', { class: 'back-link', html: '&larr; All Organs' });
  backLink.addEventListener('click', (e) => { e.preventDefault(); showTopView('organs'); });
  view.appendChild(backLink);
  view.appendChild(el('div', { class: 'section-kicker', html: 'Organ Module' }));
  const heading = organ.character ? `${organ.title} (${organ.character})` : organ.title;
  const headingFull = organ.subtitle ? `${heading} &mdash; ${organ.subtitle}` : heading;
  view.appendChild(el('div', { class: 'section-title', html: headingFull }));

  const subtabDefs = [];
  organ.preface.forEach(s => {
    subtabDefs.push({
      id: s.tab,
      label: s.title,
      render: () => {
        if (s.status === 'pending') {
          const inner = s.source ? `<div class="source-note">${s.source}</div>${s.html}` : s.html;
          return el('div', { class: 'pending-note', html: inner });
        }
        return buildSectionCard(s);
      }
    });
  });
  subtabDefs.push({
    id: 'patterns',
    label: 'Patterns',
    render: () => {
      const wrap = el('div');
      wrap.appendChild(buildPatternGroups(organ.patterns));
      return wrap;
    }
  });
  if (organ.conditions && organ.conditions.length) {
    subtabDefs.push({
      id: 'conditions',
      label: 'Conditions',
      render: () => {
        const wrap = el('div');
        wrap.appendChild(el('div', { class: 'lede', style: 'margin-bottom:16px;', html: 'Start from a diagnosis you already recognize, then follow a link into its predominant pattern(s) under the Patterns tab.' }));
        if (organ.conditionsIntro) {
          wrap.appendChild(el('div', { class: 'card', html: organ.conditionsIntro }));
        }
        wrap.appendChild(buildConditions(organ.conditions));
        return wrap;
      }
    });
  }
  view.appendChild(buildSubtabbedSection(organ.slug, subtabDefs));
  viewsWrap.appendChild(view);
});

// ---- Roadmap view ----
addTab('roadmap', 'Roadmap', false);
const roadmapView = el('section', { class: 'view', id: 'view-roadmap' });
roadmapView.appendChild(el('div', { class: 'section-kicker', html: 'Workbook Roadmap' }));
roadmapView.appendChild(el('div', { class: 'section-title', html: 'Organ Module Status' }));
roadmapView.appendChild(el('div', { class: 'lede', html: 'Status of each organ archetype in this workbook.' }));
const rl = el('ul', { class: 'roadmap-list' });
DATA.roadmap.forEach(r => {
  rl.appendChild(el('li', {}, [
    el('span', { class: 'organ', html: r.organ }),
    el('span', { class: 'status', html: r.status }),
    el('span', { class: 'note', html: r.note })
  ]));
});
roadmapView.appendChild(rl);
viewsWrap.appendChild(roadmapView);
</script>
