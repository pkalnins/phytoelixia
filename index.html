bility and from Heart's Fright Palpitations' episodic panic, this is a chronic, character-level difficulty acting with confidence rather than an acute or cyclical disturbance.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Generalized anxiety disorder with prominent decision paralysis, avoidant personality traits, chronic indecisiveness associated with HPA-axis dysregulation, sleep disorders with an anxiety component.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Endocrine: Blunted cortisol awakening response or flattened diurnal cortisol curve.</p>\n<p>Sleep: Polysomnography showing fragmented sleep architecture where formally assessed.</p>"}, {"label": "Herb Classes", "value": "<p>Tonify Gallbladder Qi, calm and settle</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Bupleurum (Chai hu)</li>\n<li>Poria with wood (Fu shen)</li>\n<li>Dragon bone (Long gu)</li>\n<li>Oyster shell (Mu li)</li>\n<li>Ginseng (Ren shen)</li>\n<li>Amber (Hu po)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Motherwort (<em>Leonurus cardiaca</em>)</li>\n<li>Passionflower (<em>Passiflora incarnata</em>)</li>\n<li>Ashwagandha (<em>Withania somnifera</em>)</li>\n<li>Milky Oats (<em>Avena sativa</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>An Shen Ding Zhi Wan</strong> (Calm the Spirit and Settle the Emotions Pill) — the classical formula specifically for Gallbladder-deficiency-type timidity and fright</p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Fu ling (Poria)</li>\n<li>Fu shen (Poria with wood)</li>\n<li>Yuan zhi (Polygala)</li>\n<li>Shi chang pu (Acorus)</li>\n<li>Long chi (Dragon tooth)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>GB 40, GB 34, HT 7, GB 25, RN 17</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: L-theanine and magnesium for calming; consistent sleep-wake timing to support HPA-axis regulation</li>\n</ul>"}], "id": "liv-gb__p5"}, {"category": "Blood Excess", "subtitle": "Liver Blood Stasis", "fields": [{"label": "Primary Biological Axis", "value": "<p>Circulatory/Nutritive (Blood Axis): Congestive, fibrotic remodeling of hepatic microcirculation with impaired chemical exchange and venous outflow.</p>"}, {"label": "Pathophysiology", "value": "<p>Hepatic stellate cell activation and progressive collagen deposition (fibrosis), portal venous congestion, and impaired hepatic microcirculation; in the reproductive territory, pelvic venous stasis and endometrial tissue congestion follow the same stagnation logic.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>TGF-β-driven stellate cell activation, elevated collagen I/III deposition, elevated tissue inhibitor of metalloproteinases (TIMP-1) relative to matrix metalloproteinases, portal hypertension-associated VEGF upregulation.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Fixed, stabbing hypochondriac pain that resists movement, a palpable mass or firmness on abdominal exam, dark or dusky facial complexion, visible varicosities, dysmenorrhea with dark clotted menstrual blood.</p>"}, {"label": "Tongue", "value": "<p>Dark purple or dusky body, possibly with visible stasis spots or a sublingual venous engorgement.</p>"}, {"label": "Pulse", "value": "<p>Choppy (Se) or Wiry (Xian), feeling rough and uneven rather than smoothly flowing.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, slowly progressive, worsening over months to years if unaddressed. Pain worse at night and with pressure; fixed in location rather than migratory.<br />\n&gt; warmth, gentle movement, massage<br />\n&lt; prolonged immobility, cold, emotional suppression</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Fixed stabbing rib-side pain worse with pressure, varicosities in the lower limbs, pelvic congestion with dull aching worse premenstrually.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Suppressed rage, resentment, and \"stuck\" emotional patterns held over long periods rather than expressed — the somatic residue of Liver Qi Stagnation left unresolved long enough to condense into the Blood level.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Hepatic fibrosis and early cirrhosis, portal hypertension, elevated hepatocellular carcinoma risk in advanced fibrosis, endometriosis, uterine fibroids, pelvic congestion syndrome.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Hepatic: Elevated AST/ALT with AST often exceeding ALT in advanced fibrosis; low platelet count (portal hypertension/hypersplenism); elevated INR reflecting reduced synthetic function.</p>\n<p>Imaging: Elastography (FibroScan) showing elevated liver stiffness; ultrasound or MRI showing nodularity, splenomegaly, or portal vein dilation.</p>\n<p>Gynecologic: Pelvic ultrasound or MRI showing fibroids, endometriomas, or venous congestion where relevant.</p>"}, {"label": "Herb Classes", "value": "<p>Invigorate Blood, break stasis, soften masses</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Salvia (Dan shen)</li>\n<li>Persica (Tao ren)</li>\n<li>Carthamus (Hong hua)</li>\n<li>Curcuma zedoary (E zhu)</li>\n<li>Sparganium (San leng)</li>\n<li>Corydalis (Yan hu suo)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Turmeric (<em>Curcuma longa</em>)</li>\n<li>Ginkgo (<em>Ginkgo biloba</em>)</li>\n<li>Red Root (<em>Ceanothus americanus</em>)</li>\n<li>Butcher's Broom (<em>Ruscus aculeatus</em>)</li>\n<li>Prickly Ash (<em>Zanthoxylum americanum</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Ge Xia Zhu Yu Tang</strong> (Drive Out Stasis Below the Diaphragm Decoction)</p>\n<ul>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Chuan xiong (Ligusticum)</li>\n<li>Chi shao (Red peony)</li>\n<li>Tao ren (Persica)</li>\n<li>Mu dan pi (Moutan)</li>\n<li>Wu ling zhi (Flying squirrel feces, or substitute)</li>\n<li>Yan hu suo (Corydalis)</li>\n<li>Xiang fu (Cyperus)</li>\n<li>Hong hua (Carthamus)</li>\n<li>Zhi ke (Bitter orange)</li>\n<li>Gan cao (Licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 3, SP 10, SP 6, BL 17, BL 18</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: E</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Omega-3 fatty acids and curcuminoids for anti-fibrotic support; avoid alcohol entirely</li>\n</ul>"}], "id": "liv-gb__p6"}, {"category": "Blood Deficiency", "subtitle": "Liver Blood Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Circulatory/Nutritive (Blood Axis): Systemic nutritive/hematologic depletion, most apparent in the tissues the Liver is said to specifically nourish — the eyes, tendons, and nails.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced circulating nutritive capacity (iron, B12, folate, or protein-calorie insufficiency) leading to tissue hypoperfusion and undernourishment of tendon, ocular, and dermal tissue; reduced hepatic glycogen and micronutrient reserve compounds fatigue and muscle cramping.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced erythropoietin responsiveness in iron-restricted states, elevated hepcidin in inflammation-associated anemia, reduced retinol-binding protein transport (Vitamin A-dependent ocular surface health), reduced muscle protein synthesis signaling (mTOR pathway) under chronic nutritive insufficiency.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Dizziness, blurred vision, floaters, dry or gritty eyes, pale nail beds, numbness or tingling in the extremities, scanty pale menses or amenorrhea, muscle cramps (especially nocturnal calf cramps), fine tremor, pale lips.</p>"}, {"label": "Tongue", "value": "<p>Pale body, thin, may appear slightly dry.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) or Choppy (Se), fine and difficult to locate, especially at the left Guan position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, worse with fatigue, overwork, or after menstruation. Worse premenstrually and postpartum.<br />\n&gt; rest, nourishing food, adequate sleep<br />\n&lt; overexertion, excessive menstrual loss, chronic dieting/undernutrition</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Nocturnal muscle cramps (especially calves), tendon stiffness, brittle nails, numbness or tingling in the limbs, generalized weakness.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety, poor sleep with vivid or unsettled dreaming, indecisiveness, timidity, easy startling — the Hun described classically as having \"nowhere to rest\" when Liver Blood is insufficient to house it at night.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Iron-deficiency anemia, Vitamin A deficiency (night blindness, dry eyes), amenorrhea or oligomenorrhea, peripheral neuropathy, age- or nutrition-related sarcopenia.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Hematologic: Low hemoglobin/hematocrit, low ferritin, low serum iron with elevated total iron-binding capacity.</p>\n<p>Nutritional: Low B12/folate; low serum retinol (Vitamin A) if ocular symptoms are prominent.</p>\n<p>Endocrine: Low-normal estradiol in amenorrhea/oligomenorrhea presentations.</p>"}, {"label": "Herb Classes", "value": "<p>Nourish Liver Blood, tonify Blood</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Angelica sinensis (Dang gui)</li>\n<li>Prepared rehmannia (Shu di huang)</li>\n<li>White peony (Bai shao)</li>\n<li>Goji berry (Gou qi zi)</li>\n<li>Polygonum multiflorum (He shou wu)</li>\n<li>Longan (Long yan rou)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Nettle Leaf (<em>Urtica dioica</em>)</li>\n<li>Yellow Dock (<em>Rumex crispus</em>)</li>\n<li>Chaste Tree (<em>Vitex agnus-castus</em>)</li>\n<li>Alfalfa (<em>Medicago sativa</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Si Wu Tang</strong> (Four Substance Decoction)</p>\n<ul>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Bai shao (White peony)</li>\n<li>Chuan xiong (Ligusticum)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 8, SP 6, BL 17, BL 18, ST 36</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: A, B12</li>\n<li>Minerals/Metals: Fe</li>\n<li>Other: Folate; adequate dietary protein and heme-iron sources</li>\n</ul>"}], "id": "liv-gb__p7"}, {"category": "Yin Excess", "subtitle": "Liver-Gallbladder Damp-Heat", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Excess fluid/inflammatory burden accumulating in the hepatobiliary tract with cholestatic and dysbiotic overlap.</p>"}, {"label": "Pathophysiology", "value": "<p>Biliary inflammation and possible obstruction, hepatocellular injury with cholestasis, and gut dysbiosis feeding enterohepatic inflammation; downward \"damp-heat\" drainage into the genitourinary tract in more severe presentations.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated hepatic and biliary NF-κB signaling, elevated bilirubin transporter dysfunction (cholestatic pattern), gut-derived LPS-driven Kupffer cell activation, elevated inflammatory cytokines (IL-1β, IL-6) in bile and portal blood.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Yellowing of the eyes and skin (jaundice), bitter taste in the mouth, nausea, fullness or pain in the right hypochondrium, dark scanty urine, and — when damp-heat pours downward — genital itching or discharge.</p>"}, {"label": "Tongue", "value": "<p>Red body with a thick, greasy, yellow coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Rapid (Shuo), rolling quickly under the fingers.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Worse in humid weather and summer, worse after fatty, greasy, or alcohol-heavy meals.<br />\n&gt; dry climate, light diet, movement<br />\n&lt; humidity, alcohol, greasy/fatty food, heat</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Heavy, achy limbs, joint swelling with a sensation of heat, groin discomfort, genital itching or irritation.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Irritability layered over heaviness and lethargy, and — particularly where the damp-heat pattern is tied to addictive or compulsive behavior — an undertone of guilt or shame accompanying the physical presentation.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Acute cholecystitis, cholelithiasis, viral or alcoholic hepatitis with jaundice, non-alcoholic steatohepatitis (NASH), urinary tract infection, pelvic inflammatory disease, sexually transmitted infections with discharge.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Hepatobiliary: Elevated direct (conjugated) bilirubin, elevated ALP and GGT (cholestatic pattern), elevated AST/ALT.</p>\n<p>Infectious/Inflammatory: Positive hepatitis serology where relevant; elevated CRP and WBC count.</p>\n<p>Imaging: Ultrasound showing gallstones, biliary sludge, or hepatic steatosis with inflammation.</p>"}, {"label": "Herb Classes", "value": "<p>Clear damp-heat from the Liver and Gallbladder</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Capillaris (Yin chen hao)</li>\n<li>Coptis (Huang lian)</li>\n<li>Phellodendron (Huang bai)</li>\n<li>Talcum (Hua shi)</li>\n<li>Plantain seed (Che qian zi)</li>\n<li>Gentiana (Long dan cao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Milk Thistle (<em>Silybum marianum</em>)</li>\n<li>Dandelion Root (<em>Taraxacum officinale</em>)</li>\n<li>Oregon Grape (<em>Mahonia aquifolium</em>)</li>\n<li>Barberry (<em>Berberis vulgaris</em>)</li>\n<li>Turmeric (<em>Curcuma longa</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Yin Chen Hao Tang</strong> (Capillaris Decoction)</p>\n<ul>\n<li>Yin chen hao (Capillaris)</li>\n<li>Zhi zi (Gardenia)</li>\n<li>Da huang (Rhubarb)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>GB 34, LR 13, SP 9, GB 24, RN 12</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: (none specified)</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Choline and phosphatidylcholine for biliary/fat-metabolism support; reduce alcohol and refined/fatty food intake</li>\n</ul>"}], "id": "liv-gb__p8"}, {"category": "Yin Excess", "subtitle": "Phlegm-Heat Harassing the Gallbladder", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Combined biliary/digestive inflammatory burden with secondary autonomic and vestibular disruption — distinguished from Liver-Gallbladder Damp-Heat by its prominent nervous-system (dizziness, palpitations, insomnia) rather than hepatobiliary-inflammatory (jaundice) presentation.</p>"}, {"label": "Pathophysiology", "value": "<p>Gut-brain axis dysregulation with concurrent biliary or digestive inflammation, vestibular symptoms arising from metabolic/inflammatory dysregulation, and disrupted sleep architecture from the combined GI and autonomic disturbance.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated inflammatory markers with concurrent gut dysbiosis, altered vestibular signaling in vertigo-predominant presentations, disrupted orexin/hypocretin signaling contributing to fragmented sleep.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Dizziness, palpitations, insomnia with frequent waking, bitter taste in the mouth, nausea, chest and hypochondriac fullness, profuse phlegm or sputum, and a tendency to be easily frightened.</p>"}, {"label": "Tongue", "value": "<p>Red body with a thick, greasy, yellow coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Wiry (Xian), rolling and taut simultaneously.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Episodic, worse after greasy food or alcohol, worse at night with sleep disruption.<br />\n&gt; light diet, dry weather, calm evening routine<br />\n&lt; greasy food, alcohol, humidity, stress before bed</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Chest and hypochondriac fullness or tightness, generalized heaviness in the limbs.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety and unsettled agitation with a heavy, foggy quality layered on top — distinct from Gallbladder Qi Deficiency's quiet timidity by its agitated, excess-driven restlessness rather than withdrawal.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Functional dyspepsia with anxiety overlap, vertigo/Meniere's disease, insomnia with metabolic syndrome, cholecystitis with prominent nervous-system symptoms.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Hepatobiliary: Mildly elevated ALP/GGT if biliary involvement is active; ultrasound may show biliary sludge or mild gallbladder wall changes.</p>\n<p>Metabolic/Inflammatory: Elevated triglycerides or fasting insulin where metabolic overlap is present; mildly elevated CRP.</p>"}, {"label": "Herb Classes", "value": "<p>Clear Phlegm-Heat, calm the Gallbladder</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Bamboo shavings (Zhu ru)</li>\n<li>Pinellia (Ban xia)</li>\n<li>Tangerine peel (Chen pi)</li>\n<li>Poria (Fu ling)</li>\n<li>Bitter orange (Zhi shi)</li>\n<li>Bile arisaema (Dan nan xing)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Skullcap (<em>Scutellaria lateriflora</em>)</li>\n<li>Passionflower (<em>Passiflora incarnata</em>)</li>\n<li>Gotu Kola (<em>Centella asiatica</em>)</li>\n<li>Chamomile (<em>Matricaria chamomilla</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Wen Dan Tang</strong> (Warm the Gallbladder Decoction) — the classic formula for this exact pattern, despite the \"warm\" in its name it is used to clear Phlegm-Heat</p>\n<ul>\n<li>Ban xia (Pinellia)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Fu ling (Poria)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Zhu ru (Bamboo shavings)</li>\n<li>Zhi shi (Bitter orange)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Da zao (Jujube)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>GB 34, PC 6, ST 40, GB 20, HT 7</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Choline for biliary support; reduce refined carbohydrate, alcohol, and greasy food intake</li>\n</ul>"}], "id": "liv-gb__p9"}, {"category": "Yin Deficiency", "subtitle": "Liver Yin Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Chronic structural fluid depletion in hepatic and ocular tissue, with reduced synthetic/structural reserve rather than active inflammation.</p>"}, {"label": "Pathophysiology", "value": "<p>Chronic low-grade hepatic inflammation without active flare, reduced hepatic synthetic and structural reserve, and mucosal/ocular surface dryness from reduced tear and hepatic fluid production; HPA-axis dysregulation contributes to the associated heat signs.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Chronic low-level elevation of inflammatory cytokines (IL-6) without acute flare markers, reduced hepatic stellate quiescence factors, reduced aqueous tear-film production pathways, mild elevation of cortisol with flattened diurnal rhythm.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Dry, gritty eyes, blurred vision, dizziness, tinnitus, five-center heat (palms, soles, chest), night sweats, malar flush, dry mouth worse at night, and difficulty staying asleep.</p>"}, {"label": "Tongue", "value": "<p>Red body, thin, dry, with little or no coating — may show cracking, particularly along the sides (the Liver reflective zone).</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), fine and fast, most notable at the left Guan position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset, worse afternoon and evening (five-center heat pattern), worse in hot or dry weather.<br />\n&gt; rest, cooling/moistening foods, quiet evenings<br />\n&lt; overwork, heat exposure, insufficient sleep, excessive screen use (eye strain)</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Dry, stiff tendons, nocturnal muscle cramping, low back and knee weakness reflecting the Liver-Kidney Yin overlap.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Restlessness, wiry anxiety, insomnia with racing thoughts, and irritability layered over an underlying depletion — a \"tired but wired\" constitutional picture, the same pattern seen at the deepest Yin-deficient layer in other organs.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Chronic hepatitis with early fibrosis (compensated), Sjögren's-adjacent ocular/mucosal dryness, menopausal syndrome, hyperthyroidism with associated weight loss and heat intolerance.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Hepatic: Mildly elevated AST/ALT (chronic, low-grade); reduced albumin in more advanced presentations.</p>\n<p>Autoimmune Workup: Elevated ANA where autoimmune hepatitis is a consideration.</p>\n<p>Endocrine: Elevated ESR in chronic inflammatory states; suppressed TSH with elevated free T4 if hyperthyroid.</p>"}, {"label": "Herb Classes", "value": "<p>Nourish Liver Yin</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Lycium/Goji berry (Gou qi zi)</li>\n<li>Chrysanthemum (Ju hua)</li>\n<li>Prepared rehmannia (Shu di huang)</li>\n<li>Ligustrum (Nu zhen zi)</li>\n<li>Eclipta (Han lian cao)</li>\n<li>White peony (Bai shao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Milk Thistle (<em>Silybum marianum</em>)</li>\n<li>Solomon's Seal (<em>Polygonatum multiflorum</em>)</li>\n<li>Nettle Seed (<em>Urtica dioica</em>)</li>\n<li>Oat Straw (<em>Avena sativa</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Qi Ju Di Huang Wan</strong> (Lycium, Chrysanthemum, and Rehmannia Pill)</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Ze xie (Alisma)</li>\n<li>Fu ling (Poria)</li>\n<li>Mu dan pi (Moutan)</li>\n<li>Gou qi zi (Goji berry)</li>\n<li>Ju hua (Chrysanthemum)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 8, KI 3, SP 6, LR 3, KI 6</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: A, E</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Omega-3 fatty acids; adequate hydration; consider antioxidant/glutathione-precursor support given the chronic low-grade inflammatory component</li>\n</ul>"}], "id": "liv-gb__p10"}, {"category": "Multi-Organ Patterns", "subtitle": "Liver / Spleen Disharmony", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Hypochondriac pain and distension alongside abdominal bloating, loose stools alternating with constipation, poor appetite, fatigue, and mood swings worsened by stress or dietary irregularity.</p>"}, {"label": "Tongue", "value": "<p>Pale or normal body with a thin white coating, may show teeth-marks on the margins.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian) on the left, Weak (Ruo) on the right — the classic split signature of Liver excess overacting on Spleen deficiency.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Xiao Yao San</strong> (Free and Easy Wanderer Powder)</p>\n<ul>\n<li>Chai hu (Bupleurum)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Bai shao (White peony)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fu ling (Poria)</li>\n<li>Gan cao (Licorice)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Bo he (Mint)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 3, SP 6, ST 36, LI 4, BL 18, BL 20</p>"}], "id": "liv-gb__p11"}, {"category": "Multi-Organ Patterns", "subtitle": "Liver / Kidney Yin Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Dizziness, tinnitus, low back and knee weakness, night sweats, dry eyes, five-center heat, and premature graying, reflecting the shared source of Liver and Kidney Yin (\"the Liver and Kidney share the same source\").</p>"}, {"label": "Tongue", "value": "<p>Red tongue with little or no coating, may show cracks.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), weak at both Chi (Kidney) and Guan (Liver) positions.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Zuo Gui Wan</strong> (Restore the Left [Kidney] Pill)</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Gou qi zi (Goji berry)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Chuan niu xi (Achyranthes)</li>\n<li>Tu si zi (Cuscuta)</li>\n<li>Lu jiao jiao (Deer antler gelatin)</li>\n<li>Gui ban jiao (Tortoise shell gelatin)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 8, KI 3, KI 6, SP 6, BL 18, BL 23</p>"}], "id": "liv-gb__p12"}, {"category": "Multi-Organ Patterns", "subtitle": "Liver / Heart Blood Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Palpitations, insomnia with difficulty falling and staying asleep, poor memory and concentration, dizziness, pale lips and nail beds, scanty pale menses.</p>"}, {"label": "Tongue", "value": "<p>Pale tongue, thin body.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi), weak at both the left Cun (Heart) and Guan (Liver) positions.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Suan Zao Ren Tang</strong> (Sour Jujube Decoction)</p>\n<ul>\n<li>Suan zao ren (Sour jujube seed)</li>\n<li>Fu ling (Poria)</li>\n<li>Zhi mu (Anemarrhena)</li>\n<li>Chuan xiong (Ligusticum)</li>\n<li>Gan cao (Licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LR 8, HT 7, SP 6, BL 15, BL 18, PC 6</p>"}], "id": "liv-gb__p13"}]}, {"slug": "sp-st-si-li", "title": "Spleen-GI System", "subtitle": "", "character": "", "order": 3, "preface": [], "conditions": [], "conditionsIntro": "", "patterns": [{"category": "Yang Excess", "subtitle": "Stomach Fire", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Acute hyperacidic, hyperinflammatory activity concentrated in the gastric mucosa and oral cavity.</p>"}, {"label": "Pathophysiology", "value": "<p>Gastric mucosal hyperacidity with elevated acid secretion, frequently H. pylori-associated inflammatory injury, and secondary oral-cavity inflammation from ascending heat.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated gastrin signaling, H+/K+-ATPase (proton pump) hyperactivity, NF-κB-driven gastric mucosal inflammation, elevated IL-8 in H. pylori-associated presentations.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Rapid, excessive hunger with quick digestion, burning epigastric pain, bad breath, bleeding or swollen gums, marked thirst for cold drinks, constipation.</p>"}, {"label": "Tongue", "value": "<p>Red body, especially at the center, with a thick, dry, yellow coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Rapid (Shuo), forceful at the right Guan (Stomach) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Acute or acute-on-chronic, worse after spicy, fried, or alcohol-heavy meals. Worse afternoon and evening.<br />\n&gt; cooling foods, rest, hydration<br />\n&lt; spicy/fried food, alcohol, overeating, heat exposure</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Epigastric burning worse with pressure, jaw tension from gum inflammation, occasional referred discomfort between the shoulder blades.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Irritability and impatience, often with a driven, appetite-forward restlessness — the excess heat manifesting as urgency rather than the explosive rage seen in Liver Fire.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Peptic ulcer disease (H. pylori-associated), erosive gastritis, GERD with esophagitis, gingivitis and periodontal disease.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>GI Workup: H. pylori stool antigen or urea breath test positive; endoscopy showing mucosal erosion or ulceration.</p>\n<p>Inflammatory Markers: Elevated hs-CRP in active inflammation.</p>"}, {"label": "Herb Classes", "value": "<p>Clear Stomach fire/heat</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Gypsum (Shi gao)</li>\n<li>Coptis (Huang lian)</li>\n<li>Anemarrhena (Zhi mu)</li>\n<li>Scrophularia (Xuan shen)</li>\n<li>Trichosanthes root (Tian hua fen)</li>\n<li>Ophiopogon (Mai men dong)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Marshmallow Root (<em>Althaea officinalis</em>)</li>\n<li>Slippery Elm (<em>Ulmus rubra</em>)</li>\n<li>Aloe Vera (<em>Aloe vera</em>)</li>\n<li>Licorice/DGL (<em>Glycyrrhiza glabra</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Qing Wei San</strong> (Clear the Stomach Powder)</p>\n<ul>\n<li>Huang lian (Coptis)</li>\n<li>Sheng ma (Cimicifuga)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Mu dan pi (Moutan)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>ST 44, ST 36, LI 4, ST 21, RN 12</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: C</li>\n<li>Minerals/Metals: Zn</li>\n<li>Other: Deglycyrrhizinated licorice (DGL) and zinc-carnosine for mucosal protection; avoid NSAIDs where possible</li>\n</ul>"}], "id": "sp-st-si-li__p1"}, {"category": "Yang Deficiency", "subtitle": "Spleen Yang Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Hypometabolic digestive activity — reduced enzymatic and absorptive output across the Spleen-Stomach axis.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced digestive-enzyme and metabolic output, impaired intestinal absorption, and reduced gut motility/peristaltic tone in cold-type presentations, frequently overlapping with concurrent Kidney Yang deficiency.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced pancreatic enzyme output, blunted thyroid receptor signaling in gut mucosa, reduced mitochondrial ATP output in enterocytes, down-regulated aquaporin-mediated fluid absorption.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Cold extremities, chronic loose stools or diarrhea worse with cold or raw food, abdominal pain relieved by warmth and pressure, mild edema, poor appetite, fatigue worse after eating.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen, and flabby body with scalloped/toothmarked margins, moist white coating.</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen), Slow (Chi), and Weak (Ruo), most notable at the right Guan (Spleen) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset, markedly worse in cold weather and after cold/raw food. Worse in winter and early morning.<br />\n&gt; warmth, cooked/warm food, rest<br />\n&lt; cold food/drinks, raw food, cold/damp environments</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized heaviness and weakness in the limbs, cold extremities, mild dependent edema, low back ache with concurrent Kidney-Yang involvement.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Low drive and mental fog after eating, a \"banked low\" quality mirroring the metabolic slowing beneath it — reluctance to initiate, worry that settles into the body rather than resolving.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Hypothyroidism-associated GI hypomotility, chronic exocrine pancreatic insufficiency, malabsorption syndromes, diarrhea-predominant IBS with pronounced cold sensitivity.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Metabolic: TSH elevated with free T3/T4 low-normal or low.</p>\n<p>GI/Nutritional: Fecal elastase reduced if pancreatic insufficiency is present; low ferritin/albumin if malabsorption is significant.</p>"}, {"label": "Herb Classes", "value": "<p>Warm Spleen Yang, dispel cold</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Dried ginger (Gan jiang)</li>\n<li>White atractylodes (Bai zhu)</li>\n<li>Prepared aconite (Fu zi)</li>\n<li>Codonopsis (Dang shen)</li>\n<li>Cinnamon bark (Rou gui)</li>\n<li>Poria (Fu ling)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Ginger (<em>Zingiber officinale</em>)</li>\n<li>Cinnamon (<em>Cinnamomum verum</em>)</li>\n<li>Cardamom (<em>Elettaria cardamomum</em>)</li>\n<li>Cayenne (<em>Capsicum annuum</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Fu Zi Li Zhong Wan</strong> (Aconite Regulate the Middle Pill)</p>\n<ul>\n<li>Fu zi (Prepared aconite)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Gan jiang (Dried ginger)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>RN 12, ST 36, SP 3, BL 20, BL 21</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Zn, Se</li>\n<li>Other: Digestive enzyme support if clinically indicated; warming, easily-digested foods</li>\n</ul>"}], "id": "sp-st-si-li__p2"}, {"category": "Qi Excess", "subtitle": "Stomach Qi Rebellion", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Disrupted gastric motility with retrograde (upward) rather than descending functional tone.</p>"}, {"label": "Pathophysiology", "value": "<p>Impaired antral motility and lower esophageal sphincter tone, vagal dysregulation, and delayed gastric emptying with retrograde reflux of gastric contents.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Altered motilin and ghrelin signaling, reduced vagal efferent tone, elevated 5-HT3 receptor activity (nausea/emesis pathway), reduced interstitial cells of Cajal pacemaker activity in some chronic presentations.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Nausea, belching, hiccups, acid reflux, a sensation of fullness or blockage in the epigastrium, occasional vomiting — Stomach Qi that should descend instead rises.</p>"}, {"label": "Tongue", "value": "<p>Normal or slightly red body, thin white or yellow coating depending on associated heat.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian) or Slippery (Hua) at the right Guan (Stomach) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Episodic, often triggered by stress, overeating, or eating too quickly. Worse immediately after meals.<br />\n&gt; small frequent meals, slow eating, calm environment<br />\n&lt; stress while eating, overeating, lying down soon after meals</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Epigastric and lower-chest tightness, diaphragmatic tension, occasional referred discomfort between the shoulder blades with reflux.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety concentrated around eating and digestion, a sense of things \"not settling,\" mild food-related hypervigilance in chronic presentations.</p>"}, {"label": "Biomedical Correlates", "value": "<p>GERD, functional dyspepsia, cyclic vomiting syndrome, chemotherapy- or motion-induced nausea, rumination syndrome.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>GI Workup: Upper endoscopy typically normal or shows only mild esophagitis; gastric emptying study may show delayed or occasionally accelerated transit.</p>\n<p>Autonomic: Reduced heart-rate variability in stress-triggered presentations.</p>"}, {"label": "Herb Classes", "value": "<p>Descend Stomach Qi, stop nausea/vomiting</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Pinellia (Ban xia)</li>\n<li>Fresh ginger (Sheng jiang)</li>\n<li>Bamboo shavings (Zhu ru)</li>\n<li>Amomum (Sha ren)</li>\n<li>Inula flower (Xuan fu hua)</li>\n<li>Hematite (Dai zhe shi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Ginger (<em>Zingiber officinale</em>)</li>\n<li>Peppermint (<em>Mentha × piperita</em>)</li>\n<li>Chamomile (<em>Matricaria chamomilla</em>)</li>\n<li>Meadowsweet (<em>Filipendula ulmaria</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Ju Pi Zhu Ru Tang</strong> (Tangerine Peel and Bamboo Shavings Decoction)</p>\n<ul>\n<li>Chen pi (Tangerine peel)</li>\n<li>Zhu ru (Bamboo shavings)</li>\n<li>Ren shen (Ginseng)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Da zao (Jujube)</li>\n<li>Gan cao (Licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>PC 6, ST 36, RN 12, ST 21, LR 3</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B6</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: Ginger-derived gingerols for antiemetic support; smaller, more frequent meals</li>\n</ul>"}], "id": "sp-st-si-li__p3"}, {"category": "Qi Deficiency", "subtitle": "Spleen Qi Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Reduced functional/digestive drive across the Spleen-Stomach axis — the foundational deficiency pattern of this organ system.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced digestive and absorptive capacity, impaired nutrient transport across the intestinal mucosa, and a chronic mitochondrial energy deficit secondary to sustained malabsorption.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced AMPK/mTOR nutrient-sensing activity, down-regulated intestinal nutrient transporters (SGLT1, GLUT2), reduced mitochondrial biogenesis (PGC-1α) in enterocytes, blunted digestive enzyme gene expression.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Fatigue, poor appetite, loose stools, bloating and distension worse after eating, weak limbs, pale complexion, a tendency to bruise easily.</p>"}, {"label": "Tongue", "value": "<p>Pale body, often swollen, with teeth-mark indentations on the margins; thin white coating.</p>"}, {"label": "Pulse", "value": "<p>Empty (Xu) or Weak (Ruo), soft and lacking force, most notable at the right Guan (Spleen) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, worsens with exertion and as the day progresses. Worse after eating, better with rest.<br />\n&gt; rest after meals, warm cooked food, moderate activity<br />\n&lt; overexertion, worry/overthinking, irregular meals, cold/raw food</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized fatigue-related muscle weakness, poor postural tone, heavy or weak limbs, easy bruising from poor Qi containment of Blood.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Worry and overthinking (the Spleen's classically associated emotion), a ruminative quality to mental activity, indecisiveness, and a tendency toward self-doubt that saps motivation rather than provoking anxiety outright.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Malabsorption syndromes, chronic fatigue with a prominent GI component, undifferentiated/mixed-type IBS, mild anemia of chronic disease, sarcopenia from poor nutrient absorption.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Nutritional: Low-normal albumin/prealbumin; low ferritin; reduced fecal elastase if pancreatic exocrine function is also reduced.</p>\n<p>Hematologic: Mild normocytic anemia consistent with chronic disease/malabsorption.</p>"}, {"label": "Herb Classes", "value": "<p>Tonify Spleen Qi</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Ginseng (Ren shen) or Codonopsis (Dang shen)</li>\n<li>White atractylodes (Bai zhu)</li>\n<li>Poria (Fu ling)</li>\n<li>Astragalus (Huang qi)</li>\n<li>Chinese yam (Shan yao)</li>\n<li>Licorice (Gan cao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>American Ginseng (<em>Panax quinquefolius</em>)</li>\n<li>Astragalus (<em>Astragalus membranaceus</em>)</li>\n<li>Licorice (<em>Glycyrrhiza glabra</em>)</li>\n<li>Oats (<em>Avena sativa</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Si Jun Zi Tang</strong> (Four Gentlemen Decoction)</p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fu ling (Poria)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>ST 36, SP 3, SP 6, RN 12, BL 20</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex, D</li>\n<li>Minerals/Metals: Fe, Zn</li>\n<li>Other: Digestive bitters or enzymes to support assimilation; astragalus polysaccharides (adaptogenic)</li>\n</ul>"}], "id": "sp-st-si-li__p4"}, {"category": "Blood Deficiency", "subtitle": "Spleen Qi and Blood Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Circulatory/Nutritive (Blood Axis): Reduced hematopoietic substrate availability secondary to impaired Spleen-Stomach digestive/absorptive function — the \"Later Heaven root\" failing to generate adequate Qi and Blood.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced absorption of hematopoietic substrates (iron, B12, folate, protein) due to impaired digestive and absorptive function, compounding into systemic nutritive depletion beyond the digestive tract itself.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced erythropoietin responsiveness in iron-restricted states, elevated hepcidin in inflammation-associated anemia, reduced intestinal ferroportin/DMT1 iron-transport expression, reduced albumin synthesis under sustained protein-calorie insufficiency.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Dizziness, pallor, palpitations, fatigue, scanty pale menses, poor memory and concentration, insomnia, numbness or tingling in the extremities.</p>"}, {"label": "Tongue", "value": "<p>Pale body, thin, may appear slightly dry.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Weak (Ruo), fine and soft, notable at both the right Guan (Spleen) and left Cun (Heart) positions.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual onset, worse with fatigue, overwork, or after menstruation. Better with rest and nourishing food.<br />\n&gt; rest, nourishing food, adequate sleep<br />\n&lt; overexertion, excessive menstrual loss, chronic dieting/undernutrition</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Generalized weakness, nocturnal muscle cramps, brittle nails, numbness or tingling in the limbs.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety layered on top of fatigue, poor sleep with vivid or unsettled dreaming, indecisiveness, and a sense of being unable to keep up mentally that tracks directly with physical depletion.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Iron-deficiency anemia from malabsorption, B12/folate deficiency, chronic disease anemia with a GI root cause, protein-calorie malnutrition.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Hematologic: Low hemoglobin/hematocrit, low ferritin, low serum iron with elevated total iron-binding capacity.</p>\n<p>Nutritional: Low B12/folate; low albumin/prealbumin in more advanced presentations.</p>"}, {"label": "Herb Classes", "value": "<p>Tonify Qi and Blood together</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Astragalus (Huang qi)</li>\n<li>Angelica sinensis (Dang gui)</li>\n<li>Ginseng (Ren shen)</li>\n<li>Prepared rehmannia (Shu di huang)</li>\n<li>Longan (Long yan rou)</li>\n<li>White peony (Bai shao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Nettle Leaf (<em>Urtica dioica</em>)</li>\n<li>Yellow Dock (<em>Rumex crispus</em>)</li>\n<li>Alfalfa (<em>Medicago sativa</em>)</li>\n<li>Dandelion Leaf (<em>Taraxacum officinale</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Ba Zhen Tang</strong> (Eight Treasure Decoction)</p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fu ling (Poria)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Bai shao (White peony)</li>\n<li>Chuan xiong (Ligusticum)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>ST 36, SP 6, BL 20, BL 17, RN 4</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B12</li>\n<li>Minerals/Metals: Fe</li>\n<li>Other: Folate; adequate dietary protein and heme-iron sources; address malabsorption root cause where identifiable</li>\n</ul>"}], "id": "sp-st-si-li__p5"}, {"category": "Yin Excess", "subtitle": "Spleen-Stomach Damp Accumulation", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Excess fluid/metabolic burden accumulating in the digestive tract, with systemic metabolic overlap.</p>"}, {"label": "Pathophysiology", "value": "<p>Gut dysbiosis, impaired lipid and carbohydrate metabolism, mucin hypersecretion, and reduced GI motility with fluid retention in the gut wall.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Altered gut microbiome composition favoring dysbiotic taxa, elevated MUC2 mucin expression, insulin resistance-associated signaling (reduced GLUT4 translocation), elevated inflammatory adipokines where metabolic overlap is present.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Heavy sensation in the body and head, epigastric and abdominal fullness, poor appetite despite fullness, sticky or greasy taste in the mouth, loose stools, mental fog.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen, or enlarged body with a thick, white, greasy coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Soggy/Soft (Ru), rolling smoothly under the fingers.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Gradual, chronic accumulation. Worse in damp weather, mornings (phlegm pooling overnight), after heavy or greasy meals.<br />\n&gt; warmth, movement, dry weather, light diet<br />\n&lt; damp, cold, dairy/sugar, sedentary periods, greasy food</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Heavy, achy limbs, generalized heaviness and lethargy, possible joint stiffness with damp, puffy or edema-like fullness.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Profound mental fog, subjective \"heaviness\" of thought, difficulty concentrating, and a complacent, unmotivated quality — the classic Damp blanketing of cognitive faculties.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Metabolic syndrome/insulin resistance, non-alcoholic fatty liver overlap, small intestinal bacterial overgrowth (SIBO) with bloating, functional dyspepsia with prominent fullness.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Metabolic: Elevated fasting insulin/HOMA-IR, elevated triglycerides.</p>\n<p>GI: Positive SIBO breath testing where relevant; stool analysis showing dysbiotic pattern.</p>"}, {"label": "Herb Classes", "value": "<p>Transform Damp, strengthen the Spleen</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Atractylodes (Cang zhu)</li>\n<li>Magnolia bark (Hou po)</li>\n<li>Tangerine peel (Chen pi)</li>\n<li>Pogostemon (Huo xiang)</li>\n<li>Amomum (Sha ren)</li>\n<li>Poria (Fu ling)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Dandelion (<em>Taraxacum officinale</em>)</li>\n<li>Gentian (<em>Gentiana lutea</em>)</li>\n<li>Fennel (<em>Foeniculum vulgare</em>)</li>\n<li>Chamomile (<em>Matricaria chamomilla</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Ping Wei San</strong> (Calm the Stomach Powder)</p>\n<ul>\n<li>Cang zhu (Atractylodes)</li>\n<li>Hou po (Magnolia bark)</li>\n<li>Chen pi (Tangerine peel)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>SP 9, SP 6, ST 36, RN 12, ST 40</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Cr (if insulin-resistance-linked)</li>\n<li>Other: Choline for fat metabolism support; reduce refined carbohydrate and dairy intake</li>\n</ul>"}], "id": "sp-st-si-li__p6"}, {"category": "Yin Excess", "subtitle": "Large Intestine Damp-Heat", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Acute inflammatory fluid/mucosal burden in the colon, with infectious or dysbiotic drivers.</p>"}, {"label": "Pathophysiology", "value": "<p>Colonic mucosal inflammation, dysbiosis with pathogenic bacterial overgrowth, increased intestinal permeability, and cytokine-driven secretory diarrhea.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated colonic NF-κB and TNF-α signaling, elevated calprotectin (neutrophilic mucosal inflammation), disrupted tight-junction protein expression (claudins/occludins), pathogen-associated TLR4 activation.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Acute diarrhea with foul odor, burning sensation at the anus, abdominal cramping with urgency, possible blood or mucus in the stool, thirst, dark scanty urine.</p>"}, {"label": "Tongue", "value": "<p>Red body with a thick, greasy, yellow coating.</p>"}, {"label": "Pulse", "value": "<p>Slippery (Hua) and Rapid (Shuo), rolling quickly and forcefully.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Acute onset, often following contaminated food/water exposure or during an inflammatory bowel disease flare. Worse in humid weather and summer.<br />\n&gt; hydration, rest, bland diet during acute phase<br />\n&lt; contaminated food/water, alcohol, spicy/greasy food, humidity</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Abdominal cramping with urgency, perianal irritation/burning, generalized malaise during acute flares.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety and urgency-related hypervigilance around bathroom access, irritability compounded by physical discomfort and disrupted sleep during flares.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Infectious colitis (bacterial dysentery, <em>C. difficile</em>), inflammatory bowel disease flare (ulcerative colitis in particular), acute gastroenteritis.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Stool Studies: Elevated fecal calprotectin; stool culture/PCR positive for pathogenic organisms where infectious.</p>\n<p>Inflammatory Markers: Elevated CRP/ESR; leukocytosis in acute infectious presentations.</p>"}, {"label": "Herb Classes", "value": "<p>Clear damp-heat, stop dysentery</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Coptis (Huang lian)</li>\n<li>Pulsatilla (Bai tou weng)</li>\n<li>Portulaca (Ma chi xian)</li>\n<li>Phellodendron (Huang bai)</li>\n<li>Fraxinus bark (Qin pi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Goldenseal (<em>Hydrastis canadensis</em>)</li>\n<li>Oregon Grape (<em>Mahonia aquifolium</em>)</li>\n<li>Chamomile (<em>Matricaria chamomilla</em>)</li>\n<li>Slippery Elm (<em>Ulmus rubra</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Bai Tou Weng Tang</strong> (Pulsatilla Decoction)</p>\n<ul>\n<li>Bai tou weng (Pulsatilla)</li>\n<li>Huang lian (Coptis)</li>\n<li>Huang bai (Phellodendron)</li>\n<li>Qin pi (Fraxinus bark)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>LI 11, ST 25, LI 4, ST 37, SP 9</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: (none specified)</li>\n<li>Minerals/Metals: Zn</li>\n<li>Other: Electrolyte/fluid repletion during acute diarrhea; probiotic support once acute phase resolves</li>\n</ul>"}], "id": "sp-st-si-li__p7"}, {"category": "Yin Deficiency", "subtitle": "Stomach Yin Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Chronic structural fluid depletion of the gastric mucosa, with reduced secretory reserve rather than active inflammation.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced gastric mucosal secretory reserve, mucosal atrophy, and a thinned protective mucin layer, typically developing after prolonged heat-pattern illness, chronic stress, or repeated mucosal injury.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced gastric mucin (MUC5AC) expression, parietal cell atrophy with reduced intrinsic factor production in advanced cases, chronic low-grade IL-6 elevation without acute flare markers.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Hunger without desire to eat, dry mouth and throat, dry stools, mild epigastric discomfort or burning, and a general sense of digestive dryness.</p>"}, {"label": "Tongue", "value": "<p>Red body, thin and dry, with little or no coating — the classic \"mirror tongue\" of Stomach Yin deficiency.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), fine and fast at the right Guan (Stomach) position.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset, often following a prolonged febrile illness or chronic stress. Worse in the afternoon and in dry, hot weather.<br />\n&gt; rest, moistening foods, cool quiet environments<br />\n&lt; heat exposure, dry climates, overwork, insufficient sleep</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Mild generalized dryness-related stiffness, low-grade fatigue without significant structural pain.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Restlessness, mild irritability, a subtle \"running on empty\" quality distinct from the heavier fatigue of Qi deficiency — the mind staying active while the body's own reserves are depleted.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Atrophic gastritis, Sjögren's-associated GI dryness, post-chemotherapy or post-radiation mucosal atrophy, chronic acid-suppressive therapy with associated mucosal changes.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>GI Workup: Endoscopy with biopsy showing mucosal atrophy where advanced; elevated gastrin in some atrophic presentations.</p>\n<p>Autoimmune: Positive anti-parietal cell or anti-intrinsic factor antibodies if pernicious anemia is a consideration.</p>"}, {"label": "Herb Classes", "value": "<p>Nourish Stomach Yin</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Ophiopogon (Mai men dong)</li>\n<li>Dendrobium (Shi hu)</li>\n<li>Glehnia (Sha shen)</li>\n<li>Trichosanthes root (Tian hua fen)</li>\n<li>Raw rehmannia (Sheng di huang)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Marshmallow Root (<em>Althaea officinalis</em>)</li>\n<li>Slippery Elm (<em>Ulmus rubra</em>)</li>\n<li>Licorice (<em>Glycyrrhiza glabra</em>)</li>\n<li>Solomon's Seal (<em>Polygonatum multiflorum</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Yi Wei Tang</strong> (Benefit the Stomach Decoction)</p>\n<ul>\n<li>Sha shen (Glehnia)</li>\n<li>Mai men dong (Ophiopogon)</li>\n<li>Sheng di huang (Raw rehmannia)</li>\n<li>Yu zhu (Polygonatum odoratum)</li>\n<li>Bing tang (Rock sugar)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>ST 36, SP 6, RN 12, KI 6, ST 44</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B12</li>\n<li>Minerals/Metals: (none specified)</li>\n<li>Other: Adequate hydration; consider intrinsic-factor/B12 status if atrophic changes are advanced</li>\n</ul>"}], "id": "sp-st-si-li__p8"}, {"category": "Yin Deficiency", "subtitle": "Large Intestine Dryness / Fluid Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Fluid (Yin Axis): Chronic fluid depletion of the colonic mucosa, reducing stool moisture and transit ease.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced colonic mucosal fluid secretion, slowed transit with excess water reabsorption from the fecal mass, and reduced intestinal mucin — commonly age- or dehydration-related, or following significant fluid loss (postpartum, chronic laxative overuse).</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced aquaporin-mediated colonic water channel activity, reduced mucin (MUC2) secretion, age-related decline in colonic motilin receptor density.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Dry, hard stools, straining with infrequent bowel movements, dry mouth, and often dry skin — a generalized fluid-depletion picture concentrated in the lower digestive tract.</p>"}, {"label": "Tongue", "value": "<p>Thin body with little coating, may appear dry overall.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Choppy (Se), fine and somewhat rough under the fingers.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, often age-related or following significant fluid loss (postpartum, prolonged illness, chronic laxative overuse). Worse in dry weather and with inadequate hydration.<br />\n&gt; adequate hydration, moistening foods, regular gentle movement<br />\n&lt; dehydration, excessive caffeine/alcohol, chronic stimulant-laxative use</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Mild abdominal discomfort with straining, generalized dryness without significant structural pain.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Mild anxiety around bowel regularity, a depleted rather than agitated quality — often layered on top of an underlying Yin-deficient constitution.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Chronic functional constipation, dehydration-related constipation, opioid-induced constipation (partial correlate), post-partum constipation.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>GI Workup: Colonic transit study showing slow transit where indicated; typically normal structural imaging (a diagnosis of exclusion biomedically).</p>\n<p>Metabolic: Assess for hypothyroidism or hypercalcemia as reversible contributors in persistent cases.</p>"}, {"label": "Herb Classes", "value": "<p>Moisten the intestines, unblock the bowels</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Hemp seed (Huo ma ren)</li>\n<li>Apricot kernel (Xing ren)</li>\n<li>Trichosanthes seed (Gua lou ren)</li>\n<li>Prunus seed (Yu li ren)</li>\n<li>Raw rehmannia (Sheng di huang)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Flaxseed (<em>Linum usitatissimum</em>)</li>\n<li>Psyllium (<em>Plantago ovata</em>)</li>\n<li>Marshmallow Root (<em>Althaea officinalis</em>)</li>\n<li>Dandelion Root (<em>Taraxacum officinale</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Ma Zi Ren Wan</strong> (Hemp Seed Pill)</p>\n<ul>\n<li>Huo ma ren (Hemp seed)</li>\n<li>Bai shao (White peony)</li>\n<li>Zhi shi (Bitter orange)</li>\n<li>Da huang (Rhubarb)</li>\n<li>Hou po (Magnolia bark)</li>\n<li>Xing ren (Apricot kernel)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>ST 25, LI 4, SP 6, TB 6, ST 37</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: (none specified)</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: Soluble fiber (psyllium, flaxseed); adequate hydration is the single most correctable factor</li>\n</ul>"}], "id": "sp-st-si-li__p9"}, {"category": "Multi-Organ Patterns", "subtitle": "Spleen / Heart Qi and Blood Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Palpitations, insomnia with difficulty falling asleep, poor memory and concentration, fatigue, poor appetite, pale complexion.</p>"}, {"label": "Tongue", "value": "<p>Pale tongue, thin body.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Weak (Ruo) at both the right Guan (Spleen) and left Cun (Heart) positions.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Gui Pi Tang</strong> (Restore the Spleen Decoction)</p>\n<ul>\n<li>Ren shen (Ginseng)</li>\n<li>Huang qi (Astragalus)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Fu shen (Poria with wood)</li>\n<li>Suan zao ren (Sour jujube seed)</li>\n<li>Long yan rou (Longan)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Yuan zhi (Polygala)</li>\n<li>Mu xiang (Saussurea)</li>\n<li>Zhi gan cao (Honey-fried licorice)</li>\n<li>Sheng jiang (Fresh ginger)</li>\n<li>Da zao (Jujube)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>SP 6, HT 7, ST 36, BL 15, BL 20</p>"}], "id": "sp-st-si-li__p10"}, {"category": "Multi-Organ Patterns", "subtitle": "Spleen / Kidney Yang Deficiency", "fields": [{"label": "Key Symptoms & Clinical Findings", "value": "<p>Severe cold intolerance, chronic pre-dawn diarrhea (\"five-watch diarrhea\"), edema, cold limbs, low back and knee weakness.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen tongue with a wet white coating.</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen) and Weak (Ruo), most notable at both Chi (Kidney) positions and the right Guan (Spleen) position.</p>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Si Shen Wan</strong> (Four Miracle Pill)</p>\n<ul>\n<li>Bu gu zhi (Psoralea)</li>\n<li>Rou dou kou (Nutmeg)</li>\n<li>Wu wei zi (Schisandra)</li>\n<li>Wu zhu yu (Evodia)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>RN 4, RN 8, ST 36, SP 9, BL 20, BL 23</p>"}], "id": "sp-st-si-li__p11"}]}, {"slug": "ki-bl", "title": "Kidney-Bladder System", "subtitle": "", "character": "", "order": 4, "preface": [], "conditions": [], "conditionsIntro": "", "patterns": [{"category": "Yang Excess", "subtitle": "Kidney Yin Deficiency with Deficient Fire Flaring", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Sympathetic/HPA-HPG hyperactivity at the \"branch,\" rooted in a Yin-deficient \"root\" (Kidney Yin failing to contain Ming Men fire) — categorized here by its presenting Yang-excess picture rather than its Yin-deficient origin, the same logic used for Liver Yang Rising.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced negative feedback on the HPA and HPG axes against a background of declining gonadal/adrenal Yin reserve, producing elevated sympathetic and hypothalamic drive that outpaces the body's depleted regulatory capacity to dampen it.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Declining estradiol/testosterone with compensatory elevated FSH/LH, elevated cortisol with a flattened diurnal curve, reduced GABAergic inhibitory tone contributing to restlessness and insomnia.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Malar flush, night sweats with pronounced restlessness, nocturnal emissions accompanied by erotic dreams, dry mouth and throat worse at night, anxious insomnia, low back soreness betraying the Yin-deficient root beneath the excess presentation.</p>"}, {"label": "Tongue", "value": "<p>Red body, often with a redder tip, thin or absent coating, may appear dry.</p>"}, {"label": "Pulse", "value": "<p>Thready (Xi) and Rapid (Shuo), occasionally Wiry (Xian), weaker at the Chi (Kidney) position than the pulse's overall rapidity would suggest.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Fluctuating, worse with sleep deprivation or emotional stress, often worse at night. Improves with rest and cooling.<br />\n&gt; rest, cooling foods, quiet evenings<br />\n&lt; sleep deprivation, stress, heat exposure, overwork</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Low back soreness, mild tremor, restless legs worse at night.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Restless anxiety, agitation layered over an exhausted undercurrent, racing thoughts at night — the \"tired but wired\" quality characteristic of deep Yin depletion flaring into overt heat.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Menopausal syndrome with pronounced vasomotor symptoms, chronic insomnia with HPA-axis hyperactivity, anxiety-associated premature ejaculation.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Endocrine: Elevated FSH/LH with declining estradiol or testosterone; elevated evening cortisol.</p>\n<p>Sleep: Polysomnography showing reduced sleep efficiency/increased nocturnal arousals where indicated.</p>"}, {"label": "Herb Classes", "value": "<p>Nourish Kidney Yin, drain deficient fire</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Anemarrhena (Zhi mu)</li>\n<li>Phellodendron (Huang bai)</li>\n<li>Prepared rehmannia (Shu di huang)</li>\n<li>Moutan (Mu dan pi)</li>\n<li>Ligustrum (Nu zhen zi)</li>\n<li>Eclipta (Han lian cao)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Motherwort (<em>Leonurus cardiaca</em>)</li>\n<li>Passionflower (<em>Passiflora incarnata</em>)</li>\n<li>Black Cohosh (<em>Actaea racemosa</em>)</li>\n<li>Sage (<em>Salvia officinalis</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Zhi Bai Di Huang Wan</strong> (Anemarrhena, Phellodendron, and Rehmannia Pill)</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Ze xie (Alisma)</li>\n<li>Fu ling (Poria)</li>\n<li>Mu dan pi (Moutan)</li>\n<li>Zhi mu (Anemarrhena)</li>\n<li>Huang bai (Phellodendron)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>KI 3, KI 6, SP 6, HT 6, KI 2</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: L-theanine and magnesium for restlessness; avoid caffeine and stimulants in the evening</li>\n</ul>"}], "id": "ki-bl__p1"}, {"category": "Yang Deficiency", "subtitle": "Kidney Yang Deficiency", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Hypometabolic, hypoendocrine activity across the HPA/HPG/thyroid axes and renal concentrating function — the Root itself running cold.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced HPA/HPG axis output, reduced renal concentrating ability, reduced mitochondrial thermogenesis, and blunted aldosterone/ADH regulation.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced steroidogenic enzyme activity (gonadal and adrenal), reduced UCP-mediated thermogenesis, reduced renal aquaporin-2 expression (concentrating defect), blunted thyroid receptor sensitivity.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Cold limbs (especially the feet), low back and knee weakness or pain worse with cold, impotence or low libido, infertility, frequent clear or copious urination, nocturia, dependent or facial edema.</p>"}, {"label": "Tongue", "value": "<p>Pale, swollen body with a wet, white coating.</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen) and Weak (Ruo), especially faint at both Chi (Kidney) positions.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, insidious onset, markedly worse in cold weather and in the early morning. Worse in winter.<br />\n&gt; warmth, rest, gentle movement<br />\n&lt; cold, overexertion, sleep deprivation</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Low back and knee weakness worse with cold and improved by warmth, generalized heaviness in the limbs, cold extremities.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Low drive and diminished will-forces (Zhi, the Kidney's associated aspect of will/drive), apathy, reluctance to initiate — a deep constitutional \"banked low\" quality.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Hypothyroidism, adrenal insufficiency, hypogonadism, chronic kidney disease with reduced GFR, age-related nocturia, erectile dysfunction of vascular/hormonal origin.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Endocrine: TSH elevated with free T3/T4 low-normal or low; low-normal or low testosterone/estradiol; low-normal morning cortisol.</p>\n<p>Renal: Elevated creatinine/reduced eGFR if CKD is present; reduced urine osmolality reflecting a concentrating defect.</p>"}, {"label": "Herb Classes", "value": "<p>Warm and tonify Kidney Yang</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Prepared aconite (Fu zi)</li>\n<li>Cinnamon bark (Rou gui)</li>\n<li>Cistanche (Rou cong rong)</li>\n<li>Epimedium (Yin yang huo)</li>\n<li>Cuscuta (Tu si zi)</li>\n<li>Eucommia (Du zhong)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Ashwagandha (<em>Withania somnifera</em>)</li>\n<li>Rhodiola (<em>Rhodiola rosea</em>)</li>\n<li>Ginger (<em>Zingiber officinale</em>)</li>\n<li>Saw Palmetto (<em>Serenoa repens</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Jin Kui Shen Qi Wan</strong> (Kidney Qi Pill from the Golden Cabinet)</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Ze xie (Alisma)</li>\n<li>Fu ling (Poria)</li>\n<li>Mu dan pi (Moutan)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n<li>Fu zi (Prepared aconite)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>KI 3, RN 4, RN 6, BL 23</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D</li>\n<li>Minerals/Metals: Zn, Se</li>\n<li>Other: Warming adaptogens; iodine/selenium for thyroid axis support if clinically indicated</li>\n</ul>"}], "id": "ki-bl__p2"}, {"category": "Yang Deficiency", "subtitle": "Kidney Essence Deficiency — Cold Signs", "fields": [{"label": "Primary Biological Axis", "value": "<p>Metabolic/Immune (Yang Axis): Reduced growth, developmental, and regenerative output — the Kidney's storehouse of foundational reserve running low with an overall hypofunction (cold) presentation.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced growth hormone/IGF-1 axis activity, reduced gonadal steroidogenesis, reduced osteoblastic activity, and reduced cellular regenerative capacity, presenting with generally cold, hypofunctional signs rather than heat.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced GH/IGF-1 signaling, reduced gonadotropin-releasing hormone pulsatility, reduced osteoblast differentiation (RUNX2 pathway activity), reduced telomerase activity.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>In children: delayed walking, delayed teething, delayed closure of the fontanelle. In adults: infertility, low libido, premature aging with cold signs, weak low back and knees, poor bone density, hair loss or early graying against an overall cold, hypofunctional presentation.</p>"}, {"label": "Tongue", "value": "<p>Pale body, may appear underdeveloped in texture (thin, soft).</p>"}, {"label": "Pulse", "value": "<p>Deep (Chen) and Weak (Ruo), particularly faint and fine at both Chi positions.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, constitutional, slow to change. Worse in cold weather and with overexertion.<br />\n&gt; warmth, rest, patient long-term support<br />\n&lt; cold, overexertion, chronic stress, sleep deprivation</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Poor bone density, weak low back and knees, slow healing of fractures or injuries, generalized frailty.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A diminished sense of vitality and future-orientation, low will-force, quiet resignation rather than acute distress.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Growth hormone deficiency in children, hypogonadotropic hypogonadism, osteoporosis/osteopenia, primary ovarian insufficiency or male hypogonadism with cold-type presentation.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Endocrine: Low IGF-1; low-normal or low gonadotropins with correspondingly low sex hormones (hypogonadotropic pattern).</p>\n<p>Bone: DEXA scan showing reduced bone mineral density.</p>"}, {"label": "Herb Classes", "value": "<p>Tonify Essence, warm and fortify</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Deer antler (Lu rong)</li>\n<li>Cistanche (Rou cong rong)</li>\n<li>Cuscuta (Tu si zi)</li>\n<li>Walnut (Hu tao ren)</li>\n<li>Black sesame seed (Hei zhi ma)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Ashwagandha (<em>Withania somnifera</em>)</li>\n<li>Maca (<em>Lepidium meyenii</em>)</li>\n<li>Saw Palmetto (<em>Serenoa repens</em>)</li>\n<li>Tribulus (<em>Tribulus terrestris</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>You Gui Wan</strong> (Restore the Right [Kidney] Pill)</p>\n<ul>\n<li>Shu di huang (Prepared rehmannia)</li>\n<li>Shan yao (Chinese yam)</li>\n<li>Shan zhu yu (Cornus)</li>\n<li>Gou qi zi (Goji berry)</li>\n<li>Tu si zi (Cuscuta)</li>\n<li>Lu jiao jiao (Deer antler gelatin)</li>\n<li>Du zhong (Eucommia)</li>\n<li>Dang gui (Angelica sinensis)</li>\n<li>Rou gui (Cinnamon bark)</li>\n<li>Fu zi (Prepared aconite)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>KI 3, BL 23, GV 4, RN 4</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: D, K2</li>\n<li>Minerals/Metals: Ca, Zn</li>\n<li>Other: Adequate protein intake; weight-bearing activity as tolerated for bone density support</li>\n</ul>"}], "id": "ki-bl__p3"}, {"category": "Qi Excess", "subtitle": "Bladder Qi Dysfunction", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Detrusor and pelvic autonomic hyperreactivity without an infectious driver.</p>"}, {"label": "Pathophysiology", "value": "<p>Detrusor muscle overactivity, autonomic/parasympathetic hyperreactivity of the bladder wall, and heightened visceral afferent sensitivity — functionally analogous to Liver Qi Stagnation's visceral hypersensitivity mechanism, but localized to the bladder.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Elevated M2/M3 muscarinic receptor sensitivity in detrusor smooth muscle, elevated TRPV1 expression in bladder afferents, reduced central GABAergic inhibition of the micturition reflex.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Urinary urgency and frequency without infection, spasmodic bladder discomfort, a sensation of incomplete emptying, and symptoms that fluctuate directly with stress or anxiety.</p>"}, {"label": "Tongue", "value": "<p>Normal body, thin white coating.</p>"}, {"label": "Pulse", "value": "<p>Wiry (Xian), occasionally normal between flares.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Episodic, fluctuates with stress and anxiety. Worse with caffeine, alcohol, or cold exposure.<br />\n&gt; stress reduction, warmth, bladder training<br />\n&lt; stress, caffeine, alcohol, cold exposure</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Suprapubic tension or discomfort, pelvic floor tightness, occasional referred low back tension.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>Anxiety concentrated around urinary urgency and access to a bathroom, hypervigilance toward bladder sensation, a self-reinforcing loop between anxiety and symptom flares.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Overactive bladder (OAB), interstitial cystitis/bladder pain syndrome (non-infectious), functional or neurogenic bladder dysfunction, stress urinary incontinence with a detrusor-overactivity component.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Urinalysis: Typically clean/negative for infection, distinguishing this from Bladder Damp-Heat.</p>\n<p>Urodynamic Testing: May show detrusor overactivity on cystometry where formally evaluated.</p>"}, {"label": "Herb Classes", "value": "<p>Regulate Bladder Qi, calm spasm</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Poria (Fu ling)</li>\n<li>Polyporus (Zhu ling)</li>\n<li>White atractylodes (Bai zhu)</li>\n<li>Alisma (Ze xie)</li>\n<li>Cinnamon twig (Gui zhi)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Corn Silk (<em>Zea mays</em>)</li>\n<li>Cramp Bark (<em>Viburnum opulus</em>)</li>\n<li>Kava (<em>Piper methysticum</em>)</li>\n<li>Crateva (<em>Crateva nurvala</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Wu Ling San</strong> (Poria Five Powder)</p>\n<ul>\n<li>Fu ling (Poria)</li>\n<li>Zhu ling (Polyporus)</li>\n<li>Bai zhu (White atractylodes)</li>\n<li>Ze xie (Alisma)</li>\n<li>Gui zhi (Cinnamon twig)</li>\n</ul>"}, {"label": "Acupuncture", "value": "<p>RN 3, SP 6, LR 3, KI 3, BL 28</p>"}, {"label": "Key Micronutrients / Nutrients", "value": "<ul>\n<li>Vitamins: B-complex</li>\n<li>Minerals/Metals: Mg</li>\n<li>Other: Magnesium and L-theanine for pelvic-floor/nervous-system calming; reduce caffeine and alcohol intake</li>\n</ul>"}], "id": "ki-bl__p4"}, {"category": "Qi Deficiency", "subtitle": "Kidney Qi Not Firm", "fields": [{"label": "Primary Biological Axis", "value": "<p>Autonomic (Qi Axis): Reduced neural/sphincteric \"holding\" capacity across the urinary and reproductive systems.</p>"}, {"label": "Pathophysiology", "value": "<p>Reduced pelvic floor and sphincter tone, reduced neural control of urinary and reproductive sphincters, and generalized hypofunction of the HPG axis's containing capacity.</p>"}, {"label": "Gene / Signaling Pathways", "value": "<p>Reduced pudendal nerve efferent tone, reduced pelvic floor motor unit recruitment, reduced progesterone/luteal support in recurrent pregnancy loss presentations.</p>"}, {"label": "Key Symptoms & Clinical Findings", "value": "<p>Urinary incontinence or dribbling, frequent pale urination, spermatorrhea without dreams, premature ejaculation, enuresis in children, weak low back, and a tendency toward miscarriage.</p>"}, {"label": "Tongue", "value": "<p>Pale body, thin white coating.</p>"}, {"label": "Pulse", "value": "<p>Weak (Ruo) or Empty (Xu), especially faint at both Chi positions.</p>"}, {"label": "Temporal / Qualitative Patterns", "value": "<p>Chronic, gradual onset, worse with fatigue and overexertion. Worse toward the end of the day.<br />\n&gt; rest, pelvic floor strengthening, adequate sleep<br />\n&lt; overexertion, prolonged standing, sleep deprivation</p>"}, {"label": "Musculoskeletal / Pain Expression", "value": "<p>Weak low back, generalized fatigue-related weakness, poor pelvic floor tone.</p>"}, {"label": "Psychological / Consciousness Expression", "value": "<p>A diminished sense of security and containment, mild anxiety around control (bladder, reproductive), fatigue-driven low motivation rather than acute distress.</p>"}, {"label": "Biomedical Correlates", "value": "<p>Stress urinary incontinence, nocturnal enuresis, premature ejaculation (non-psychogenic), recurrent pregnancy loss with luteal insufficiency.</p>"}, {"label": "Confirming Lab Markers", "value": "<p>Endocrine: Low-normal progesterone in luteal-phase-insufficiency-associated pregnancy loss.</p>\n<p>Urodynamic/Pelvic Floor: Reduced pelvic floor muscle strength on exam where formally assessed.</p>"}, {"label": "Herb Classes", "value": "<p>Stabilize and bind Kidney Qi</p>\n<p><strong>Chinese herbs</strong>:</p>\n<ul>\n<li>Cuscuta (Tu si zi)</li>\n<li>Rubus (Fu pen zi)</li>\n<li>Schisandra (Wu wei zi)</li>\n<li>Euryale (Qian shi)</li>\n<li>Chinese yam (Shan yao)</li>\n<li>Oyster shell (Mu li)</li>\n</ul>\n<p><strong>Western herbs</strong>:</p>\n<ul>\n<li>Saw Palmetto (<em>Serenoa repens</em>)</li>\n<li>Horsetail (<em>Equisetum arvense</em>)</li>\n<li>St. John's Wort (<em>Hypericum perforatum</em>)</li>\n<li>Corn Silk (<em>Zea mays</em>)</li>\n</ul>"}, {"label": "Representative Chinese Formulas", "value": "<p><strong>Sang Piao Xiao San</strong> (Mantis Egg-Case Powder)</p>\n<ul>\n<li>Sang piao xiao (Mantis egg-case)</li>
